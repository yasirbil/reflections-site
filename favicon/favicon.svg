  <!-- Parchment border ring -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="#f5f0e8" stroke-width="1.5"/>
  <!-- YB monogram — Lato-style sans-serif, tight tracking -->
