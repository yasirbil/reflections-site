<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yasir Bilgin</title>

<script src="https://test.yasirbilgin.com/nav.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.10);
  --border-strong: rgba(0,0,0,0.20);
  --text: #1a1a18;
  --text-muted: #7a7872;
  --text-faint: #b0ada5;
  --accent: #2d4a3e;
  --accent-light: #e8f0ec;
  --radius-md: 10px;
  --radius-lg: 16px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #131310;
    --surface: #1e1e1a;
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.22);
    --text: #f0ede5;
    --text-muted: #908d85;
    --text-faint: #5a5750;
    --accent: #7fbf9e;
    --accent-light: rgba(127,191,158,0.10);
  }
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  padding-top: 62px;
}

/* HERO */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 3.5rem 1.5rem 2rem;
  animation: fadeUp 0.5s ease both;
}

.hero-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.75rem;
}

.hero-sub {
  font-size: 15px;
  font-weight: 300;
  color: var(--text-muted);
  max-width: 700px;
  line-height: 1.6;
}

/* SEARCH */
.search-wrap {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2.5rem;
  animation: fadeUp 0.5s 0.05s ease both;
}

.search-box-container {
  background: var(--surface);
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
}

.search-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.search-input {
  flex: 1;
  height: 44px;
  padding: 0 1rem;
  background: var(--bg);
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius-md);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14.5px;
  outline: none;
  transition: border-color 0.15s;
}

.search-input::placeholder { color: var(--text-faint); }
.search-input:focus { border-color: var(--accent); }

.search-btn {
  height: 44px;
  padding: 0 1.25rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.search-btn:hover { opacity: 0.88; }

.search-btn svg {
  width: 15px;
  height: 15px;
  stroke: #fff;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

/* SECTION */
.section-wrap {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2.5rem 4rem;
  animation: fadeUp 0.5s 0.1s ease both;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.4rem;
}

.section-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-faint);
  white-space: nowrap;
}

.section-line {
  flex: 1;
  height: 0.5px;
  background: var(--border);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

/* CARD */
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: border-color 0.15s, transform 0.12s;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent-light);
  opacity: 0;
  transition: opacity 0.15s;
}

.card:hover { border-color: var(--accent); transform: translateY(-2px); }
.card:hover::before { opacity: 1; }

.card-icon { font-size: 26px; margin-bottom: 4px; position: relative; }

.card-name {
  font-size: 17px;
  font-weight: 500;
  color: var(--text);
  position: relative;
}

.card-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.55;
  position: relative;
  flex: 1;
}

.card-url {
  font-size: 12.5px;
  color: var(--text-faint);
  margin-top: 4px;
  position: relative;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* REFERENCES */
.ref-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.ref-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 0.45rem 1rem;
  background: var(--surface);
  border: 0.5px solid var(--border-strong);
  border-radius: 30px;
  text-decoration: none;
  color: var(--text-muted);
  font-size: 12.5px;
  font-weight: 500;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}

.ref-btn:hover {
  border-color: var(--accent);
  color: var(--text);
  background: var(--accent-light);
}

.ref-btn-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 2rem 1.5rem;
  border-top: 0.5px solid var(--border);
  font-size: 12px;
  color: var(--text-faint);
}

/* ANIMATION */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* RESPONSIVE */
@media (max-width: 1000px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 720px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
  .search-wrap, .section-wrap { padding-left: 1.2rem; padding-right: 1.2rem; }
}

@media (max-width: 500px) {
  .grid { grid-template-columns: 1fr; }
  .section-wrap { padding: 0 1.2rem 3rem; }
  .search-row { flex-wrap: wrap; }
  .search-btn { width: 100%; justify-content: center; }
}
</style>
</head>

<body>

<section class="hero">
  <p class="hero-eyebrow">Knowledge · Reflection · Community</p>
  <p class="hero-sub">Writings, reflections, and community resources in one place. More sections coming soon.</p>
</section>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box-container">
    <div class="search-row">
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="Search all content on yasirbilgin.com…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-btn" id="searchBtn">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search site
      </button>
    </div>
  </div>
</div>

<!-- BROWSE SECTIONS -->
<div class="section-wrap" style="padding-top: 1.5rem;">
  <div class="section-header">
    <span class="section-label">Browse all sections</span>
    <div class="section-line"></div>
  </div>
  <div class="grid" id="cardGrid"></div>
</div>

<!-- REFERENCES & TOOLS -->
<div class="section-wrap" style="padding-bottom: 4rem;">
  <div class="section-header">
    <span class="section-label">References &amp; Tools</span>
    <div class="section-line"></div>
  </div>
  <div class="ref-grid" id="refGrid"></div>
</div>

<footer class="footer">
  © Yasir Bilgin · yasirbilgin.com
</footer>

<script>
const SECTIONS = [
  { icon: '📖', name: "Study Qur'an",     desc: "In-depth Qur'anic study and guides",         url: 'https://www.quran.yasirbilgin.com',           display: 'quran.yasirbilgin.com' },
  { icon: '🤝', name: 'Hizmet Community', desc: 'Resources and info for the Hizmet movement', url: 'https://www.hizmet-community.yasirbilgin.com', display: 'hizmet-community.yasirbilgin.com' },
  { icon: '🖥️', name: 'DevOps / SRE',     desc: 'DevOps and infrastructure notes',            url: 'https://devops.yasirbilgin.com',              display: 'devops.yasirbilgin.com' },
  { icon: '✈️', name: 'Travels',          desc: 'Journey through civilizations',              url: 'https://www.travels.yasirbilgin.com/home',    display: 'travels.yasirbilgin.com' },
  { icon: '🧠', name: 'MBTI',             desc: 'Personality and reflection resources',       url: 'https://mbti.yasirbilgin.com',                display: 'mbti.yasirbilgin.com' },
  { icon: '🎨', name: 'Arts & Crafts',    desc: 'Creative and handmade works',                url: 'https://arts.yasirbilgin.com',                display: 'arts.yasirbilgin.com' },
  { icon: '🗣️', name: 'Linguistics',      desc: 'Language and communication studies',         url: 'https://www.linguistics.yasirbilgin.com',     display: 'linguistics.yasirbilgin.com' },
];

const REFERENCES = [
  { icon: '📰', name: 'Medium Articles',         url: 'https://medium.com/@yasirbil' },
  { icon: '💡', name: 'First Principles',        url: 'https://www.reflections.yasirbilgin.com/pages/first-principles' },
  { icon: '📚', name: 'Essential Books',         url: 'https://www.reflections.yasirbilgin.com/pages/essential-books' },
  { icon: '🕌', name: 'Essential Books — Islam', url: 'https://reflections.yasirbilgin.com/pages/essential-books-islam' },
  { icon: '🎓', name: 'Madrasa Books',           url: 'https://www.reflections.yasirbilgin.com/pages/medrese-books' },
  { icon: '📜', name: 'Historical Chronology',   url: 'https://www.reflections.yasirbilgin.com/pages/chronology' },
  { icon: '📄', name: 'CRISD Papers',            url: 'https://mailchi.mp/939b3b8716af/ktphane' },
  { icon: '🔗', name: 'Usul.ai',                 url: 'https://usul.ai/' },
  { icon: '🔗', name: 'OpenAlex Works',          url: 'https://openalex.org/works' },
];

// Render section cards
const grid = document.getElementById('cardGrid');
SECTIONS.forEach(s => {
  const a = document.createElement('a');
  a.className = 'card';
  a.href = s.url;
  a.target = '_blank';
  a.innerHTML = `
    <div class="card-icon">${s.icon}</div>
    <div class="card-name">${s.name}</div>
    <div class="card-desc">${s.desc}</div>
    <div class="card-url">${s.display}</div>
  `;
  grid.appendChild(a);
});

// Render reference pills
const refGrid = document.getElementById('refGrid');
REFERENCES.forEach(r => {
  const a = document.createElement('a');
  a.className = 'ref-btn';
  a.href = r.url;
  a.target = '_blank';
  a.innerHTML = `<span class="ref-btn-dot"></span>${r.icon} ${r.name} ↗`;
  refGrid.appendChild(a);
});

// Search — opens Google CSE in a new tab
const searchInput = document.getElementById('searchInput');
const searchBtn   = document.getElementById('searchBtn');

function doSearch() {
  const q = searchInput.value.trim();
  if (!q) return;
  window.open('https://cse.google.com/cse?cx=94589d4b6bd3d4d58&q=' + encodeURIComponent(q), '_blank');
}

searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); });
</script>

</body>
</html>
