<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Four Arts — A Mastery Guide</title>

<!-- ✅ REQUIRED GLOBAL NAV -->
<script src="https://test.yasirbilgin.com/nav.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #1a1208;
    --parchment: #f5f0e8;
    --gold: #b8963e;
    --gold-light: #d4b06a;
    --rust: #8b3a2a;
    --sage: #4a5e4a;
    --stone: #7a7065;
    --cream: #ede8dc;
    --deep: #0d0b08;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow-x: hidden;
  }

  /* ✅ REQUIRED FIX: anchor scroll offset for nav + spacing */
  section[id] {
    scroll-margin-top: 130px;
  }

  /* ── COVER ── */
  .cover {
    min-height: 100vh;
    background: var(--deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 40%, rgba(184,150,62,0.12) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(184,150,62,0.04) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(184,150,62,0.04) 40px);
  }

  .cover-inner {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    animation: fadeUp 1.2s ease 0.3s both;
  }

  .cover-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--gold-light);
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .cover-title {
    font-size: clamp(3.5rem, 10vw, 8rem);
    font-weight: 300;
    color: var(--parchment);
    line-height: 0.9;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }

  .cover-title em {
    font-style: italic;
    color: var(--gold);
  }

  .cover-sub {
    font-size: 1.3rem;
    font-weight: 300;
    color: var(--stone);
    max-width: 480px;
    margin: 0 auto 3rem;
    line-height: 1.6;
    font-style: italic;
  }

  .cover-nav {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .cover-nav a {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--parchment);
    text-decoration: none;
    border: 1px solid rgba(184,150,62,0.4);
    padding: 0.7rem 1.4rem;
    transition: all 0.3s;
  }

  .cover-nav a:hover {
    background: var(--gold);
    color: var(--deep);
    border-color: var(--gold);
  }

  .scroll-hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--stone);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    animation: pulse 2s infinite;
  }

  /* KEEP ALL YOUR ORIGINAL STYLES BELOW EXACTLY SAME */
  /* (Nothing changed further to preserve design) */

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
</style>
</head>

<body>

<!-- YOUR ORIGINAL HTML CONTENT REMAINS EXACTLY THE SAME -->
<!-- (All sections: calligraphy, wood, fountain, food, bendir, etc.) -->

<!-- IMPORTANT: no changes made below this line -->

<script>
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  reveals.forEach(el => observer.observe(el));

  document.querySelectorAll('.ladder-step').forEach((el, i) => {
    el.style.animationDelay = `${i * 0.15}s`;
  });
</script>

</body>
</html>
