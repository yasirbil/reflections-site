          t("Strengths and Limitations",`<div class="tc-subhead">Strengths</div><ul><li>Emotionally powerful; helps families access vulnerability</li><li>Useful for rigid or emotionally blocked families</li><li>Emphasizes authenticity and self-worth; creative and memorable</li></ul><div class="tc-subhead">Limitations</div><ul><li>May feel too intense for some families</li><li>Less structured for concrete behavior problems</li><li>May underemphasize diagnosis, safety, or evidence-based protocols</li><li>Therapist personality strongly affects quality; requires careful pacing with trauma</li></ul>`)
        ]
      },
      { title:"Contextual Family Therapy",
        intro:"Contextual Family Therapy, developed by Ivan Boszormenyi-Nagy, focuses on relational ethics: loyalty, fairness, trust, entitlement, responsibility, and the balance of giving and receiving across generations. The central contextual question is: what debts, loyalties, injustices, and obligations shape this family?",
        topics:[
          t("Ivan Boszormenyi-Nagy and Relational Ethics",`<p>Boszormenyi-Nagy believed relationships are governed not only by psychology but by ethics. Families are moral systems where fairness, trust, loyalty, and responsibility matter. Relational ethics asks: Who gave too much? Who received too little? Who was exploited? Who carries invisible debt? Who is loyal to whom? Who deserves acknowledgment? What repair is needed?</p>`),
          t("Loyalty",`<p>Loyalty refers to obligations and bonds between family members. Loyalty can be healthy, but invisible loyalties may trap people.</p><ul><li>An adult child feels guilty becoming more successful than parents</li><li>A child remains symptomatic to stay loyal to a suffering parent</li><li>A spouse cannot set boundaries with family of origin</li><li>Siblings repeat family roles out of loyalty to tradition</li></ul><p>Therapy helps make loyalties visible and more flexible.</p>`),
          t("Ledger of Merit and Debt",`<p>The "ledger" refers to the balance of giving and receiving in relationships. Families keep emotional accounts, often unconsciously.</p><ul><li>"I sacrificed everything for you." / "You owe me."</li><li>"No one ever thanked me."</li><li>"I carried the family, and now everyone ignores me."</li></ul><div class="tc-quote">Therapeutic task: name invisible contributions and create fairer patterns of responsibility.</div>`),
          t("Entitlement",`<p>Entitlement in contextual therapy can be constructive or destructive.</p><div class="tc-example"><strong>Constructive entitlement</strong>A person who has given responsibly gains a legitimate sense of worth and trust.</div><div class="tc-example"><strong>Destructive entitlement</strong>A person who has been harmed may feel justified in harming others. Example: a father who was neglected as a child becomes emotionally demanding of his children, expecting them to heal his old wound.</div><p>Therapy helps transform destructive entitlement into responsible repair.</p>`),
          t("Parentification",`<p>Parentification occurs when a child carries adult responsibilities emotionally or practically: child becomes parent's confidant; child manages siblings; child mediates marital conflict; child sacrifices childhood for family stability. Contextual therapy honors the child's contribution while naming the injustice.</p><div class="tc-quote">Therapist language: "You gave something real to this family. And it also cost you something that should be acknowledged."</div>`),
          t("Multidirected Partiality",`<p>Multidirected partiality is the therapist's stance of being partially committed to everyone's humanity and legitimate claims. The therapist does not remain coldly neutral but actively acknowledges each person's side.</p><div class="tc-example"><strong>Example</strong>"I want to understand the daughter's pain, the mother's sacrifice, and the father's loneliness. Each claim matters."</div><p>This is especially useful in families with deep resentment.</p>`),
          t("Justice, Fairness, and Trustworthiness",`<p>Contextual therapy sees trustworthiness as built through fair giving, responsibility, and acknowledgment. Key questions: Who has been reliable? Who has been betrayed? Who was asked to give too much? What apology or restitution is needed? What fairness can be restored now? Family healing often requires ethical repair, not only better communication.</p>`),
          t("Intergenerational Repair",`<p>Contextual therapy often works across generations. It may help families acknowledge inherited injustice, sacrifice, trauma, and loyalty. Repair may include: apology; recognition; changed responsibility; restitution; boundary correction; honoring sacrifice; and releasing children from inherited debts.</p>`),
          t("Strengths and Limitations",`<div class="tc-subhead">Strengths</div><ul><li>Powerful for loyalty and fairness issues; honors moral dimensions of family life</li><li>Useful for parentification and intergenerational wounds</li><li>Balances compassion with accountability</li><li>Culturally relevant in families with strong duty and obligation values</li></ul><div class="tc-subhead">Limitations</div><ul><li>May feel abstract; requires careful handling so duty does not become coercion</li><li>May not provide enough behavioral structure</li><li>Safety must remain primary when abuse is present</li></ul>`)
        ]
      },
      { title:"Narrative Family Therapy",
        intro:"Narrative Family Therapy, associated with Michael White and David Epston, views problems as shaped by stories, language, culture, power, and identity. Families can become trapped in problem-saturated narratives, but therapy can help them develop alternative stories. The central narrative question is: what story is organizing this family's suffering, and what alternative story can support healing?",
        topics:[
          t("Michael White and David Epston",`<p>White and Epston developed narrative therapy as a collaborative, respectful approach. They believed people are not problems — problems are problems. Therapy helps people examine dominant stories and re-author their lives.</p>`),
          t("Social Constructionism",`<p>Narrative therapy is influenced by social constructionism: the idea that meaning is shaped through language, culture, relationships, and social context.</p><div class="tc-example"><strong>Clinical implication</strong>The way a family names a problem affects how family members respond to it. "He is lazy" creates blame. "Discouragement has taken over" creates curiosity and possible action.</div>`),
          t("Problems as Separate from People",`<p>Externalizing separates the person from the problem.</p><div class="tc-example"><strong>Instead of "She is anxious"</strong>Narrative therapy may say: "Anxiety has been pressuring her."</div><div class="tc-example"><strong>Instead of "Our son is defiant"</strong>"The rebellion cycle has been taking over conversations."</div><p>Externalizing reduces shame and opens agency.</p>`),
          t("Externalizing Conversations",`<p>Externalizing questions include:</p><ul><li>When did the problem first enter the family?</li><li>What does the problem try to convince you of?</li><li>How does it affect relationships? Who does it recruit?</li><li>When are you able to resist it?</li><li>What values help you stand against it?</li></ul><div class="tc-quote">"When Anger takes over the room, what does it get each person to do?"</div>`),
          t("Dominant Stories and Problem-Saturated Narratives",`<p>A dominant story is the main story the family tells about itself. A problem-saturated story reduces identity to suffering or failure.</p><ul><li>"We are broken." / "He ruins everything."</li><li>"No one changes in this family." / "We are cursed."</li><li>"She is the difficult one."</li></ul><p>Therapy helps families find neglected stories of resilience, love, sacrifice, courage, and repair.</p>`),
          t("Unique Outcomes",`<p>Unique outcomes are exceptions to the dominant problem story. Questions: When was the problem weaker? When did the family respond differently? Who resisted the old pattern? What does that exception say about your values? Unique outcomes provide evidence for a new story.</p>`),
          t("Re-authoring Conversations",`<p>Re-authoring helps families build a richer, more hopeful, and more accurate story.</p><div class="tc-example"><strong>Old story</strong>"Our family only hurts each other."</div><div class="tc-example"><strong>New story</strong>"Our family inherited painful ways of reacting, but we are learning repair."</div><p>Re-authoring must be grounded in real evidence, not false positivity.</p>`),
          t("Therapeutic Documents",`<p>Narrative therapists may use letters, certificates, written reflections, declarations, or family documents: letter to the family after a session; certificate of resisting anxiety; family declaration of new values; written account of a successful repair; goodbye letter to shame. Documents help strengthen new identity narratives.</p>`),
          t("Cultural and Political Awareness",`<p>Narrative therapy pays attention to power and culture. Problems are not only personal — they may be shaped by racism, poverty, gender expectations, immigration systems, religious shame, ableism, or social stigma. Therapist questions: What cultural story has shaped this problem? Who taught the family to see itself this way? What values does the family want to reclaim?</p>`),
          t("Strengths and Limitations",`<div class="tc-subhead">Strengths</div><ul><li>Reduces shame; culturally aware; empowering</li><li>Useful for identity and trauma work</li><li>Strong for families trapped in blame stories; collaborative and respectful</li></ul><div class="tc-subhead">Limitations</div><ul><li>May be too language-based for families needing concrete structure</li><li>May underemphasize behavior change if used alone</li><li>May not be sufficient for crisis, violence, or severe symptoms without additional interventions</li></ul>`)
        ]
      },
      { title:"Solution-Focused Family Therapy",
        intro:"Solution-Focused Family Therapy focuses on goals, exceptions, strengths, resources, and small steps toward a preferred future. The central solution-focused question is: what is already working, and how can the family do more of it? This model is brief, practical, hopeful, and collaborative.",
        topics:[
          t("Origins and Key Figures",`<p>Solution-Focused Brief Therapy was developed by Steve de Shazer, Insoo Kim Berg, and colleagues at the Brief Family Therapy Center. It grew from brief therapy traditions and emphasized the client's own resources rather than expert diagnosis.</p>`),
          t("Focus on Solutions Rather Than Problems",`<p>Solution-focused therapy does not deny problems — it simply refuses to let the problem become the entire conversation.</p><div class="tc-example"><strong>Instead of only asking</strong>"Why is the family fighting?" Ask: "When does the family fight less? What is different then? How can that happen more often?"</div>`),
          t("Exceptions",`<p>Exceptions are times when the problem could have happened but did not, or happened less intensely. Questions: When was the problem a little better? What did each person do differently? Who noticed? How did you manage that? What would help repeat it? Exceptions reveal existing competence.</p>`),
          t("Miracle Question",`<p>The miracle question helps families imagine a preferred future.</p><div class="tc-quote">"Suppose tonight, while you are asleep, a miracle happens and the problem improves. When you wake up tomorrow, what would be the first small sign that tells you things are different?"</div><p>Follow-up questions: Who would notice first? What would you do differently? What would be one small piece of that miracle you could practice this week?</p>`),
          t("Scaling Questions",`<p>Scaling questions help measure hope, progress, confidence, safety, or connection.</p><ul><li>On a scale of 0 to 10, how close is the family to the goal?</li><li>What makes it a 4 and not a 2?</li><li>What would move it from 4 to 5?</li><li>How confident are you that you can try this step?</li></ul><p>Scaling questions are useful for tracking progress.</p>`),
          t("Coping Questions",`<p>Coping questions identify resilience during difficulty: How have you managed to keep going? What has stopped things from becoming worse? Who helped you survive this week? What does that say about your family? Coping questions are especially useful when families feel hopeless.</p>`),
          t("Compliments and Strengths",`<p>Solution-focused therapists use genuine compliments to highlight competence.</p><div class="tc-example"><strong>Example</strong>"It is impressive that even after such a hard week, the family still came here together. That tells me there is commitment."</div><p>Compliments should be specific and authentic, not superficial.</p>`),
          t("Goal Construction",`<p>Goals should be positive, concrete, behavioral, and meaningful.</p><div class="tc-example"><strong>Weak goal</strong>"Stop fighting."</div><div class="tc-example"><strong>Better goal</strong>"Have three evenings this week where conflict ends with a pause and repair instead of yelling."</div><p>Solution-focused goals ask what the family wants instead of the problem.</p>`),
          t("Brief Therapy Format",`<p>Solution-focused therapy often works well in brief formats because it focuses on immediate, achievable change. Common structure:</p><ol><li>Ask about goals</li><li>Identify exceptions</li><li>Use scaling</li><li>Highlight strengths</li><li>Choose one small next step</li><li>Review progress next session</li></ol>`),
          t("Strengths and Limitations",`<div class="tc-subhead">Strengths</div><ul><li>Hopeful and efficient; respectful of client resources</li><li>Useful for brief therapy; avoids overpathologizing</li><li>Practical and measurable; good for families ready for action</li></ul><div class="tc-subhead">Limitations</div><ul><li>May feel too light for trauma or severe conflict</li><li>Can miss deeper patterns if used superficially</li><li>Safety concerns require direct assessment, not only solution talk</li><li>Some families need emotional processing before goal work</li></ul>`)
        ]
      },
      { title:"Emotionally Focused Family Therapy",
        intro:"Emotionally Focused Therapy is rooted in attachment theory and focuses on emotional bonds, negative interaction cycles, vulnerability, and secure connection. The central EFT question is: what attachment fear or longing is hidden inside this conflict cycle? EFT helps families move from defensive reactions to vulnerable emotional engagement.",
        topics:[
          t("Attachment Theory Foundations",`<p>Attachment theory suggests that humans need secure emotional bonds. Family conflict often intensifies when attachment security feels threatened. Underlying questions at the heart of family conflict:</p><ul><li>Are you there for me? Do I matter?</li><li>Can I depend on you?</li><li>Will you respond when I am vulnerable?</li><li>Am I safe with you?</li></ul>`),
          t("Emotion as Organizing Force",`<p>EFT views emotion as central to relationship patterns. Families may argue about surface content, but deeper emotions organize the cycle.</p><div class="tc-example"><strong>Surface content</strong>Homework, money, chores, phones.</div><div class="tc-example"><strong>Underlying emotion</strong>Fear, loneliness, shame, rejection, helplessness, longing.</div>`),
          t("Negative Interaction Cycles",`<p>A negative cycle is a repeated pattern of emotional protection.</p><div class="tc-example"><strong>Example</strong>Parent criticizes → teen withdraws → parent feels rejected → parent criticizes more → teen withdraws more.</div><div class="tc-quote">EFT externalizes the cycle: "The cycle is the enemy, not either of you."</div>`),
          t("Primary and Secondary Emotions",`<p>Secondary emotions are protective reactions, such as anger, defensiveness, or withdrawal. Primary emotions are deeper vulnerable feelings, such as fear, sadness, shame, or longing.</p><div class="tc-example"><strong>Secondary emotion</strong>"You never listen!"</div><div class="tc-example"><strong>Primary emotion</strong>"I am scared I do not matter to you."</div><p>Therapy helps access primary emotion.</p>`),
          t("De-escalation",`<p>The first phase often involves de-escalating the negative cycle. The therapist helps family members see how each person's protective move triggers another's protective move.</p><div class="tc-quote">Therapist language: "When you pursue, he hears criticism and withdraws. When he withdraws, you feel abandoned and pursue harder."</div>`),
          t("Restructuring Attachment Interactions",`<p>After de-escalation, family members practice new emotional interactions.</p><div class="tc-example"><strong>Example shift</strong>Instead of the parent saying "You are disrespectful," the parent says: "When you shut your door, I feel scared that I am losing you." The child or partner can then respond to vulnerability rather than attack.</div>`),
          t("Consolidation and Integration",`<p>In the final phase, the family consolidates new patterns and applies them to daily life. Questions: What is different now when conflict starts? How do you recognize the cycle earlier? What helps you reach for each other differently? What repair rituals will maintain security?</p>`),
          t("Application to Couples, Parents, and Children",`<p>EFT can help: couples with pursue-withdraw cycles; parents and adolescents with attachment ruptures; families affected by trauma or disconnection; parent-child relationships needing emotional repair. It is especially useful when conflict hides longing for connection.</p>`),
          t("Strengths and Limitations",`<div class="tc-subhead">Strengths</div><ul><li>Strong attachment framework; emotionally deep</li><li>Reduces blame through cycle work</li><li>Useful for couples and parent-child repair; transforms conflict into vulnerability</li></ul><div class="tc-subhead">Limitations</div><ul><li>Requires emotional safety; not appropriate for coercive control without safety intervention</li><li>May need adaptation for highly avoidant or emotionally restricted families</li><li>May not be enough alone for severe behavior problems or addiction without additional structure</li></ul>`)
        ]
      },
      { title:"Cognitive-Behavioral Family Therapy",
        intro:"Cognitive-Behavioral Family Therapy applies principles of learning, reinforcement, cognition, communication, and problem-solving to family systems. It is structured, practical, and skill-oriented. The central CBFT question is: what thoughts, behaviors, reinforcements, and skills are maintaining the problem?",
        topics:[
          t("Behavioral Foundations",`<p>Behavioral family therapy examines how behaviors are reinforced or discouraged.</p><div class="tc-example"><strong>Reinforcement example</strong>Child tantrums → parent gives in to stop the tantrum → tantrum decreases immediately → child learns tantrum works → parent learns giving in brings short-term peace → pattern repeats. Therapy changes reinforcement patterns.</div>`),
          t("Cognitive Restructuring in Family Contexts",`<p>Family members interpret each other's behavior. These interpretations shape emotion and response.</p><div class="tc-example"><strong>Example chain</strong>Teen forgets chore → parent interpretation: "He does not respect me" → emotion: anger → response: yelling → teen interpretation: "They always attack me" → response: withdrawal. Cognitive restructuring helps family members consider alternative interpretations.</div>`),
          t("Reinforcement Patterns",`<p>CBFT examines what behaviors receive attention, escape, approval, or relief. Questions: What behavior is being rewarded? What behavior is being ignored? What does the child gain or avoid? What does the parent gain or avoid? Are consequences consistent?</p>`),
          t("Communication Skills Training",`<p>CBFT often teaches communication skills: active listening; I-statements; clear requests; praise; calm correction; timeout; respectful disagreement; and problem-solving steps. Skills are practiced, not only discussed.</p>`),
          t("Problem-Solving Training",`<p>Problem-solving training teaches families to define problems clearly and create realistic plans.</p><ol><li>Define the problem specifically</li><li>Brainstorm solutions</li><li>Evaluate pros and cons</li><li>Choose one solution</li><li>Assign responsibilities</li><li>Try it for a limited time</li><li>Review and adjust</li></ol>`),
          t("Parent Management Training",`<p>Parent management training helps caregivers change child behavior through structure, reinforcement, predictable consequences, and positive attention. Core tools: labeled praise; clear commands; reward systems; planned ignoring; consistent consequences; routines; behavior charts; parent emotion regulation. Parent training is especially useful for oppositional behavior, ADHD-related behavior challenges, and routine problems.</p>`),
          t("Behavioral Contracts",`<p>Behavioral contracts clarify expectations, responsibilities, rewards, and consequences. They work best when realistic and collaborative.</p><div class="tc-example"><strong>Example homework contract</strong>Child agrees to begin homework by 5:00 p.m. and work for 25 minutes before break. Parent agrees to give one reminder only, check work calmly, and provide praise for starting. Reward: 30 minutes of game time after completion. Review: Sunday evening.</div>`),
          t("Homework and Skill Practice",`<p>CBFT often uses homework because change must occur outside sessions. Examples: track conflict triggers; practice listening exercise; use reward chart; schedule parent-child time; complete thought record; use timeout plan; hold family meeting. Homework should be simple and reviewed.</p>`),
          t("Strengths and Limitations",`<div class="tc-subhead">Strengths</div><ul><li>Structured, practical, and measurable</li><li>Strong for child behavior and parenting</li><li>Useful for communication problems; compatible with evidence-based practice</li></ul><div class="tc-subhead">Limitations</div><ul><li>May feel too mechanical if emotion is ignored</li><li>May underemphasize family history, meaning, culture, or trauma</li><li>Behavior plans fail if power, safety, or attachment issues are not addressed</li><li>Requires consistency and follow-through</li></ul>`)
        ]
      },
      { title:"Psychoeducational and Evidence-Based Interventions",
        intro:"Psychoeducational and evidence-based family interventions use structured methods to help families understand and respond to specific clinical problems. These approaches are common in serious mental illness, addiction, eating disorders, child behavior problems, and adolescent risk. These models often combine education, skill-building, relapse prevention, family support, and structured treatment protocols.",
        topics:[
          t("Psychoeducation in Family Therapy",`<p>Psychoeducation gives families accurate information about symptoms, diagnosis, treatment, relapse signs, communication, and support. It helps reduce: blame; stigma; confusion; criticism; helplessness; and fear.</p><div class="tc-example"><strong>Example</strong>A family may interpret depression as laziness. Psychoeducation helps them understand depression as a real condition while still supporting healthy routines and responsibility.</div>`),
          t("Family-Based Treatment for Eating Disorders",`<p>Family-Based Treatment, especially for adolescent anorexia nervosa, empowers parents to help restore eating and interrupt the eating disorder. Key principles: externalize the eating disorder; parents are not blamed; food and weight restoration are urgent; family supports recovery; adolescent autonomy is gradually restored as health stabilizes.</p><div class="tc-quote">Therapist language: "Your child is not the enemy. The eating disorder is the enemy, and the family is part of the recovery team."</div><p>Medical monitoring is essential.</p>`),
          t("Functional Family Therapy",`<p>Functional Family Therapy is an evidence-based model often used with adolescents with behavioral problems, delinquency, or family conflict. It typically includes: engagement and motivation; reducing blame; identifying family functions of behavior; behavior change; communication and parenting skills; generalization to school and community. FFT tries to understand what behaviors accomplish in the family before changing them.</p>`),
          t("Multisystemic Therapy",`<p>Multisystemic Therapy is an intensive model for serious adolescent behavior problems. It works across family, peers, school, neighborhood, and community systems. Targets may include: parenting practices; peer influences; school engagement; substance use; delinquency; community risk; and family conflict. MST reflects the idea that serious adolescent behavior is rarely maintained by family alone.</p>`),
          t("Behavioral Couples Therapy",`<p>Behavioral Couples Therapy focuses on changing couple interactions through communication skills, behavioral exchange, problem-solving, and recovery support when addiction is involved. Common components: increasing positive interactions; communication training; conflict management; agreements around sobriety or behavior; trust-building; shared reinforcement of healthy behavior.</p>`),
          t("Family Interventions for Psychosis",`<p>Family interventions for psychosis often include psychoeducation, communication training, problem-solving, relapse prevention, and reducing high-conflict or highly critical family climates. Goals: reduce relapse risk; improve family understanding; support treatment adherence; reduce blame; identify early warning signs; support caregiver coping.</p>`),
          t("Family Interventions for Substance Use",`<p>Family interventions for substance use may include education, motivational work, boundaries, relapse prevention, communication, and recovery support. Family work addresses: enabling patterns; secrecy; trust repair; relapse cycles; family roles; safety; recovery support; and boundaries.</p>`),
          t("Parent-Child Interaction Therapy",`<p>Parent-Child Interaction Therapy is a structured, evidence-based intervention for young children with disruptive behavior. It coaches parents in real time to increase positive attention, clear commands, and consistent discipline. Core ideas: strengthen parent-child relationship; coach parent skills live; increase labeled praise; reduce harsh or inconsistent discipline; improve compliance through calm structure.</p>`),
          t("Evidence-Based Practice and Clinical Judgment",`<p>Evidence-based practice does not mean blindly applying manuals. It means integrating: best available research; clinical expertise; client values, culture, and preferences; safety and context; and therapist competence.</p><div class="tc-motto">The therapist must know when a structured model fits and when adaptation is required.</div>`)
        ]
      },
      { title:"Integrative and Eclectic Family Therapy",
        intro:"Integrative family therapy combines ideas and interventions from multiple models in a coherent way. Eclectic therapy becomes risky when techniques are mixed without a clear case formulation. The central integrative question is: what does this family need now, and which model best addresses that need?",
        topics:[
          t("Why Therapists Integrate Models",`<p>Families are complex. A single model may not address every layer.</p><div class="tc-example"><strong>Example</strong>A family with adolescent substance use may need: structural work to strengthen parental hierarchy; motivational interviewing for ambivalence; CBT skills for relapse prevention; narrative work to reduce shame; trauma-informed care; and school/community collaboration. Integration reflects clinical reality.</div>`),
          t("Common Factors in Family Therapy",`<p>Across models, several common factors support change: strong therapeutic alliance; hope; reduced blame; new emotional experience; clearer communication; safety; shared goals; practice of new patterns; therapist credibility; and family strengths. Even different models often work through similar change processes.</p>`),
          t("Matching Model to Family Need",`<p>Model selection should follow the family's problem.</p><table class="tc-table"><thead><tr><th>Family Need</th><th>Best-Fit Model</th></tr></thead><tbody><tr><td>Boundary or hierarchy problem</td><td>Structural therapy</td></tr><tr><td>Intergenerational anxiety</td><td>Bowenian therapy</td></tr><tr><td>Repetitive failed solution</td><td>Strategic therapy</td></tr><tr><td>Shame-based identity story</td><td>Narrative therapy</td></tr><tr><td>Brief, goal-focused problem</td><td>Solution-focused therapy</td></tr><tr><td>Attachment rupture</td><td>Emotionally focused therapy</td></tr><tr><td>Child behavior problem</td><td>CBFT / parent training</td></tr><tr><td>Serious mental illness</td><td>Psychoeducation + relapse prevention</td></tr><tr><td>Trauma or safety concerns</td><td>Trauma-informed, phased treatment</td></tr></tbody></table>`),
          t("Combining Structural, Emotional, Cognitive, and Narrative Work",`<p>A family may need several levels of intervention. Example sequence:</p><ol><li><strong>Structural:</strong> restore parental leadership</li><li><strong>Emotional:</strong> help parent and child express hurt beneath anger</li><li><strong>Cognitive-behavioral:</strong> create homework and screen-time routines</li><li><strong>Narrative:</strong> shift story from "bad kid" to "family learning responsibility and trust"</li></ol><p>Integration works best when sequenced clearly.</p>`),
          t("Phase-Based Integrative Treatment",`<p>A phase-based approach organizes therapy over time.</p><table class="tc-table"><thead><tr><th>Phase</th><th>Focus</th></tr></thead><tbody><tr><td>Phase 1: Engagement and Safety</td><td>Join, assess risk, build alliance, stabilize</td></tr><tr><td>Phase 2: Assessment and Conceptualization</td><td>Map cycles, structure, history, culture, trauma, strengths</td></tr><tr><td>Phase 3: Pattern Interruption</td><td>Structural, strategic, communication, or behavioral interventions</td></tr><tr><td>Phase 4: Emotional and Meaning Repair</td><td>Attachment, grief, trauma, shame, or narrative work</td></tr><tr><td>Phase 5: Consolidation</td><td>Practice new patterns, track progress, prevent relapse, plan termination</td></tr></tbody></table>`),
          t("Risks of Unstructured Eclecticism",`<p>Unstructured eclecticism occurs when the therapist uses many techniques without a coherent theory. Risks: confusing the family; avoiding difficult issues; using favorite techniques regardless of fit; missing safety concerns; failing to track progress; treating symptoms without understanding patterns; changing direction too often.</p><div class="tc-quote">A therapist should always be able to explain: "Why am I using this intervention with this family at this time?"</div>`),
          t("Developing a Personal Clinical Model",`<p>Over time, therapists develop a personal model. This should be intentional, ethical, culturally humble, and evidence-informed. A personal clinical model answers: What is my view of human nature? What is my view of family change? Which theories shape my thinking most? How do I assess families? How do I address safety? How do I integrate culture and spirituality? How do I use myself as therapist? How do I measure progress? What are my limitations?</p><div class="tc-motto">A mature therapist is not model-less. A mature therapist is flexible with a clear center.</div>`)
        ]
      }
    ]
  },

  { part:"III", partClass:"part-III", title:"Assessment and Case Conceptualization",
    partIntro:"Family therapy assessment is not simply collecting background information. It is a disciplined way of understanding how symptoms, conflicts, strengths, roles, histories, meanings, and larger social contexts organize the family system. Assessment and case conceptualization are closely linked: assessment gathers the raw material; case conceptualization organizes that material into a working explanation of what maintains the problem and what may help the family change. Treatment planning then translates the conceptualization into collaborative goals, intervention choices, safety steps, session structure, and progress measures.",
    chapters:[
      { title:"Family Assessment",
        intro:"Family assessment is the foundation of effective treatment. It helps the therapist understand not only 'what is wrong,' but also 'what is happening between people,' 'how the family has adapted,' 'what strengths already exist,' and 'what risks require immediate attention.' A strong family assessment is systemic, developmental, culturally responsive, trauma-informed, and safety-conscious. It does not reduce the family to pathology, nor does it ignore real harm.",
        topics:[
          t("Purpose of Assessment",`<p>The purpose of family assessment is to form a clear, clinically useful picture of the family system — identifying the presenting problem, understanding the relational patterns that maintain it, recognizing family strengths, assessing safety, and deciding what kind of treatment is appropriate.</p>
<p>Assessment answers several core questions:</p>
<ul><li>Who is involved in the problem? How does each person define it?</li><li>When did the problem begin, and what changed around that time?</li><li>What interactional cycles keep the problem alive?</li><li>What roles, boundaries, rules, and hierarchies are operating?</li><li>What stressors exist outside the family?</li><li>What strengths and resources can support change?</li><li>Are there safety concerns that make conjoint family therapy inappropriate?</li></ul>
<div class="tc-motto">A family therapist should avoid treating assessment as a one-time intake task. Assessment continues throughout therapy as trust develops and patterns become visible.</div>`),
          t("Intake Process",`<p>The intake process begins before the first full intervention. It usually includes referral information, initial contact, consent procedures, preliminary risk screening, basic family composition, and an initial understanding of the presenting concern.</p>
<p>In family therapy, intake requires special attention because there is rarely only one "client." The therapist must clarify who requested therapy, who is expected to attend, who agrees or disagrees with therapy, and whether any member feels pressured to participate. Informed consent should explain confidentiality, secrets, record keeping, communication outside sessions, and how the therapist handles information shared by one member but not others.</p>
<p>A well-structured intake includes: referral source and reason; who is seeking help and who is reluctant; immediate safety concerns; family members and household structure; major recent events or transitions; medical, psychiatric, school, work, legal, or substance-related concerns; cultural, religious, and community context; previous therapy experiences; and family goals and expectations.</p>
<div class="tc-quote">The intake should balance structure and warmth. If the therapist becomes too procedural, the family may feel interrogated. If too informal, important risk or consent issues may be missed.</div>`),
          t("Presenting Problem",`<p>The presenting problem is the issue the family brings to therapy — a child's behavior problem, marital conflict, adolescent defiance, grief, addiction, depression, anxiety, school refusal, estrangement, or communication breakdown.</p>
<p>Family therapy does not assume the identified problem belongs only to the most symptomatic person. The therapist asks how the problem is experienced across the system. A useful assessment distinguishes between:</p>
<ul><li><strong>The family's stated problem:</strong> "Our son is out of control"</li><li><strong>The interactional problem:</strong> "When parents disagree, the son escalates and one parent rescues while the other becomes harsher"</li><li><strong>The developmental problem:</strong> "The family is struggling to renegotiate autonomy during adolescence"</li><li><strong>The emotional problem:</strong> "Fear, shame, grief, or helplessness is expressed as blame or anger"</li><li><strong>The systemic function:</strong> "The symptom may stabilize, distract, protect, communicate, or organize the family"</li></ul>
<p>This does not mean the symptom is not real — it means the symptom is understood in context.</p>`),
          t("Family Composition",`<p>Family composition includes more than a list of people in the household. It includes biological relatives, adoptive relatives, stepfamily members, co-parents, grandparents, extended kin, chosen family, foster relationships, spiritual/community figures, and significant absent members.</p>
<p>The therapist should ask: Who lives in the home? Who is legally, emotionally, or practically responsible for children? Who is considered family by the family members themselves? Who has influence even if they do not live in the household? Who is missing, estranged, deceased, incarcerated, deployed, or geographically distant? Are there multiple households involved? Are there blended, adoptive, foster, kinship-care, or transnational family structures?</p>
<div class="tc-example"><strong>Why it matters</strong>A grandmother, former spouse, religious leader, adult sibling, or deceased parent may strongly shape family rules, loyalties, grief, or decision-making — even without being in the room.</div>`),
          t("Relational Patterns",`<p>Relational patterns are repeated sequences of interaction. They are central to family therapy assessment because families often seek help for content problems but remain stuck because of process patterns.</p>
<div class="tc-example"><strong>Example cycle</strong>Parent criticizes → adolescent withdraws → parent feels ignored → parent escalates → adolescent explodes → family blames adolescent → cycle repeats.</div>
<p>A therapist assesses: who pursues and who withdraws; who escalates and who de-escalates; who mediates conflict; who becomes the scapegoat; who aligns with whom; who is excluded; what topics trigger conflict; how repair happens or fails; how affection, apology, and reassurance are expressed.</p>
<div class="tc-motto">Family assessment should observe live interaction whenever possible. What families say about their patterns matters, but what happens in the room often reveals more.</div>`),
          t("Strengths and Resources",`<p>A family assessment should never be only deficit-based. Families come to therapy because something is painful, but they also bring resilience, loyalty, sacrifice, humor, faith, cultural wisdom, survival skills, and love.</p>
<p>Strengths may include: commitment to staying connected; willingness to attend therapy; history of overcoming adversity; emotional warmth; shared rituals; extended family support; spiritual or religious resources; cultural identity; financial or practical stability; school or community supports; communication skills in some contexts; humor and playfulness; and capacity for apology or repair.</p>
<div class="tc-quote">Strengths are not decorative. They become part of the treatment plan. A family that already eats dinner together may use that ritual for structured check-ins. A family with strong faith may use spiritual meaning, forgiveness practices, or community support.</div>`),
          t("Risk Assessment",`<p>Risk assessment is essential in family therapy because multiple people may be affected by one member's behavior. The therapist must assess danger to self, danger to others, child abuse or neglect, elder abuse, intimate partner violence, coercive control, substance-related danger, severe psychiatric instability, weapons access, and unsafe living conditions.</p>
<p>Important risk domains include: suicidal ideation, plans, means, history, and protective factors; self-harm; homicidal ideation or threats; domestic violence and coercive control; child abuse, neglect, or exposure to violence; elder or dependent adult abuse; sexual abuse; severe substance use and overdose risk; psychosis, mania, or severe depression; stalking or harassment; and medical neglect.</p>
<div class="tc-motto">Risk assessment affects the treatment format. Conjoint family or couples therapy may be contraindicated when there is coercive control, intimidation, severe violence, or a realistic risk that open discussion in therapy will increase danger at home.</div>
<p>A family therapist must know local laws regarding mandated reporting, duty to protect, and documentation.</p>`),
          t("Cultural and Spiritual Assessment",`<p>Culture and spirituality shape family identity, authority, gender roles, parenting expectations, emotional expression, conflict rules, help-seeking behavior, marriage expectations, grief rituals, and ideas about forgiveness or obligation.</p>
<p>A culturally responsive assessment asks: What cultural communities shape this family? What languages are spoken at home? What values guide parenting, marriage, gender, elders, and children? How does the family understand mental health and therapy? What migration, discrimination, or acculturation experiences matter? What spiritual or religious beliefs guide the family? Are there conflicts between generations around culture, faith, or assimilation? Are there rituals, leaders, communities, or practices that support the family?</p>
<div class="tc-quote">The therapist should avoid assuming that culture is only relevant when a family is "different" from the therapist. Every family has culture. The therapist's own assumptions about independence, emotional expression, gender equality, authority, privacy, religion, and boundaries may reflect a cultural position rather than universal truth.</div>`),
          t("Trauma and Adverse Experiences",`<p>Trauma assessment explores how overwhelming experiences have affected individuals and relationships. Trauma may include abuse, neglect, violence, war, displacement, racism, bullying, medical trauma, sudden loss, accidents, addiction, incarceration, or chronic emotional invalidation.</p>
<p>In family therapy, trauma is assessed at multiple levels: individual trauma symptoms; family responses to trauma; intergenerational trauma patterns; attachment injuries; silence, secrecy, or shame; protective adaptations that now create problems; trauma triggers during family conflict; family rituals around grief and memory; and resilience and survival strategies.</p>
<div class="tc-motto">A trauma-informed therapist does not force disclosure. Safety, pacing, stabilization, and consent matter. The therapist must carefully decide what belongs in individual work, what belongs in family work, and what should not yet be opened in a conjoint session.</div>`),
          t("Medical, Psychiatric, and Substance Use History",`<p>Family symptoms often interact with medical, psychiatric, and substance-related issues. Assessment should include relevant diagnoses, medications, hospitalizations, sleep problems, chronic illness, neurological conditions, pain, disability, hormonal changes, addiction history, and family psychiatric history.</p>
<p>Questions may include: Has anyone received a mental health diagnosis or been hospitalized psychiatrically? Are there current medications? Is there chronic illness, pain, disability, or neurodevelopmental difference? Is substance use affecting safety, trust, finances, parenting, or conflict? Is there a family history of depression, bipolar disorder, psychosis, suicide, addiction, or trauma? How does the family understand and respond to illness?</p>
<div class="tc-example"><strong>Why substance use is systemic</strong>Addiction often affects roles, finances, secrecy, trust, parenting, and emotional regulation. Family interactions can either maintain the problem or support recovery — substance use disorders are embedded in family and social contexts, not merely individual behavior.</div>`),
          t("School, Work, and Community Context",`<p>Families exist inside larger systems. A child's symptoms may relate to school stress, learning differences, bullying, peer dynamics, racism, academic pressure, or teacher relationships. Adult conflict may be shaped by unemployment, work stress, financial strain, caregiving burden, immigration systems, legal pressure, housing instability, or community isolation.</p>
<p>Assessment should include: school performance and attendance; peer relationships; special education or learning concerns; workplace stress; financial stress; housing stability; legal involvement; religious or community support; neighborhood safety; social isolation; and healthcare access.</p>
<div class="tc-quote">This prevents over-pathologizing the family. Sometimes the family is not "dysfunctional" — it is overloaded by structural pressures.</div>`)
        ]
      },
      { title:"Genograms and Family Mapping",
        intro:"A genogram is a visual map of family structure, relationships, patterns, losses, illnesses, conflicts, alliances, and intergenerational themes. It is more than a family tree. In family therapy, it helps organize complex information and reveal patterns that may not be obvious through conversation alone. McGoldrick, Gerson, and Petry's work popularized the genogram as a standard tool for family assessment — a graphic method for organizing family information and identifying patterns across the family system.",
        topics:[
          t("Purpose of Genograms",`<p>The purpose of a genogram is to make the family system visible. It helps the therapist and family see structure, repetition, trauma, resilience, illness, relational closeness, cutoff, migration, faith, secrets, losses, and developmental transitions.</p>
<p>Genograms can help identify: repeated marital patterns; divorce and remarriage patterns; estrangement and emotional cutoff; addiction across generations; trauma and abuse patterns; premature deaths or unresolved grief; mental illness patterns; parentification; migration and displacement; cultural and religious continuity; and family strengths and survival patterns.</p>
<div class="tc-quote">The genogram also helps families externalize the problem. Instead of blaming one person, the family may begin to see a pattern: "This did not start with us; we inherited part of it, and now we can respond differently."</div>`),
          t("Basic Genogram Symbols",`<p>Basic genogram symbols usually represent gender, couple relationships, children, separation, divorce, death, adoption, pregnancy loss, household membership, and emotional relationships.</p>
<div class="tc-example"><strong>Common conventions</strong>Square = male; Circle = female; Horizontal line between partners = relationship/marriage; Slash through relationship line = separation/divorce; X through symbol = deceased; Vertical line down = child; Dashed line = non-marital or less formal relationship; Circle around household members = people living together.</div>
<p>Because gender identity and family forms are diverse, therapists should use symbols respectfully and flexibly. The purpose is not to force the family into rigid categories but to create a useful clinical map.</p>`),
          t("Mapping Family Structure",`<p>Mapping structure means identifying who belongs to the family system and how people are connected. This includes current households, previous marriages, step-relations, adoptive ties, foster placements, co-parenting arrangements, kinship care, and chosen family.</p>
<p>Important structural questions include: Who are the parental figures? Who are the siblings, half-siblings, step-siblings, and adopted siblings? Who lives together? Who has legal authority? Who has emotional authority? Who is absent but influential? Who is cut off? Who is central to caregiving?</p>
<div class="tc-example"><strong>Why structure is often more complex than it looks</strong>A mother's sister may function as the real co-parent; a deceased grandfather may still organize family identity; a former spouse may still shape household conflict.</div>`),
          t("Mapping Emotional Relationships",`<p>Genograms often include emotional relationship patterns such as closeness, conflict, cutoff, fusion, distance, abuse, or ambivalence. Mapping emotional relationships helps identify triangles, alliances, coalitions, scapegoating, and unspoken loyalties.</p>
<div class="tc-example"><strong>Example</strong>A child may be emotionally close to one parent and distant from the other — not because the child is "the problem," but because the parental conflict has placed the child in a loyalty bind.</div>
<p>Common patterns mapped: very close relationship; conflictual relationship; distant relationship; cutoff relationship; abusive relationship; overinvolved relationship.</p>`),
          t("Mapping Patterns Across Generations",`<p>One of the most powerful uses of the genogram is identifying intergenerational patterns. Families often repeat patterns without consciously choosing them — divorce, addiction, emotional cutoff, harsh parenting, silence around grief, migration sacrifice, religious devotion, educational achievement, gendered expectations, or caregiving roles.</p>
<p>The therapist may ask: What patterns seem to repeat across generations? Who carried responsibility too early? Who was excluded or forgotten? Who broke a family pattern? What strengths were passed down? What wounds were passed down? What did each generation learn about love, anger, loyalty, money, gender, faith, and authority?</p>
<div class="tc-motto">The goal is not fatalism. Intergenerational patterns are not destiny. They are material for awareness and choice.</div>`),
          t("Illness, Addiction, Trauma, and Loss Patterns",`<p>Genograms are especially useful for mapping health and trauma histories. Patterns of depression, bipolar disorder, suicide, addiction, chronic illness, disability, violence, early death, infertility, miscarriage, war trauma, migration trauma, or family secrecy may affect current functioning.</p>
<p>Questions include: Are there repeated illnesses or diagnoses? Were there sudden deaths or traumatic losses? Is there a pattern of addiction? Has violence occurred in more than one generation? Are there unresolved grief points? Are some topics forbidden? Who carries the family's pain?</p>
<div class="tc-quote">This mapping should be done with care. Families may feel exposed or ashamed. The therapist should frame the genogram as a tool for understanding and compassion, not blame.</div>`),
          t("Migration and Cultural History",`<p>Migration history can deeply shape family roles, sacrifice, identity, and conflict. Families may carry stories of displacement, survival, opportunity, loss, discrimination, language change, and cultural adaptation.</p>
<p>Assessment may include: country or region of origin; reasons for migration; voluntary or forced migration; refugee or asylum experiences; separation and reunification; language shifts; acculturation differences between generations; transnational caregiving; obligations to relatives abroad; and changes in gender, parenting, and authority after migration.</p>
<div class="tc-quote">Migration often creates both resilience and strain. Parents may emphasize sacrifice and cultural continuity, while children may seek autonomy and belonging in the new culture. Therapy can help families honor both survival history and developmental change.</div>`),
          t("Spiritual and Religious Lineage",`<p>Spiritual and religious lineage refers to how faith, rituals, moral values, religious authority, spiritual wounds, and meaning systems are transmitted across generations.</p>
<p>Questions include: What religious or spiritual traditions are present in the family? Were there conversions, losses of faith, or interfaith marriages? Are spiritual practices a source of support or conflict? Are there religious expectations around marriage, parenting, gender, sexuality, forgiveness, or obedience? Are there spiritual leaders who influence the family? Has religion been used to comfort, control, shame, or heal? What rituals help the family grieve, celebrate, reconcile, or endure hardship?</p>
<div class="tc-motto">Spiritual assessment should be respectful and non-impositional. The therapist's role is not to decide theological truth but to understand how meaning functions in the family system.</div>`),
          t("Genogram Interview Questions",`<p>A genogram interview should feel like a guided exploration, not an interrogation. Questions can move from factual to emotional to interpretive.</p>
<ul><li>Who should be included in this family map?</li><li>Who lives in the household now? Who used to be central but is now absent?</li><li>Who is closest to whom? Where is there tension or cutoff?</li><li>What major losses shaped the family?</li><li>What illnesses or addictions have affected the family?</li><li>What patterns repeat across generations?</li><li>Who in the family carried too much responsibility? Who was protected? Who was blamed?</li><li>What family stories are told often? What family stories are avoided?</li><li>What values were passed down? What strengths helped the family survive?</li><li>What would you like future generations not to repeat?</li></ul>
<div class="tc-quote">The final question is especially clinically useful — it converts assessment into motivation for change.</div>`),
          t("Clinical Use of Genograms",`<p>Genograms can be used in many phases of therapy:</p>
<ul><li><strong>Assessment:</strong> organizing family history and structure</li><li><strong>Engagement:</strong> inviting family members to tell their stories</li><li><strong>Hypothesis formation:</strong> identifying patterns and possible maintaining factors</li><li><strong>Intervention:</strong> reframing blame into intergenerational understanding</li><li><strong>Treatment planning:</strong> identifying who should attend, what issues matter, and what strengths can be used</li><li><strong>Termination:</strong> reviewing change and identifying new family patterns</li></ul>
<div class="tc-motto">A genogram is not only a diagnostic tool. It can become a therapeutic intervention by helping the family see itself differently.</div>`)
        ]
      },
      { title:"Case Conceptualization",
        intro:"Case conceptualization is the therapist's working explanation of the family's problem, its maintaining patterns, its historical roots, its protective factors, and the pathway toward change. It is not a fixed verdict — it is a living hypothesis. How the therapist understands the problem determines what the therapist tries to change. A good family therapy conceptualization answers: What is the problem? Who defines it this way? How is it maintained? What relational cycles organize it? What developmental, cultural, trauma, spiritual, and social contexts shape it? What strengths can support change? What risks must be managed?",
        topics:[
          t("What Is Case Conceptualization?",`<p>Case conceptualization is a bridge between assessment and intervention. Without conceptualization, therapy becomes a collection of techniques. With conceptualization, interventions become purposeful.</p>
<p>A basic systemic formulation may include:</p>
<ol><li>Presenting concern</li><li>Family structure</li><li>Interactional cycle</li><li>Developmental context</li><li>Intergenerational patterns</li><li>Cultural and spiritual meanings</li><li>Trauma and risk factors</li><li>Strengths and protective factors</li><li>Maintaining factors</li><li>Treatment hypothesis</li><li>Goals and intervention plan</li></ol>
<div class="tc-motto">A strong conceptualization remains humble. It should be revised as new information appears.</div>`),
          t("Individual vs. Relational Formulation",`<p>An individual formulation explains symptoms primarily inside the person. A relational formulation explains symptoms in connection with interaction patterns, roles, family history, and context.</p>
<div class="tc-example"><strong>Individual formulation</strong>The child has anxiety and refuses school.</div>
<div class="tc-example"><strong>Relational formulation</strong>The child's anxiety increases when parental conflict rises. School refusal brings both parents together temporarily, reducing marital conflict but reinforcing the child's avoidance.</div>
<p>The relational formulation does not deny the child's anxiety — it adds context. The child may still need individual coping skills, school support, and perhaps medical evaluation. But family therapy asks how family patterns can reduce or intensify the anxiety.</p>`),
          t("Identifying Interactional Cycles",`<p>Interactional cycles are repeating loops in which each person's behavior influences the next person's behavior. The therapist looks for sequences rather than villains.</p>
<div class="tc-example"><strong>Example</strong>Mother worries → asks many questions → daughter feels controlled → daughter hides information → mother discovers secrecy → mother becomes more anxious → daughter withdraws further.</div>
<div class="tc-quote">The cycle becomes the target of therapy. The therapist may say: "The enemy is not mother or daughter. The enemy is the worry-control-secrecy cycle." This reduces blame and creates a shared object of change.</div>`),
          t("Understanding the Function of Symptoms",`<p>In systemic thinking, symptoms may have a function in the family system. This does not mean symptoms are intentional or fake — it means symptoms can organize relationships in predictable ways.</p>
<p>A symptom may: express what cannot be spoken; distract from another conflict; bring distant family members together; protect someone from abandonment; stabilize a fragile relationship; signal developmental stress; preserve loyalty to a past generation; communicate grief, fear, or shame.</p>
<div class="tc-example"><strong>Example</strong>A child's acting out may function as a signal that the family is overwhelmed, or it may pull parents away from marital conflict into a shared parenting task.</div>
<div class="tc-motto">The therapist must be careful: explaining function should never become blaming the symptomatic person.</div>`),
          t("Mapping Strengths and Protective Factors",`<p>A case conceptualization should include what protects the family, not only what harms it. Protective factors may include: secure attachment with at least one caregiver; willingness to seek help; extended family support; spiritual practices; stable routines; emotional warmth; financial stability; school engagement; humor; insight; previous successful problem-solving; cultural identity; and capacity for repair.</p>
<div class="tc-quote">Treatment often begins by amplifying existing strengths before challenging deeper patterns.</div>`),
          t("Developmental Formulation",`<p>A developmental formulation asks whether the family is struggling with a normal life-cycle transition. Many family problems intensify during predictable transitions: marriage, birth of a child, adolescence, launching young adults, aging parents, retirement, illness, divorce, remarriage, migration, or bereavement.</p>
<div class="tc-example"><strong>Examples</strong>A toddler's birth may expose unclear parental roles. Adolescence may challenge an overly rigid hierarchy. Launching children may intensify marital emptiness. Aging parents may reorganize sibling roles.</div>
<p>Developmental formulation prevents pathologizing normal transitions while still addressing maladaptive responses.</p>`),
          t("Cultural Formulation",`<p>A cultural formulation examines how culture shapes the family's understanding of the problem, help-seeking, authority, emotion, gender, parenting, marriage, and obligation.</p>
<p>Questions include: What does this family consider normal or healthy? What does the family consider shameful? Who has authority to define the problem? How are emotions expressed or restrained? What cultural values are being protected? Are there conflicts between individual autonomy and family loyalty? Is the therapist imposing an individualistic model on a collectivist family?</p>
<div class="tc-motto">A cultural formulation should not stereotype. It should be built through curiosity and collaboration.</div>`),
          t("Trauma-Informed Formulation",`<p>A trauma-informed formulation asks how past danger shapes current protection strategies. Many behaviors that look irrational may once have been adaptive.</p>
<ul><li>Hypervigilance may have protected someone in an unsafe home</li><li>Emotional shutdown may have reduced harm during conflict</li><li>Control may have reduced unpredictability</li><li>Avoidance may have prevented overwhelm</li><li>Aggression may have developed as self-protection</li></ul>
<p>The therapist asks: What happened? What did each person learn from it? How did the family adapt? Which adaptations still protect? Which adaptations now harm connection? What safety is needed before deeper work?</p>
<div class="tc-motto">Trauma-informed family therapy must avoid pushing vulnerable disclosure before emotional and physical safety are established.</div>`),
          t("Spiritual and Meaning-Based Formulation",`<p>A spiritual and meaning-based formulation explores how the family interprets suffering, responsibility, forgiveness, destiny, morality, hope, and healing.</p>
<p>Questions include: What does this problem mean to the family? Is the family interpreting it as failure, punishment, test, illness, injustice, betrayal, or opportunity? Are religious beliefs supporting healing or increasing shame? Are forgiveness and reconciliation being confused with lack of accountability? Are spiritual rituals available for grief, repair, or renewal? Is there a moral injury in the family? What gives the family hope?</p>
<div class="tc-quote">This formulation is especially important when families bring religious or existential language into therapy. The therapist should respect meaning while also protecting safety and autonomy.</div>`),
          t("Creating a Treatment Hypothesis",`<p>A treatment hypothesis is a concise explanation of what maintains the problem and what may help change it.</p>
<div class="tc-example"><strong>Example hypothesis</strong>The adolescent's defiance is maintained by a pursue-withdraw cycle between father and son, intensified by mother's rescue role and unresolved parental disagreement about authority. The family is also navigating a developmental transition toward adolescent autonomy. Treatment should reduce blame, strengthen the parental coalition, create clearer boundaries, and help father and son develop less reactive communication.</div>
<p>A treatment hypothesis should include: the presenting problem; the maintaining cycle; developmental context; structural concerns; emotional themes; cultural/spiritual meanings if relevant; strengths; and treatment direction.</p>`),
          t("Revising the Hypothesis Over Time",`<p>Family therapy hypotheses must be revised. Early information may be incomplete, distorted by blame, or shaped by crisis. As therapy progresses, hidden grief, trauma, addiction, violence, secrets, or protective strengths may emerge.</p>
<p>The therapist should ask regularly: Does this formulation still fit? What new information changes the picture? Are we blaming one person too much? Are we ignoring risk? Are we ignoring culture or power? Are interventions helping? What does the family say is changing? What do outcome measures show?</p>
<div class="tc-motto">Good conceptualization is flexible, not rigid.</div>`)
        ]
      },
      { title:"Treatment Planning",
        intro:"Treatment planning translates assessment and conceptualization into action. A treatment plan identifies goals, priorities, interventions, session structure, safety procedures, progress measures, and termination criteria. In family therapy, treatment planning should be collaborative — the therapist brings clinical expertise; the family brings lived expertise. The plan should be understandable to the family and flexible enough to evolve.",
        topics:[
          t("Setting Collaborative Goals",`<p>Collaborative goals are created with the family, not imposed on them. Because family members often disagree, the therapist must help create goals that are shared enough to guide therapy.</p>
<div class="tc-example"><strong>Weak goal</strong>"Fix our child."</div>
<div class="tc-example"><strong>Stronger goal</strong>"Reduce daily parent-child conflict from five escalations per week to one or fewer, while helping the child express frustration without aggression and helping parents respond with consistent limits."</div>
<p>Collaborative goals should be: meaningful to the family; specific enough to guide therapy; relational, not only individual; realistic; connected to safety when needed; respectful of culture and values; and measurable when possible.</p>`),
          t("Defining Measurable Outcomes",`<p>Measurable outcomes help the therapist and family know whether therapy is working. Outcomes may include symptom reduction, improved communication, fewer conflicts, increased school attendance, better parenting consistency, improved emotional safety, reduced substance use, or greater relationship satisfaction.</p>
<ul><li>Family arguments decrease from daily to twice weekly</li><li>Parents complete a weekly co-parenting meeting</li><li>Child attends school at least 90% of days</li><li>Couple uses a timeout plan before escalation</li><li>Family members report feeling heard at least 7/10 on weekly scaling</li><li>No episodes of physical aggression occur</li><li>Safety plan is reviewed and followed</li></ul>
<p>Outcome measures do not need to make therapy mechanical — they provide feedback and accountability.</p>`),
          t("Prioritizing Problems",`<p>Families often arrive with many problems. The therapist must help prioritize.</p>
<table class="tc-table"><thead><tr><th>Priority</th><th>Focus</th></tr></thead><tbody>
<tr><td>1</td><td>Immediate safety</td></tr>
<tr><td>2</td><td>Abuse, violence, neglect, suicidality, or severe risk</td></tr>
<tr><td>3</td><td>Stabilization of crisis</td></tr>
<tr><td>4</td><td>Substance use or psychiatric instability affecting safety</td></tr>
<tr><td>5</td><td>High-intensity conflict patterns</td></tr>
<tr><td>6</td><td>Parenting or caregiving structure</td></tr>
<tr><td>7</td><td>Communication and emotional repair</td></tr>
<tr><td>8</td><td>Deeper trauma, grief, meaning, or intergenerational work</td></tr>
<tr><td>9</td><td>Maintenance and relapse prevention</td></tr>
</tbody></table>
<div class="tc-motto">Safety comes before insight. Stabilization comes before deep exploration. A family in active danger needs protection, not abstract systems theory.</div>`),
          t("Choosing a Therapeutic Model",`<p>The therapeutic model should fit the family's needs, goals, risks, and readiness.</p>
<table class="tc-table"><thead><tr><th>Family Need</th><th>Suggested Model</th></tr></thead><tbody>
<tr><td>Boundary, hierarchy, and role problems</td><td>Structural family therapy</td></tr>
<tr><td>Intergenerational anxiety, differentiation, emotional cutoff</td><td>Bowenian therapy</td></tr>
<tr><td>Problem-maintaining sequences and brief symptom work</td><td>Strategic therapy</td></tr>
<tr><td>Attachment injuries and emotional disconnection</td><td>Emotionally focused therapy</td></tr>
<tr><td>Shame, identity, and problem-saturated stories</td><td>Narrative therapy</td></tr>
<tr><td>Brief, strengths-based goal movement</td><td>Solution-focused therapy</td></tr>
<tr><td>Communication, parenting, reinforcement, and skills</td><td>Cognitive-behavioral family therapy</td></tr>
<tr><td>Psychosis, bipolar, addiction, eating disorders</td><td>Psychoeducational models</td></tr>
</tbody></table>
<div class="tc-motto">The therapist should avoid model loyalty that ignores the family's actual needs.</div>`),
          t("Determining Session Format",`<p>Family therapy can involve different session formats depending on the treatment hypothesis and safety assessment.</p>
<ul><li><strong>Whole family sessions</strong> — for shared patterns and interactional work</li><li><strong>Couple sessions</strong> — for marital issues, coparenting, or couple dynamics</li><li><strong>Parent-only sessions</strong> — to strengthen the parental coalition before involving children</li><li><strong>Parent-child sessions</strong> — for attachment repair or discipline work</li><li><strong>Sibling sessions</strong> — for sibling conflict or shared grief</li><li><strong>Individual check-ins</strong> — for safety, privacy, or trauma disclosure</li><li><strong>Multi-household sessions</strong> — for co-parenting across homes</li><li><strong>Collateral sessions</strong> — with schools, physicians, or community supports</li></ul>
<div class="tc-quote">Conjoint sessions may be inappropriate when coercive control or retaliation risk exists. The format should always follow the safety assessment.</div>`),
          t("Identifying Who Should Attend",`<p>The therapist should ask who needs to be present for change to occur. The most symptomatic person is not always the most important person to include.</p>
<p>Consider including: parents or caregivers; children or adolescents; step-parents; co-parents in another household; grandparents or kin caregivers; adult siblings; chosen family; foster/adoptive caregivers; and relevant community or spiritual supports with consent.</p>
<div class="tc-motto">More people in the room does not automatically mean better therapy. The therapist must consider safety, privacy, developmental appropriateness, and whether each person's presence supports the goals.</div>`),
          t("Safety Planning",`<p>Safety planning is required when there is risk of suicide, self-harm, violence, abuse, coercive control, relapse, unsafe caregiving, or severe escalation.</p>
<p>A family safety plan may include:</p>
<ul><li>Warning signs of escalation and de-escalation steps</li><li>Where each person can go physically if needed</li><li>Emergency contacts and crisis hotlines</li><li>Removal or securing of lethal means</li><li>Child safety steps; substance relapse plan</li><li>Technology/contact boundaries</li><li>Documentation of mandated reports if applicable</li><li>Follow-up plan</li></ul>
<div class="tc-motto">In cases of domestic violence or coercive control, safety planning should not be conducted in a way that increases danger for the survivor. Separate assessment and specialized referral may be necessary.</div>`),
          t("Session Frequency and Duration",`<p>Session frequency depends on severity, risk, goals, and resources.</p>
<table class="tc-table"><thead><tr><th>Phase</th><th>Frequency</th></tr></thead><tbody>
<tr><td>Active conflict or early treatment</td><td>Weekly sessions</td></tr>
<tr><td>Crisis or high risk</td><td>Twice-weekly or intensive services</td></tr>
<tr><td>Consolidation phase</td><td>Biweekly sessions</td></tr>
<tr><td>Maintenance after improvement</td><td>Monthly booster sessions</td></tr>
<tr><td>Focused brief work</td><td>Time-limited structured treatment</td></tr>
<tr><td>Complex trauma or intergenerational work</td><td>Longer-term therapy</td></tr>
</tbody></table>
<p>Family sessions may require more time than individual sessions because multiple voices, live interaction, and repair work take longer. Some families benefit from 75- or 90-minute sessions, though practical constraints often shape what is possible.</p>`),
          t("Tracking Progress",`<p>Progress tracking helps prevent therapy from drifting and allows the family to see improvement that may otherwise be missed.</p>
<p>Progress can be tracked through: family self-report; scaling questions; symptom measures; relationship satisfaction measures; school attendance; conflict frequency; safety incidents; parenting consistency; homework completion; therapist observation; session rating scales; and goal review.</p>
<div class="tc-example"><strong>Useful tracking questions</strong>What is better since we started? What is still stuck? What happens less often now? What happens with less intensity? What repair happens faster? What would each person rate progress from 0–10? What would move it one point higher?</div>
<div class="tc-quote">Progress in family therapy is not always linear. Sometimes conflict temporarily increases because avoided issues are finally being discussed.</div>`),
          t("Termination Planning from the Beginning",`<p>Termination should be considered from the beginning because therapy is meant to build the family's capacity, not dependence on the therapist.</p>
<p>Early termination planning asks: What would tell us therapy has been successful? What should the family be able to do without the therapist? What warning signs might indicate relapse? What rituals or practices will maintain progress? What support systems will remain after therapy?</p>
<div class="tc-example"><strong>A strong termination plan includes</strong>Review of original goals; evidence of progress; skills the family has learned; remaining vulnerabilities; relapse prevention plan; future support options; and meaningful closure.</div>
<div class="tc-motto">Termination is not merely stopping sessions. It is the consolidation of new patterns.</div>`)
        ]
      }
    ]
  },

  { part:"IV", partClass:"part-IV", title:"Core Clinical Skills",
    partIntro:"Core clinical skills are the practical bridge between theory and change. Family therapy is not only about understanding systems; it is about helping people experience a different way of relating inside the therapy room and then carry that new pattern into daily life. The family therapist works with interaction, emotion, meaning, power, roles, communication, conflict, and safety. In individual therapy, the main clinical unit is often the person's inner experience. In family therapy, the clinical unit is the relational field — repeated patterns among people. The therapist's task is not simply to give advice but to help the family notice, interrupt, and reorganize these patterns.",
    chapters:[
      { title:"Joining and Building the Therapeutic Alliance",
        intro:"Joining is the therapist's process of entering the family system in a way that creates trust, respect, safety, and permission to influence the system. Without joining, interventions often feel like criticism. With joining, even difficult feedback can be received as support. In family therapy, alliance is more complex than in individual therapy because the therapist must build a relationship with multiple people simultaneously — and must avoid appearing aligned with one family member against another.",
        topics:[
          t("Joining with the Whole Family",`<p>Joining with the whole family means communicating that every member matters and that the therapist is interested in the system, not in blaming one person. Many families arrive expecting the therapist to judge who is wrong. The therapist must resist becoming the family's referee.</p><div class="tc-quote">A useful early stance: "I want to understand how this problem affects each of you, and how each of you has been trying to deal with it. My goal is not to choose a side, but to help us understand the pattern that keeps pulling everyone into pain."</div><p>Joining includes: greeting each member respectfully; learning names and relationships; asking each person for their view; acknowledging different emotional realities; noticing who is quiet or marginalized; avoiding premature blame; identifying shared hopes; and validating effort before challenging behavior.</p><div class="tc-example"><strong>Therapist language</strong>"Even though you disagree strongly, I can see that each of you came today because the family matters to you." This creates a shared foundation before deeper work begins.</div>`),
          t("Building Trust with Each Member",`<p>Each family member may have a different reason to distrust therapy. A parent may fear being blamed. A teenager may fear being controlled. A spouse may fear exposure. A child may not understand why they are present. A grandparent may see therapy as disrespectful to family privacy. The therapist builds trust by showing each member that their voice will be heard.</p><p>Questions that build trust include:</p><ul><li>What were you told about why the family is coming today?</li><li>What do you hope I understand about your side?</li><li>What are you worried might happen in therapy?</li><li>What would make this feel useful rather than blaming?</li><li>What should I not misunderstand about you?</li></ul><p>Trust is strengthened when the therapist remembers details, uses respectful language, avoids shaming, and acknowledges the courage it takes to speak honestly in front of family members. Trust also requires clarity about confidentiality, session structure, safety rules, and how disagreements will be handled.</p>`),
          t("Managing Split Alliances",`<p>Split alliances occur when some family members experience the therapist as "on their side" while others experience the therapist as against them. This is one of the most common risks in family therapy.</p><div class="tc-example"><strong>Examples</strong>Mother says: "Finally, someone understands me." Father thinks: "The therapist has already decided I am the problem." Teen says: "You only believe my parents." Parents think: "You are letting our child avoid responsibility."</div><p>To manage split alliances, the therapist must frequently rebalance attention — ensuring each person feels understood before being challenged.</p><div class="tc-quote">"I want to pause. I have been asking your mother several questions, but I do not want that to mean I am ignoring your experience. How does this look from your side?"</div><p>If one person tries to recruit the therapist: "I can see why you want me to tell him that he is wrong. But if I become the judge, we may miss the cycle that traps both of you."</p>`),
          t("Respecting Family Hierarchies",`<p>Families have hierarchies: parents, elders, caregivers, older siblings, cultural authorities, and sometimes religious or community figures. Family therapy should not automatically flatten these hierarchies — in many families, respect for elders or parental authority is an important value. However, hierarchy becomes clinically problematic when it is rigid, abusive, chaotic, absent, or developmentally inappropriate.</p><div class="tc-motto">Healthy hierarchy: caregivers carry responsibility; children are protected from adult burdens; authority is firm but not humiliating; leadership serves the family's well-being; power is accountable.</div><div class="tc-quote">"I respect that you are the parents and that final decisions belong to you. I also want to help us understand how your son experiences those decisions, because his response gives us important information."</div>`),
