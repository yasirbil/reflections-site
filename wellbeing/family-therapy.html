          t("Smartphones and Family Interaction",`<p>Smartphones have reorganized family attention, communication, and presence. Common patterns: parents distracted by devices during family interactions; children using devices to avoid emotional engagement; couples texting in the same room instead of talking; families watching separate screens rather than sharing experiences; arguments about phone use that are really arguments about attention and care.</p><p>Clinical questions: When do phones create conflict? Who is most attached to their device? What need does device use serve — connection, escape, stimulation, soothing? What is missed when family members are on their phones?</p><div class="tc-quote">Phones are often the presenting conflict but rarely the real problem. The real problem is usually disconnection, loneliness, or unmet needs that devices temporarily soothe.</div>`),
          t("Social Media and Identity",`<p>Social media shapes identity, social comparison, self-image, and relational connection — especially for adolescents. Exposure to idealized images can intensify body dissatisfaction, social anxiety, and shame. Online social hierarchies can replicate and amplify offline peer dynamics. Social media can also provide belonging, community, identity affirmation, and connection for marginalized young people who feel invisible in their immediate environments.</p><p>Assessment questions: How does social media affect each family member's mood, sleep, and relationships? Is social comparison a source of distress? Are online relationships supplementing or replacing in-person connection? Are there concerns about content, privacy, or exploitation?</p>`),
          t("Screen Time Conflict",`<p>Screen time conflict is one of the most common presenting issues in family therapy involving children and adolescents. Common patterns: parents setting inconsistent limits; adolescents using screens to avoid family conflict; children melting down at screen transitions; gaming as emotional regulation; screens at meals preventing connection; parents modeling unlimited device use while limiting children's.</p><p>A practical approach: treat screen time as a structural family negotiation, not a moral failing. Help families create agreements that are specific, enforceable, consistent, and age-appropriate — and that address the underlying emotional needs screens are meeting.</p>`),
          t("Online Safety",`<p>Online safety concerns include: cyberbullying; exposure to violent or sexual content; contact with predatory strangers; online exploitation; privacy violations; and harmful online communities (pro-eating disorder, self-harm, extremism, or radicalization communities). Parents may feel unprepared to navigate these risks, especially when they are less digitally fluent than their children.</p><p>Clinical approach: address online safety as a collaborative family conversation rather than surveillance. Adolescents who feel monitored and distrusted are more likely to hide online behavior, not less likely to engage in risk. Building digital literacy and open communication is more protective than technical monitoring alone.</p>`),
          t("Gaming and Digital Immersion",`<p>Gaming and digital immersion can serve many functions: entertainment, social connection, stress relief, identity expression, mastery, and belonging. Problematic gaming involves impairment — in sleep, school, relationships, and daily functioning — rather than simply spending many hours playing. Clinical assessment asks what gaming provides that is missing elsewhere, and what functioning is being compromised.</p><div class="tc-example"><strong>Example</strong>An isolated adolescent who games extensively may be meeting social and identity needs online that are not available in the immediate family or school context. The intervention addresses both the gaming and the underlying social deficit.</div>`),
          t("Remote Work and Family Boundaries",`<p>Remote and hybrid work has blurred the boundary between work and home in ways that create both opportunity and strain. Parents working from home may be physically present but psychologically unavailable. Children may have difficulty understanding why a physically present parent is inaccessible. Couples may struggle with proximity without quality time. Privacy, workspace, and schedule become sources of family negotiation.</p><p>Clinical questions: How has remote work changed family routines? Are there clearer or blurrier boundaries between work and family time? Is anyone experiencing increased loneliness or reduced connection despite physical co-presence?</p>`),
          t("Teletherapy with Families",`<p>Teletherapy has expanded access to family therapy — removing barriers of transportation, geography, disability, and schedule. It also introduces new clinical challenges: managing multiple participants in a video session; ensuring privacy when family members are in the same home; supporting children and adolescents in ways that require physical proximity; handling technology failures; and reading nonverbal communication through a screen.</p><p>Best practices for teletherapy with families: establish privacy protocols; clarify who can hear the session; set expectations about off-camera participants; plan for technology backup; adapt exercises for the medium; and remain alert to safety concerns that may require in-person follow-up.</p>`),
          t("Artificial Intelligence and Family Life",`<p>Artificial intelligence is beginning to affect family life in ways that therapists need to understand: AI companions and chatbots that provide emotional connection; AI tools that monitor children's online behavior; AI-generated academic work that affects family conversations about honesty and integrity; and AI systems that shape the information environments family members inhabit.</p><p>For therapy specifically, AI raises questions about privacy, data security, the nature of human connection, and whether AI-mediated support supplements or substitutes for human relationship. These are not only technical questions — they are relational and ethical ones that families are already navigating in real time.</p><div class="tc-motto">Technology is not a problem to be solved. It is a context to be understood — and a lens through which families communicate values about attention, connection, and care.</div>`)
        ]
      }
    ]
  },

  { part:"VII", partClass:"part-VII", title:"Ethics, Law, and Professional Practice",
    partIntro:"Family therapy is not only a clinical practice — it is also an ethical and legal practice. Unlike individual therapy, family therapy involves multiple clients, competing interests, power differences, and complex confidentiality boundaries. The therapist must constantly ask: Who is my client? Who is at risk? What information can I share? What must I report? Where are the boundaries of my role? Ethical family therapy requires balancing care, responsibility, safety, fairness, and professional integrity.",
    chapters:[
      { title:"Ethics in Family Therapy",
        intro:"Ethical practice in family therapy is guided by foundational principles that apply across all therapeutic models. In family therapy, these principles often come into tension with one another because multiple people are simultaneously in the clinical relationship. The therapist must navigate these tensions thoughtfully, transparently, and with ongoing attention to power, culture, safety, and the interests of each family member.",
        topics:[
          t("Multiple Clients and Multiple Relationships",`<p>Family therapy is ethically distinctive because the therapist holds a relationship with multiple people simultaneously — and what benefits one member may complicate or harm another. This is the foundational ethical complexity of the field.</p><p>The therapist must define clearly who the client is: the individual presenting with symptoms? The couple? The whole family system? The answer shapes confidentiality, records, consent, and how competing interests are managed.</p><div class="tc-example"><strong>Examples of competing interests</strong>A spouse discloses an affair in an individual session — should this be held private or brought to the couple? A child reveals fear of a parent. One partner wants to separate; the other does not. One member dominates sessions in ways that silence others. In each case, the therapist must navigate competing rights and needs.</div><div class="tc-quote">Best practice: explicitly define the "client unit" at the beginning of therapy. "We are working together as a family system, which means my primary loyalty is to the health of the whole system and the safety of each person in it."</div>`),
          t("Confidentiality in Family Therapy",`<p>Confidentiality in family therapy is fundamentally more complex than in individual therapy. The central challenge is this: if one family member shares something privately, does the therapist hold that information from the others? Different approaches exist, and the therapist must choose a policy and communicate it clearly at the outset.</p>
<div class="tc-subhead">No-Secrets Policy</div><p>The therapist does not keep information from the family system. Any information that affects the therapeutic work will be brought into the room. This prevents triangulation and maintains therapeutic transparency.</p>
<div class="tc-subhead">Limited Confidentiality</div><p>Some temporary private conversations are permitted, but the therapist retains the right to decide whether and how to bring information into the family work. The therapist will not actively deceive other members.</p>
<div class="tc-subhead">Case-by-Case Disclosure</div><p>The therapist evaluates each private disclosure individually. This provides flexibility but can create inconsistency and confusion.</p>
<div class="tc-quote">Therapist language for informed consent: "What you tell me individually may need to be shared if it affects the family process. I do not keep secrets that undermine our work together."</div>`),
          t("Secrets in Family Therapy",`<p>Secrets are common in family therapy: affairs, financial deceptions, hidden addictions, undisclosed pregnancies, identity matters the person has not shared, plans to separate, abuse, or major health information. When one family member shares a secret privately and asks the therapist to hold it, the therapist faces a significant ethical dilemma.</p><p>Risks of holding secrets: the therapist becomes aligned with one member against others; the secret prevents honest work; if the secret emerges, trust shatters; the therapist may inadvertently collude with deception or danger.</p><div class="tc-example"><strong>Example</strong>A husband tells the therapist privately that he has decided to divorce but has not told his wife. He wants to continue couples therapy while planning separation. The therapist is now holding a secret that fundamentally misrepresents the purpose of the work.</div><div class="tc-motto">Ethical stance: avoid becoming the holder of secrets that undermine the therapeutic system. When a significant secret is disclosed privately, the therapist should work with that person to bring it into the appropriate clinical context — individually or conjointly — rather than carrying it indefinitely.</div>`),
          t("Informed Consent",`<p>Informed consent in family therapy must be adapted for multiple participants. It should be clear, ongoing, and revisited as the work evolves. Elements include: the nature and purpose of therapy; the roles and limitations of the therapist; confidentiality and its limits; how records are kept and what they contain; the right to voluntary participation and withdrawal; fees and policies; legal obligations including mandated reporting; and the policy on individual sessions, private disclosures, and secrets.</p><p>With minor children, consent involves a more complex legal and ethical structure. Legally, parents or guardians often hold consent authority for minors. Clinically, adolescents' developmental capacity for autonomous decision-making must be respected even when they cannot legally provide full consent. The therapist should explain to adolescents what participation involves, what is confidential, and what the limits are — in language they can understand.</p><div class="tc-motto">Informed consent is not a form signed once at intake. It is an ongoing conversation about how therapy works and what the therapist's responsibilities are.</div>`),
          t("Therapist Neutrality and Bias",`<p>Neutrality in family therapy means maintaining equitable curiosity toward all family members rather than prematurely aligning with one person's perspective. However, neutrality does not mean moral indifference.</p><div class="tc-motto">The therapist should be neutral between competing perspectives, not neutral about abuse, safety, coercion, or harm to vulnerable members.</div><p>Therapist bias — including cultural bias, gender assumptions, religious assumptions, class bias, and implicit stereotypes — can distort clinical assessment and treatment. A therapist who labels close multigenerational involvement as "enmeshment" without cultural context may misread a healthy cultural norm. A therapist who favors one communication style as inherently more mature may disadvantage family members from different expressive traditions.</p><div class="tc-example"><strong>Example</strong>A therapist unconsciously aligns with the more articulate partner in couples therapy, giving the less verbally fluent partner's perspective less clinical weight. This bias may reflect class, education, or cultural preference rather than clinical accuracy.</div>`),
          t("Dual Relationships",`<p>Dual relationships occur when the therapist holds another role with the client simultaneously or sequentially: a community leader who also provides therapy; a therapist who knows the family socially; a clinician who provides individual therapy to multiple members of the same family; or a therapist who also offers legal, religious, or financial guidance beyond clinical scope.</p><p>Dual relationships create risks: bias in assessment or intervention; exploitation of the therapeutic relationship; confusion about the therapist's role and loyalties; compromised trust if the non-therapeutic relationship creates conflict; and ethical violations if the dual role creates harm.</p><p>When dual relationships are unavoidable — as may occur in small communities, rural settings, or specialized cultural communities — the therapist should discuss the complexity openly, consult with supervisors, document the conversation, and take extra care to maintain professional integrity.</p>`),
          t("Documentation",`<p>Documentation in family therapy is ethically and legally significant. Records should be: accurate and objective; clinically relevant without unnecessary personal detail; secure and protected from unauthorized access; compliant with relevant privacy laws; and created with awareness that they may be subject to subpoena in legal proceedings.</p><p>The multi-client nature of family therapy raises specific documentation questions: What is recorded about each member? Are individual communications documented in the shared record or separately? How is sensitive information — such as abuse disclosures, mental health history, or safety concerns — handled in records that multiple parties might legally request?</p><div class="tc-motto">The therapist should document in ways that would reflect well on clinical reasoning and that protect client dignity if ever reviewed by courts, licensing boards, or other providers.</div>`),
          t("Ethical Decision-Making Models",`<p>When ethical dilemmas arise, structured thinking helps the therapist act responsibly rather than reactively. A practical ethical decision-making sequence:</p><ol><li>Identify the ethical dilemma clearly</li><li>Identify all stakeholders and their interests</li><li>Review relevant ethical codes and legal requirements</li><li>Consider the cultural and relational context</li><li>Evaluate the risks and benefits of possible actions</li><li>Consult a supervisor or trusted peer</li><li>Choose the best available course of action</li><li>Document your reasoning</li><li>Monitor the outcome and adjust if needed</li></ol><p>Common ethical dilemmas in family therapy: confidentiality vs. safety; secrets vs. transparency; neutrality vs. protection; parental authority vs. child autonomy; cultural respect vs. ethical standards; therapist bias vs. clinical objectivity; multiple clients with genuinely conflicting needs. None of these dilemmas has a single correct answer — they require careful, contextual reasoning.</p>`)
        ]
      },
      { title:"Legal Issues in Family Therapy",
        intro:"Legal issues in family therapy require the therapist to understand their obligations, their limits, and the boundaries of their role. Legal frameworks vary by jurisdiction, but key principles are broadly consistent. The family therapist must know when they are required to report, when they may need to protect a third party, how records are managed legally, and how to navigate court involvement without compromising clinical integrity.",
        topics:[
          t("Mandated Reporting",`<p>Mandated reporting laws require therapists to report suspected abuse, neglect, or danger to designated authorities regardless of confidentiality. Most jurisdictions require reporting of: child abuse and neglect; elder abuse; dependent adult abuse; and in some contexts, imminent risk of harm to self or others. The reporting obligation is triggered by reasonable suspicion — the therapist does not need proof, only reasonable grounds to suspect harm.</p><p>Therapists must know: what constitutes reportable abuse in their jurisdiction; who receives reports; how reports are made; what documentation is required; and what happens next. Failure to report can result in professional discipline, legal liability, and — most importantly — ongoing harm to vulnerable people.</p><div class="tc-quote">Informed consent language: "If I believe someone in your family is being harmed or is in danger, I am legally required to report it. This is a limit to confidentiality I want to be clear about from the beginning."</div>`),
          t("Child Abuse and Neglect",`<p>Child abuse and neglect may come to light in family therapy through direct disclosure, behavioral observation, physical signs, third-party reports, or statements by family members. The therapist must respond clinically and legally — and these obligations are not always the same. Clinical compassion for an abusive parent does not override the legal obligation to report and the ethical obligation to protect the child.</p><p>The therapist should: document what was observed or disclosed accurately; follow the mandated reporting process without delay; inform the client of the report where it is clinically and legally appropriate to do so; and continue to engage therapeutically with the family if safe and appropriate. Making a report does not necessarily end the therapeutic relationship, though it changes it significantly.</p><div class="tc-motto">The therapist's primary obligation in child abuse situations is to the safety of the child, not to the preservation of the therapeutic alliance with adults.</div>`),
          t("Elder Abuse",`<p>Elder abuse may include physical abuse, emotional abuse, financial exploitation, neglect, sexual abuse, or abandonment. It may be perpetrated by family members, caregivers, or others in positions of trust. Older adults may be reluctant to disclose abuse out of fear, shame, loyalty, financial dependence, or cognitive impairment.</p><p>The therapist must assess: whether the older adult has capacity to make independent decisions; whether they are in danger; whether financial exploitation is occurring; whether isolation is being used as a control tactic; and whether the family caregiving situation has deteriorated into neglect. Many jurisdictions require reporting of elder abuse independently of whether the older adult requests help.</p>`),
          t("Domestic Violence Reporting",`<p>Domestic violence reporting requirements vary significantly across jurisdictions and settings. Unlike child abuse, most jurisdictions do not automatically mandate reporting of adult domestic violence without the victim's consent — because reporting without consent can increase danger by alerting the abuser that the victim has disclosed. The therapist must understand local law while prioritizing safety.</p><p>Safety planning and voluntary access to resources are usually more clinically and ethically appropriate than mandatory reporting when adult victims are involved. However, the therapist may be required to report when children are exposed to domestic violence, when serious injury has occurred, or when other mandatory reporting thresholds apply.</p>`),
          t("Custody and Court-Involved Therapy",`<p>Family therapy becomes legally complex when parents are in custody disputes. Therapists may be subpoenaed, asked to provide records, asked to recommend custody arrangements, or pressured by one parent to validate their position. These situations require careful role clarity.</p><p>Important distinctions: a treating therapist's role is to provide care; a custody evaluator's role is to make recommendations to the court. These are separate roles, requiring different training, different consent procedures, and different ethical standards. A treating therapist should not serve as a custody evaluator for the same family — the dual role compromises both clinical care and evaluation integrity.</p><div class="tc-example"><strong>Practical guidance</strong>When subpoenaed, consult with a supervisor and if possible a legal advisor before responding. Provide only what is legally required. Do not offer opinions beyond your clinical observations. Document your reasoning carefully.</div>`),
          t("Subpoenas and Records Requests",`<p>A subpoena is a legal order requiring the therapist to produce records or testimony. Receiving a subpoena does not automatically mean the therapist must immediately disclose everything — it initiates a legal process that requires careful navigation. The therapist should: consult with a supervisor or legal advisor promptly; notify the client; explore whether a privilege claim is appropriate; and respond within the legal timeframe.</p><p>Clients retain a privilege to protect therapy communications in many contexts, but that privilege may be waived — explicitly or implicitly — when clients place their mental health at issue in legal proceedings. The therapist should not assume that confidentiality will be maintained simply because therapy notes feel private.</p><div class="tc-motto">When in doubt with legal proceedings, consult. The combination of clinical, ethical, and legal complexity exceeds what most therapists navigate alone.</div>`),
          t("Duty to Warn and Protect",`<p>When a client makes a serious, credible threat to harm an identifiable third party, the therapist may have a legal and ethical duty to warn that person and/or take other protective action — such as contacting law enforcement, seeking hospitalization, or modifying the therapeutic relationship. This obligation varies significantly by jurisdiction and has evolved since the foundational Tarasoff case in California.</p><p>The therapist must assess: How serious and specific is the threat? How imminent is the danger? Is the intended victim identifiable? What is the clinical context? What is the least restrictive protective action that adequately addresses the risk? Documentation of reasoning is essential in any duty-to-protect situation.</p><div class="tc-motto">The duty to protect overrides confidentiality when the threat is serious, credible, and targeted. The therapist is not expected to act on every expression of frustration — clinical judgment is required.</div>`),
          t("Scope of Practice",`<p>Scope of practice defines what a therapist is trained, licensed, and competent to do. Family therapists must work within their scope and refer when cases exceed their training. Common scope-of-practice issues in family therapy: a therapist without trauma specialization encountering severe dissociation; a therapist without addiction training working with active substance use disorders; a therapist without forensic training providing custody opinions; a therapist practicing via telehealth across state lines in ways that violate licensure laws.</p><div class="tc-motto">Practicing outside scope of competence is both an ethical violation and a risk to client welfare. The ethical response is referral, consultation, or additional training — not proceeding without adequate preparation.</div>`)
        ]
      },
      { title:"Professional Identity and Therapist Development",
        intro:"Professional identity in family therapy involves more than mastery of techniques. It involves developing a stable, reflective, and ethically grounded therapeutic self — one that can remain curious and present with families under emotional pressure, navigate ethical complexity without becoming paralyzed, and continue growing through supervision, feedback, and self-reflection. Therapist development is lifelong, not a credential achieved at graduation.",
        topics:[
          t("Role of the Family Therapist",`<p>The family therapist holds a unique role: simultaneously a clinician, a systems observer, an alliance builder, a pattern interrupter, a cultural learner, an ethical reasoner, and a human being with their own history. This multi-layered role requires both clinical skill and personal maturity.</p><p>The therapist must be able to: hold multiple perspectives without losing their own; remain regulated when families escalate; notice their own reactions without being controlled by them; challenge harmful patterns without blaming family members; and stay curious when the natural pull is toward judgment.</p><div class="tc-motto">The therapist is not a neutral recorder of family interaction. The therapist is an active participant whose presence, language, attention, and responses shape what unfolds in the room.</div>`),
          t("Therapist Self-of-the-Therapist Work",`<p>Self-of-the-therapist work refers to the ongoing personal development that allows the therapist to use their own relational history, emotional reactions, and cultural identity as clinical tools rather than unexamined liabilities. Every therapist brings their own family of origin, attachment patterns, cultural assumptions, trauma history, and relationship with authority, conflict, gender, and emotion into the therapy room.</p><p>Self-of-the-therapist work may include: personal therapy; family-of-origin exploration; supervision focused on personal reactions; reflective journaling; cultural humility practice; and ongoing examination of how personal patterns affect clinical choices. A therapist who has never examined their own family's communication style may inadvertently import it into sessions. A therapist with unresolved grief may avoid grief work. A therapist with an authoritarian family of origin may collude with family hierarchy rather than challenging it.</p>`),
          t("Supervision",`<p>Clinical supervision is one of the most essential tools for therapist development, ethical practice, and quality care. In family therapy, supervision should address: case conceptualization and treatment planning; cultural and contextual factors; the therapist's emotional reactions and personal history as they affect clinical work; ethical dilemmas; safety concerns; alliance management; and model fidelity when using structured approaches.</p><p>Effective supervision formats in family therapy include: case consultation; live supervision during sessions; video review with feedback; peer consultation groups; and individual supervision with an experienced family therapist. Supervision is not only for trainees — experienced therapists benefit from ongoing consultation, particularly with complex cases, ethical dilemmas, or high-risk situations.</p><div class="tc-quote">Supervision principle: "You cannot see what you cannot see without someone who can see differently."</div>`),
          t("Reflective Practice",`<p>Reflective practice is the discipline of examining one's own clinical work systematically — not only to improve technique but to notice the relationship between the therapist's inner world and clinical choices. Questions for reflective practice include: What happened in that session? What did I feel? What did I do with that feeling? Was my intervention driven by clinical judgment or personal reaction? Did I avoid something I should have addressed? Did I push when I should have waited?</p><p>Reflective practice can occur through: supervision; personal journaling; peer consultation; session review; and intentional debriefing after difficult sessions. Therapists who do not reflect on their work are more likely to repeat unhelpful patterns, act on unexamined biases, and experience compassion fatigue without recognizing it.</p>`),
          t("Managing Countertransference",`<p>Countertransference refers to the therapist's emotional reactions to clients — reactions that may be triggered by the client's material, by the client's relational style, or by resonances with the therapist's own history. In family therapy, countertransference is especially rich because the family system activates relational templates from the therapist's own family experience.</p><p>Examples: a therapist who had an alcoholic parent may feel disproportionate anger toward addicted clients; a therapist whose family avoided conflict may collude with families that never argue; a therapist who was parentified may over-identify with children carrying adult roles; a therapist from a rigid cultural background may be uncomfortable with family forms different from their own.</p><p>Managing countertransference does not mean eliminating emotional reactions. It means noticing them, exploring their origins, and deciding consciously whether and how to use them clinically.</p>`),
          t("Burnout and Compassion Fatigue",`<p>Family therapists work with profound pain, chronic stress, relational cruelty, grief, trauma, and moral complexity. Over time, this exposure can produce burnout — chronic exhaustion, cynicism, reduced efficacy, and withdrawal — and compassion fatigue — a secondary traumatic stress response in which the therapist absorbs the emotional weight of their clients' suffering.</p><p>Signs of burnout and compassion fatigue: dreading sessions; emotional numbness or irritability; reduced empathy; declining clinical quality; physical symptoms; cynicism about the value of therapy; difficulty setting limits; and taking client suffering home. Prevention and recovery require: honest self-assessment; supervision; workload management; professional community; personal therapy when needed; adequate rest; and institutional support when possible.</p><div class="tc-motto">A therapist who is burning out cannot provide the presence, curiosity, and stability that families need. Self-care is not self-indulgence — it is a professional ethical obligation.</div>`),
          t("Continuing Education",`<p>Family therapy is an evolving field. Evidence accumulates, models develop, populations change, technology reshapes practice, and legal frameworks update. Continuing education keeps the therapist current, challenges assumptions, and prevents clinical stagnation. Priority areas for continuing education include: trauma-informed practice; cultural humility and anti-oppressive practice; evidence-based interventions for specific populations; neuroscience and family therapy; legal and ethical updates; telehealth competencies; and emerging research on specific problems such as eating disorders, addiction, psychosis, or neurodiversity.</p>`),
          t("Developing Clinical Wisdom",`<p>Clinical wisdom is the integration of theory, evidence, cultural understanding, self-knowledge, and lived experience into good judgment under uncertainty. It is not simply knowledge — it is the capacity to use knowledge well in complex, ambiguous, and emotionally charged situations. Clinical wisdom develops through: years of supervised practice; exposure to diverse families and problems; willingness to be wrong and learn from mistakes; honest feedback from supervisors, peers, and clients; personal reflection; and the humility to know what one does not know.</p><div class="tc-quote">A clinically wise therapist does not ask only "What does the evidence say?" or "What does theory predict?" They also ask: "What does this particular family need from me right now, in this moment, given everything I understand about them?"</div>`)
        ]
      },
      { title:"Documentation and Clinical Records",
        intro:"Clinical documentation is both a professional responsibility and a legal artifact. Good documentation reflects careful clinical thinking, protects clients and therapists, and supports continuity of care. In family therapy, documentation raises distinctive questions about who is the client of record, what is noted about each member, and how sensitive information is handled when records may be legally requested by multiple parties with competing interests.",
        topics:[
          t("Intake Notes",`<p>Intake notes should capture: identifying information for all family members; presenting concerns as described by each member; family composition and structure; relevant history including medical, psychiatric, substance use, legal, and social context; initial risk assessment; cultural and spiritual context; previous treatment; informed consent discussion; and an initial clinical impression or working hypothesis. Intake notes establish the clinical foundation and are often the first documents reviewed if a case comes under legal or ethical scrutiny.</p><div class="tc-motto">Intake notes should be thorough enough to provide a clear clinical picture, and restrained enough that they do not contain unnecessary personal detail that could harm clients if disclosed.</div>`),
          t("Progress Notes",`<p>Progress notes document what occurred in each session: the session format and participants; major themes or events; the therapist's clinical observations and interventions; the family's response; safety concerns; any changes to the treatment plan; and next steps. In family therapy, progress notes should reflect the relational and systemic nature of the work — not simply "the client reported..." but observations about interaction, pattern, and movement.</p><p>Common formats include: SOAP (Subjective, Objective, Assessment, Plan); DAP (Data, Assessment, Plan); and narrative notes. The format matters less than the quality of clinical reasoning documented.</p>`),
          t("Treatment Plans",`<p>Treatment plans are clinical documents that translate assessment and conceptualization into goals, interventions, progress measures, and review timelines. In family therapy, treatment plans should reflect: the identified presenting problems; relational and systemic goals, not only individual symptoms; the therapeutic model being used; who will attend sessions and in what format; safety planning if relevant; and measurable outcomes. Treatment plans should be reviewed and updated regularly.</p><div class="tc-motto">A treatment plan is a living document, not a bureaucratic form. It should actually guide clinical decisions and be updated when the family's situation or progress changes.</div>`),
          t("Risk Documentation",`<p>When risk is assessed — suicidality, self-harm, violence, child safety, domestic violence, substance-related danger — documentation must be precise and complete. Risk documentation should include: the specific concern identified; how it was assessed; the clinical reasoning about level of risk; what actions were taken; who was consulted; what safety planning occurred; and any reporting obligations that were fulfilled. Inadequate risk documentation is one of the most common sources of professional liability.</p><p>In family therapy, risk documentation is especially important because the risk may involve one family member's behavior affecting others. The therapist must document not only the individual's risk but the family's safety situation as a whole.</p>`),
          t("Family Session Summaries",`<p>Some therapists use periodic family session summaries — brief documents that synthesize progress, pattern observations, goal movement, and next clinical priorities across several sessions. These summaries are particularly useful for: complex cases with many threads; families taking a break from therapy; transitions between therapists; and legal or medical coordination where an overview is needed without releasing individual session notes.</p><div class="tc-quote">Session summaries should be written with the understanding that they may be seen by the family. They should reflect honest clinical observation without language that would shame or reduce any family member.</div>`),
          t("Outcome Measures",`<p>Outcome measures are standardized tools that track clinical progress over time. In family therapy, useful outcomes include: symptom reduction in identified individuals; family functioning scales; relationship satisfaction measures; session rating scales; goal attainment measures; and client-reported progress. Regularly using brief outcome measures serves multiple functions: it provides accountability; it gives the family visibility into their progress; it helps the therapist catch deterioration early; and it supports evidence-informed practice.</p>`),
          t("Documentation for Court-Involved Cases",`<p>When family therapy involves court-ordered services, custody disputes, child welfare involvement, or other legal processes, documentation requires heightened care. Notes should be: factually accurate and clearly distinguished from clinical inference; free of language that appears to favor one parent; carefully dated and stored; consistent with the informed consent provided about limits of confidentiality; and reviewed with a supervisor or legal advisor before release when possible.</p><div class="tc-motto">Documentation in court-involved cases should be written as if a judge will read every word — because occasionally they do.</div>`),
          t("Privacy and Record-Keeping",`<p>Privacy laws governing health information (such as HIPAA in the United States and equivalent frameworks in other jurisdictions) require therapists to maintain secure records, limit disclosure to authorized parties, provide clients with access to their own records, and follow defined procedures for releasing information. In family therapy, privacy questions arise around: who can authorize release of records when multiple clients are involved; what happens when one parent requests records about a minor's therapy without the other parent's knowledge; and how records are stored when they contain sensitive information about multiple people.</p><p>Therapists should have clear policies, communicated in informed consent, about record retention periods, destruction of records, responses to record requests, and storage security — including digital security for electronic records and telehealth platforms.</p>`)
        ]
      }
    ]
  },

// Sidebar nav
const partNav = document.querySelector('.part-nav');
DATA.forEach(part => {
  const a = document.createElement('div');
  a.className = 'part-nav-item';
  a.textContent = `Part ${part.part}: ${part.title}`;
  a.addEventListener('click', () => {
    const el = document.getElementById('part-' + part.part);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  partNav.appendChild(a);
});

function highlight(text, query) {
  if (!query || !text) return text || '';
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function render(filterPart, query) {
  const content = document.getElementById('content');
  const noResults = document.getElementById('no-results');
  content.querySelectorAll('.part-section').forEach(el => el.remove());
  let totalTopics = 0, anyVisible = false;
  const q = query ? query.toLowerCase() : '';

  DATA.forEach(part => {
    if (filterPart !== 'all' && part.part !== filterPart) return;

    const filteredChapters = part.chapters.map(ch => {
      const filteredTopics = ch.topics.filter(topic => {
        if (!q) return true;
        return topic.title.toLowerCase().includes(q)
          || (topic.content && topic.content.replace(/<[^>]+>/g,'').toLowerCase().includes(q))
          || ch.title.toLowerCase().includes(q)
          || (ch.intro && ch.intro.toLowerCase().includes(q))
          || (part.partIntro && part.partIntro.toLowerCase().includes(q));
      });
      if (q && filteredTopics.length === 0) return null;
      return { ...ch, filteredTopics: q ? filteredTopics : ch.topics };
    }).filter(Boolean);

    if (!filteredChapters.length) return;
    anyVisible = true;

    const section = document.createElement('div');
    section.className = `part-section ${part.partClass}`;
    section.id = 'part-' + part.part;

    const hdr = document.createElement('div');
    hdr.className = 'part-header';
    hdr.innerHTML = `<span>${highlight(part.title, query)}</span><span class="part-badge">Part ${part.part}</span>`;
    section.appendChild(hdr);

    if (part.partIntro) {
      const pi = document.createElement('div');
      pi.style.cssText = 'font-size:0.92rem;color:var(--ink-soft);line-height:1.7;padding:0 0 1.25rem;font-style:italic;border-bottom:1px solid var(--border);margin-bottom:1.25rem;';
      pi.innerHTML = highlight(part.partIntro, query);
      section.appendChild(pi);
    }

    filteredChapters.forEach(ch => {
      totalTopics += ch.filteredTopics.length;
      const card = document.createElement('div');
      card.className = 'chapter-card' + (q ? ' open' : '');

      const cardHdr = document.createElement('div');
      cardHdr.className = 'chapter-header';
      cardHdr.innerHTML = `<div class="chapter-title">${highlight(ch.title, query)}</div><span class="chapter-count">${ch.filteredTopics.length} topic${ch.filteredTopics.length !== 1 ? 's' : ''}</span><svg class="chapter-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;
      cardHdr.addEventListener('click', () => card.classList.toggle('open'));
      card.appendChild(cardHdr);

      const list = document.createElement('div');
      list.className = 'topics-list';

      if (ch.intro) {
        const introEl = document.createElement('div');
        introEl.className = 'chapter-intro';
        introEl.innerHTML = highlight(ch.intro, query);
        list.appendChild(introEl);
      }

      ch.filteredTopics.forEach(topic => {
        const hasContent = !!topic.content;
        const item = document.createElement('div');
        item.className = 'topic-item' + (hasContent ? ' has-content' : '');

        const th = document.createElement('div');
        th.className = 'topic-header';
        th.innerHTML = `<span class="topic-dot"></span><span class="topic-title-text">${highlight(topic.title, query)}</span>${hasContent ? '<span class="topic-toggle">▾</span>' : ''}`;
        item.appendChild(th);

        if (hasContent) {
          const cd = document.createElement('div');
          cd.className = 'topic-content';
          // Don't run highlight() on HTML content — it would corrupt tags
          cd.innerHTML = topic.content;
          item.appendChild(cd);
          th.addEventListener('click', () => item.classList.toggle('open'));
          if (q && topic.content.replace(/<[^>]+>/g,'').toLowerCase().includes(q)) item.classList.add('open');
        } else {
          const ph = document.createElement('div');
          ph.className = 'topic-placeholder';
          ph.textContent = 'Content coming soon.';
          item.appendChild(ph);
          th.addEventListener('click', () => item.classList.toggle('open'));
        }
        list.appendChild(item);
      });

      card.appendChild(list);
      section.appendChild(card);
    });

    content.insertBefore(section, noResults);
  });

  document.getElementById('result-count').textContent = totalTopics.toLocaleString();
  noResults.classList.toggle('show', !anyVisible);
}

let currentFilter = 'all', currentQuery = '';
function update() { render(currentFilter, currentQuery); }

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentFilter = pill.dataset.filter;
    update();
  });
});

let searchTimeout;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { currentQuery = e.target.value.trim(); update(); }, 160);
});

document.getElementById('expand-all-btn').addEventListener('click', () => document.querySelectorAll('.chapter-card').forEach(c => c.classList.add('open')));
document.getElementById('collapse-all-btn').addEventListener('click', () => document.querySelectorAll('.chapter-card').forEach(c => c.classList.remove('open')));

render('all', '');
</script>
