// ── Active tag state ──────────────────────────────────────────────────────────
let activeTags = new Set();

// ── Compute toolbar height dynamically ───────────────────────────────────────
function updateToolbarHeight() {
  const tb = document.getElementById('pageToolbar');
  if (tb) {
    const h = tb.offsetHeight;
    document.documentElement.style.setProperty('--toolbar-height', h + 'px');
  }
}
window.addEventListener('load', updateToolbarHeight);
window.addEventListener('resize', updateToolbarHeight);

// ── Build tag panel (accordion dropdowns with alpha-sorted checkboxes) ────────
function buildTagPanel() {
  const panel = document.getElementById('tag-panel');
  TAG_CATEGORIES.forEach(cat => {
    const catDiv = document.createElement('div');
    catDiv.className = `tag-category ${cat.cls}`;

    // Toggle button (header of dropdown)
    const btn = document.createElement('button');
    btn.className = 'tag-cat-toggle';
    btn.type = 'button';
    btn.innerHTML = `<span class="cat-label-text">${cat.label}</span><span class="cat-chevron">▼</span>`;
    btn.addEventListener('click', () => {
      catDiv.classList.toggle('open');
    });
    catDiv.appendChild(btn);

    // Checkbox list — tags sorted alphabetically
    const list = document.createElement('div');
    list.className = 'tag-checkbox-list';

    const sortedTags = [...cat.tags].sort((a, b) => a.localeCompare(b));
    sortedTags.forEach(tag => {
      const item = document.createElement('div');
      item.className = 'tag-checkbox-item';
      item.dataset.tag = tag;
      item.innerHTML = `<span class="tag-checkbox-box"></span><span class="tag-checkbox-label">${tag}</span>`;

      item.addEventListener('click', () => {
        if (activeTags.has(tag)) {
          activeTags.delete(tag);
          item.classList.remove('checked');
        } else {
          activeTags.add(tag);
          item.classList.add('checked');
        }
        updateCategoryHeader(catDiv, cat);
        updateClearBtn();
        applyTagFilter();
      });
      list.appendChild(item);
    });

    catDiv.appendChild(list);
    panel.appendChild(catDiv);
  });
}

function updateCategoryHeader(catDiv, cat) {
  const btn = catDiv.querySelector('.tag-cat-toggle');
  const activeCount = [...catDiv.querySelectorAll('.tag-checkbox-item.checked')].length;
  // Remove old badge if any
  const oldBadge = btn.querySelector('.cat-badge');
  if (oldBadge) oldBadge.remove();
  if (activeCount > 0) {
    btn.classList.add('has-active');
    const badge = document.createElement('span');
    badge.className = 'cat-badge';
    badge.textContent = activeCount;
    btn.querySelector('.cat-label-text').after(badge);
  } else {
    btn.classList.remove('has-active');
  }
}

function updateClearBtn() {
  const btn = document.getElementById('nav-clear-btn');
  if (activeTags.size > 0) {
    btn.classList.add('active');
    btn.textContent = `Clear (${activeTags.size})`;
  } else {
    btn.classList.remove('active');
    btn.textContent = 'Clear all';
  }
}

document.getElementById('nav-clear-btn').addEventListener('click', () => {
  activeTags.clear();
  document.querySelectorAll('.tag-checkbox-item.checked').forEach(p => p.classList.remove('checked'));
  // Reset all category header badges
  document.querySelectorAll('.tag-cat-toggle').forEach(btn => {
    btn.classList.remove('has-active');
    const badge = btn.querySelector('.cat-badge');
    if (badge) badge.remove();
  });
  updateClearBtn();
  applyTagFilter();
});

// ── Tag filter ────────────────────────────────────────────────────────────────
function topicMatchesTags(topic) {
  if (activeTags.size === 0) return true;
  if (!topic.tags || topic.tags.length === 0) return false;
  for (const tag of activeTags) { if (topic.tags.includes(tag)) return true; }
  return false;
}

function applyTagFilter() {
  if (activeTags.size === 0) { update(); return; }
  const content = document.getElementById('content');
  const noResults = document.getElementById('no-results');
  content.querySelectorAll('.part-section').forEach(el => el.remove());
  let totalMatched = 0, anyVisible = false;
  const q = currentQuery ? currentQuery.toLowerCase() : '';

  DATA.forEach(part => {
    if (currentFilter !== 'all' && part.part !== currentFilter) return;
    const filteredChapters = part.chapters.map(ch => {
      const matchedTopics = ch.topics.filter(topic => {
        if (!topicMatchesTags(topic)) return false;
        if (q) return topic.title.toLowerCase().includes(q) || (topic.content && topic.content.replace(/<[^>]+>/g,'').toLowerCase().includes(q)) || ch.title.toLowerCase().includes(q);
        return true;
      });
      if (matchedTopics.length === 0) return null;
      return { ...ch, filteredTopics: matchedTopics };
    }).filter(Boolean);
    if (!filteredChapters.length) return;
    anyVisible = true;
    const section = buildSection(part, filteredChapters, q, true);
    content.insertBefore(section, noResults);
    filteredChapters.forEach(ch => totalMatched += ch.filteredTopics.length);
  });

  document.getElementById('result-count').textContent = totalMatched.toLocaleString();
  noResults.classList.toggle('show', !anyVisible);
  document.getElementById('nav-match-info').innerHTML =
    `<strong>${totalMatched}</strong> topic${totalMatched !== 1 ? 's' : ''} match ${activeTags.size > 1 ? 'any selected tag' : 'selected tag'}`;
}

// ── Build section DOM ─────────────────────────────────────────────────────────
function highlight(text, query) {
  if (!query || !text) return text || '';
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function buildSection(part, filteredChapters, query, tagMode) {
  const section = document.createElement('div');
  section.className = `part-section ${part.partClass}`;
  section.id = 'part-' + part.part;
  const hdr = document.createElement('div');
  hdr.className = 'part-header';
  hdr.innerHTML = `<span>${highlight(part.title, query)}</span><span class="part-badge">Part ${part.part}</span>`;
  section.appendChild(hdr);
  if (part.partIntro) {
    const pi = document.createElement('div');
    pi.style.cssText = 'font-size:0.92rem;color:var(--ink-soft);line-height:1.7;padding:0 0 1.25rem;font-style:italic;border-bottom:1px solid var(--border);margin-bottom:1.25rem;';
    pi.innerHTML = highlight(part.partIntro, query);
    section.appendChild(pi);
  }
  filteredChapters.forEach(ch => {
    const topics = ch.filteredTopics || ch.topics;
    const card = document.createElement('div');
    card.className = 'chapter-card' + ((query || tagMode) ? ' open' : '');
    const cardHdr = document.createElement('div');
    cardHdr.className = 'chapter-header';
    const label = tagMode ? `${topics.length} match${topics.length !== 1 ? 'es' : ''}` : `${topics.length} topic${topics.length !== 1 ? 's' : ''}`;
    cardHdr.innerHTML = `<div class="chapter-title">${highlight(ch.title, query)}</div><span class="chapter-count">${label}</span><svg class="chapter-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;
    cardHdr.addEventListener('click', () => card.classList.toggle('open'));
    card.appendChild(cardHdr);
    const list = document.createElement('div');
    list.className = 'topics-list';
    if (ch.intro) {
      const introEl = document.createElement('div');
      introEl.className = 'chapter-intro';
      introEl.innerHTML = highlight(ch.intro, query);
      list.appendChild(introEl);
    }
    topics.forEach(topic => {
      const hasContent = !!topic.content;
      const item = document.createElement('div');
      item.className = 'topic-item' + (hasContent ? ' has-content' : '');
      const matchedTagBadges = tagMode && topic.tags && topic.tags.length
        ? `<div style="margin-top:0.3rem;display:flex;flex-wrap:wrap;gap:0.25rem;">${topic.tags.filter(tg => activeTags.has(tg)).map(tg => `<span style="font-size:0.65rem;padding:0.1rem 0.4rem;border-radius:50px;background:var(--accent);color:#fff;">${tg}</span>`).join('')}</div>` : '';
      const th = document.createElement('div');
      th.className = 'topic-header';
      th.innerHTML = `<span class="topic-dot"></span><div style="flex:1"><span class="topic-title-text">${highlight(topic.title, query)}</span>${matchedTagBadges}</div>${hasContent ? '<span class="topic-toggle">▾</span>' : ''}`;
      item.appendChild(th);
      if (hasContent) {
        const cd = document.createElement('div');
        cd.className = 'topic-content';
        cd.innerHTML = topic.content;
        item.appendChild(cd);
        th.addEventListener('click', () => item.classList.toggle('open'));
        if (query && topic.content.replace(/<[^>]+>/g,'').toLowerCase().includes(query.toLowerCase())) item.classList.add('open');
      } else {
        const ph = document.createElement('div');
        ph.className = 'topic-placeholder';
        ph.textContent = 'Content coming soon.';
        item.appendChild(ph);
        th.addEventListener('click', () => item.classList.toggle('open'));
      }
      list.appendChild(item);
    });
    card.appendChild(list);
    section.appendChild(card);
  });
  return section;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(filterPart, query) {
  if (activeTags.size > 0) { applyTagFilter(); return; }
  const content = document.getElementById('content');
  const noResults = document.getElementById('no-results');
  content.querySelectorAll('.part-section').forEach(el => el.remove());
  let totalTopics = 0, anyVisible = false;
  const q = query ? query.toLowerCase() : '';

  DATA.forEach(part => {
    if (filterPart !== 'all' && part.part !== filterPart) return;
    const filteredChapters = part.chapters.map(ch => {
      const filteredTopics = ch.topics.filter(topic => {
        if (!q) return true;
        return topic.title.toLowerCase().includes(q)
          || (topic.content && topic.content.replace(/<[^>]+>/g,'').toLowerCase().includes(q))
          || ch.title.toLowerCase().includes(q)
          || (ch.intro && ch.intro.toLowerCase().includes(q))
          || (part.partIntro && part.partIntro.toLowerCase().includes(q));
      });
      if (q && filteredTopics.length === 0) return null;
      return { ...ch, filteredTopics: q ? filteredTopics : ch.topics };
    }).filter(Boolean);
    if (!filteredChapters.length) return;
    anyVisible = true;
    filteredChapters.forEach(ch => totalTopics += (ch.filteredTopics || ch.topics).length);
    const section = buildSection(part, filteredChapters, query, false);
    content.insertBefore(section, noResults);
  });

  document.getElementById('result-count').textContent = totalTopics.toLocaleString();
  noResults.classList.toggle('show', !anyVisible);
  document.getElementById('nav-match-info').innerHTML = 'Select tags to filter content';
}

// ── State & events ────────────────────────────────────────────────────────────
let currentFilter = 'all', currentQuery = '';
function update() { render(currentFilter, currentQuery); }

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentFilter = pill.dataset.filter;
    update();
  });
});

let searchTimeout;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { currentQuery = e.target.value.trim(); update(); }, 160);
});

document.getElementById('expand-all-btn').addEventListener('click', () =>
  document.querySelectorAll('.chapter-card').forEach(c => c.classList.add('open')));
document.getElementById('collapse-all-btn').addEventListener('click', () =>
  document.querySelectorAll('.chapter-card').forEach(c => c.classList.remove('open')));

// ── Boot ──────────────────────────────────────────────────────────────────────
buildTagPanel();
render('all', '');
</script>
