          t("Avoiding Blame",`<p>Families often arrive with a blame story: "He is the problem." "She is too emotional." "Our child is destroying the family." Blame narrows attention — it locates the problem inside one person and hides the interactional cycle. Avoiding blame does not mean avoiding accountability. A person can be accountable for harmful behavior without becoming the family's entire explanation.</p><div class="tc-example"><strong>Systemic reframe</strong>"Rather than deciding whose fault this is, let us look at what happens step by step. When criticism starts, withdrawal follows; when withdrawal happens, fear increases; when fear increases, criticism becomes stronger. The pattern is hurting everyone."</div><div class="tc-quote">"The enemy is not father or daughter. The enemy is the criticism-withdrawal cycle." This helps the family move from accusation to observation.</div>`),
          t("Therapist Warmth, Curiosity, and Neutrality",`<p>Warmth communicates human care. Curiosity communicates openness. Neutrality communicates that the therapist is not there to prosecute one member. But neutrality does not mean moral indifference.</p><div class="tc-motto">Neutral toward people. Not neutral toward violence, degradation, abuse, or intimidation.</div><p>Curiosity softens defensiveness. Instead of "Why do you yell so much?" ask: "When you raise your voice, what are you hoping they will understand?" The therapist's regulated presence often becomes the first model of a different interactional rhythm.</p>`),
          t("Repairing Alliance Ruptures",`<p>Alliance ruptures happen when a family member feels misunderstood, judged, ignored, exposed, or unsafe. Ruptures are not failures if they are repaired — repair can model a crucial family skill. Signs of rupture: silence; sarcasm; withdrawal; sudden compliance; defensiveness; anger toward therapist; missed sessions; one member saying therapy is biased; emotional shutdown.</p><ul><li>"I may have moved too quickly there. Let me slow down and understand what that felt like for you."</li><li>"I realize I asked several questions that may have sounded like blame. That was not my intention, but I want to take responsibility for the impact."</li><li>"Before we continue, I want to check whether everyone still feels I am holding the family fairly."</li></ul><div class="tc-quote">Repair increases safety and teaches the family that disconnection does not have to become permanent.</div>`)
        ]
      },
      { title:"Therapeutic Questioning",
        intro:"Questions are one of the family therapist's most powerful tools. In family therapy, questions are not only used to gather information — they also shift attention, reveal patterns, soften blame, open emotional awareness, invite reflection, and create new possibilities. A good question can change the room. The therapist should avoid asking questions in a prosecutorial tone; the same words can heal or harm depending on tone, timing, and context.",
        topics:[
          t("Linear Questions",`<p>Linear questions clarify facts, sequence, history, and immediate concerns. They are often necessary early in assessment and during risk evaluation.</p><ul><li>When did this begin? Who was present?</li><li>What happened first? How often does this occur?</li><li>What did you do next? Has anyone been physically hurt?</li><li>Has this happened before?</li></ul><div class="tc-quote">Linear questions are useful, but if therapy relies only on them, the conversation may become an investigation. Family therapy requires moving beyond "what happened?" toward "how does this pattern repeat?"</div>`),
          t("Circular Questions",`<p>Circular questions explore relationships, differences, sequences, and perspectives. They help the family see how each person's behavior affects others.</p><ul><li>When your father becomes quiet, what does your mother usually do?</li><li>Who notices first when tension is rising?</li><li>When your daughter withdraws, who worries the most?</li><li>If your son were watching this argument, what would he say each person is feeling?</li></ul><div class="tc-example"><strong>Instead of</strong>"Why are you so angry?" ask: "When anger enters the room, who moves closer and who moves away?" This invites the family to observe the pattern rather than defend a position.</div>`),
          t("Reflexive Questions",`<p>Reflexive questions invite the family to imagine alternatives, consequences, future possibilities, and new meanings. They are designed to open space for change.</p><ul><li>If this pattern continued for five years, what would worry you most?</li><li>If your son felt respected and still had limits, what would be different at home?</li><li>What would your family notice if you responded with curiosity instead of criticism?</li><li>If your daughter's silence had a message, what might it be asking for?</li><li>What kind of family story would you like your children to inherit?</li></ul><p>Reflexive questions are especially useful when the family feels stuck.</p>`),
          t("Scaling Questions",`<p>Scaling questions make subjective experience more concrete. They are common in solution-focused and feedback-informed approaches.</p><ul><li>On a scale from 0 to 10, how intense was the conflict this week?</li><li>How safe did you feel speaking today?</li><li>How hopeful are you that this can improve?</li><li>How confident are you that you can use the timeout plan?</li></ul><div class="tc-example"><strong>Tracking progress</strong>"Last week you rated family tension as 8 out of 10. This week you said 6. What helped move it down two points?"</div><p>Scaling questions work best when followed by curiosity. The number is not the point; the meaning behind the number is.</p>`),
          t("Exception Questions",`<p>Exception questions explore times when the problem is absent, weaker, shorter, or handled better. They help families discover that the problem is not total.</p><ul><li>When was the last time the argument started but did not explode?</li><li>What was different that day? Who helped the situation calm down?</li><li>When do you and your son get along better?</li><li>What does the family already know how to do, even briefly?</li></ul><p>Exception questions are powerful because they uncover existing competence. The therapist can then help the family repeat what already works.</p>`),
          t("Emotion-Focused Questions",`<p>Emotion-focused questions help family members move beneath anger, blame, and defensiveness toward primary emotions such as fear, sadness, longing, shame, grief, and loneliness.</p><ul><li>When you sound angry, what are you most afraid they will not understand?</li><li>Under the frustration, is there hurt?</li><li>What do you need from your father in that moment?</li><li>What is the softer feeling underneath the criticism?</li><li>What do you wish you could say without it becoming a fight?</li></ul><div class="tc-motto">Emotion-focused questions must be paced carefully. If asked too early, they may feel intrusive. If asked with warmth and safety, they can transform conflict into vulnerability.</div>`),
          t("Narrative Questions",`<p>Narrative questions explore the stories families tell about themselves, the problem, and each other. These stories shape identity and possibility.</p><ul><li>What name would you give this problem?</li><li>When did the "failure story" enter the family?</li><li>Are there stories of resilience in your family that are being forgotten?</li><li>What would be a more generous but still honest story about this family?</li></ul><div class="tc-example"><strong>Externalizing through questions</strong>"Instead of saying your son is lazy, can we explore how discouragement has been affecting him?" This does not excuse behavior — it creates room for change.</div>`),
          t("Cultural and Spiritual Questions",`<p>Cultural and spiritual questions explore values, identity, belonging, tradition, moral meaning, and sources of support or conflict.</p><ul><li>What does your culture teach about family loyalty?</li><li>What does respect mean in your family?</li><li>What role does faith play in how you understand this problem?</li><li>Are there spiritual practices that help the family calm, forgive, or reconnect?</li><li>Are there generational differences in how culture is understood?</li></ul><div class="tc-motto">These questions should be asked respectfully, without stereotyping. The therapist should remain curious about the family's own interpretation of its values.</div>`),
          t("Questions That Reduce Defensiveness",`<p>Defensiveness increases when people feel blamed, cornered, humiliated, or misunderstood. Questions that reduce defensiveness often assume positive intent while still exploring impact.</p><table class="tc-table"><thead><tr><th>High-defensiveness question</th><th>Low-defensiveness alternative</th></tr></thead><tbody><tr><td>"Why do you control everyone?"</td><td>"When you step in strongly, what are you trying to protect?"</td></tr><tr><td>"Why do you ignore your wife?"</td><td>"When you go quiet, are you trying to avoid making things worse?"</td></tr><tr><td>"Why are you disrespectful?"</td><td>"What happens inside you right before your tone changes?"</td></tr></tbody></table><div class="tc-quote">Defensiveness decreases when people feel the therapist is trying to understand the protective logic behind their behavior.</div>`)
        ]
      },
      { title:"Reframing and Meaning-Making",
        intro:"Reframing is the skill of offering a new meaning for a behavior, symptom, conflict, or relational pattern. It helps families move from blame to understanding, from shame to possibility, and from stuck narratives to new choices. Reframing does not mean denying harm or making destructive behavior sound acceptable. A good reframe is compassionate and truthful — it changes the meaning without erasing accountability.",
        topics:[
          t("What Is Reframing?",`<p>Reframing means placing a behavior inside a different interpretive frame. The therapist helps the family see the same event from another angle.</p><table class="tc-table"><thead><tr><th>Blame frame</th><th>Reframe</th></tr></thead><tbody><tr><td>Badness</td><td>Protection</td></tr><tr><td>Defiance</td><td>Autonomy struggle</td></tr><tr><td>Withdrawal</td><td>Overwhelm</td></tr><tr><td>Anger</td><td>Protest against disconnection</td></tr><tr><td>Control</td><td>Attempted safety</td></tr><tr><td>Perfectionism</td><td>Fear of shame</td></tr><tr><td>Symptom</td><td>Signal</td></tr></tbody></table><div class="tc-motto">Reframing should be plausible. If the reframe feels fake, the family will reject it.</div>`),
          t("Positive Intent Reframes",`<p>Positive intent reframes identify the protective or caring intention beneath a problematic behavior.</p><ul><li>"Your criticism may be a desperate attempt to reach him, even though it pushes him away."</li><li>"Your silence may be your way of preventing a bigger fight, even though it leaves your wife alone."</li><li>"Your daughter's anger may be her way of saying, 'I need you to see me as older now.'"</li><li>"Your father's strictness may come from fear that life will hurt you if he does not prepare you."</li></ul><div class="tc-motto">Caution: positive intent should not be used to minimize abuse. Coercive control should not be reframed as "love" in a way that excuses intimidation.</div>`),
          t("Developmental Reframes",`<p>Developmental reframes place conflict within life-cycle transitions.</p><ul><li>A teenager's pushback may be reframed as an autonomy transition</li><li>A couple's conflict after childbirth may be reframed as a struggle to reorganize roles under exhaustion</li><li>An older parent's irritability may be reframed as grief over loss of independence</li><li>A young adult's distance may be reframed as a launching process rather than rejection</li></ul><p>Developmental reframes reduce panic and shame. They help families see that some conflict is not evidence of failure but a sign that the family structure needs to adapt.</p>`),
          t("Protective Function Reframes",`<p>Protective function reframes identify how a behavior may have developed to protect someone from emotional or physical pain.</p><ul><li>"Your shutdown may have protected you in a family where speaking up was unsafe."</li><li>"Your son's humor may be how he reduces tension when adults become serious."</li><li>"Your wife's planning may be her way of preventing chaos after growing up with unpredictability."</li><li>"Your anger may arrive when sadness feels too vulnerable."</li></ul><p>Protective reframes are especially useful in trauma-informed work. They honor survival while inviting new choices.</p>`),
          t("Cultural Reframes",`<p>Cultural reframes place family behavior within cultural values, migration history, social expectations, or collective identity.</p><ul><li>"What looks like overinvolvement from one cultural lens may also reflect loyalty, obligation, and interdependence."</li><li>"Your parents' emphasis on education may be connected to migration sacrifice and the hope that children will have more security."</li></ul><div class="tc-motto">Cultural reframing prevents the therapist from imposing one model of healthy family life. However, culture should not be used to excuse harm. The therapist can honor values while still addressing safety and dignity.</div>`),
          t("Spiritual and Moral Reframes",`<p>Spiritual and moral reframes explore suffering, forgiveness, repentance, duty, mercy, justice, hope, and meaning.</p><ul><li>"Forgiveness here may not mean forgetting or removing accountability. It may mean freeing the family from endless revenge while still requiring repair."</li><li>"Your guilt may show that your conscience is alive, but shame may be preventing you from taking constructive responsibility."</li></ul><div class="tc-motto">The therapist should not impose theology. The therapist helps the family clarify how their own spiritual values can support healing rather than shame, coercion, or avoidance.</div>`),
          t("Risks of Invalidating Pain",`<div class="tc-example"><strong>Invalidating reframe</strong>"He only yells because he loves you."</div><div class="tc-example"><strong>Better reframe</strong>"His fear may be underneath the yelling, but the yelling is still harmful and needs to change."</div><div class="tc-example"><strong>Invalidating reframe</strong>"Your mother criticized you because she wanted the best for you."</div><div class="tc-example"><strong>Better reframe</strong>"Your mother may have hoped to protect your future, and at the same time the criticism left you feeling unseen and inadequate."</div><div class="tc-quote">Good reframing holds complexity: intent and impact both matter; history and accountability both matter; compassion and boundaries both matter.</div>`),
          t("Reframing in Practice",`<p>A practical reframing sequence:</p><ol><li>Listen for the blame frame</li><li>Identify the emotion underneath</li><li>Identify possible protective intent</li><li>Validate the impact</li><li>Offer a new frame tentatively</li><li>Ask the family if it fits</li><li>Connect the new frame to a new behavior</li></ol><div class="tc-example"><strong>Example</strong>Family frame: "Our son is lazy." Therapist: "I wonder if laziness is only one possible story. Another possibility is that discouragement has become so heavy that avoiding school protects him from feeling like a failure. That does not mean avoidance can continue, but it may tell us that encouragement and structure both need to be part of the plan."</div><div class="tc-motto">The best reframes are not clever phrases. They are bridges from accusation to change.</div>`)
        ]
      },
      { title:"Working with Emotion",
        intro:"Emotion is not a side issue in family therapy. Emotion organizes perception, memory, attachment, conflict, and behavior. Families often fight about content while reacting to emotion. A family may argue about chores, homework, money, or screen time, but underneath the content may be: Do I matter? Are you there for me? Am I respected? Am I safe? Will you leave? The therapist helps the family move from reactive emotion to vulnerable emotion, from escalation to regulation, and from emotional attack to emotional contact.",
        topics:[
          t("Identifying Emotional Patterns",`<p>Emotional patterns are repeated ways family members express, hide, escalate, or regulate feelings.</p><div class="tc-example"><strong>Common patterns</strong>One member becomes angry; another becomes silent. One cries; another gives advice instead of comfort. One expresses fear; another dismisses it. One feels shame; another criticizes. One feels abandoned; another feels controlled.</div><p>The therapist observes: who expresses emotion openly; who suppresses emotion; who is allowed to be angry; who is allowed to cry; who comforts others; who becomes overwhelmed; who changes the topic; who uses logic to avoid feeling; who becomes the emotional container for the family.</p><div class="tc-quote">A useful question: "What feelings are welcomed in this family, and what feelings are treated as dangerous?"</div>`),
          t("Primary vs. Secondary Emotions",`<p>Primary emotions are the deeper, more vulnerable emotions. Secondary emotions are the protective reactions that appear on the surface.</p><table class="tc-table"><thead><tr><th>Primary</th><th>Secondary (surface)</th></tr></thead><tbody><tr><td>Hurt</td><td>Anger</td></tr><tr><td>Fear</td><td>Control</td></tr><tr><td>Shame</td><td>Defensiveness</td></tr><tr><td>Loneliness</td><td>Criticism</td></tr><tr><td>Grief</td><td>Numbness</td></tr></tbody></table><div class="tc-example"><strong>Therapist language</strong>"When you say 'I don't care,' I wonder if that protects a more painful feeling — maybe that caring has not felt safe."</div><p>Primary emotions often invite connection. Secondary emotions often trigger defense.</p>`),
          t("De-escalating Emotional Reactivity",`<p>De-escalation is necessary when family members become too activated to listen or think clearly. De-escalation tools include: slowing the pace; lowering voice volume; asking one person to speak at a time; reflecting emotion before content; naming the cycle; using breathing or grounding; calling a pause; separating intention from impact; redirecting from accusation to experience; creating a timeout plan.</p><ul><li>"I want to slow this down. The speed of the conversation is becoming part of the problem."</li><li>"Before anyone responds, let us first make sure we understood what was said."</li><li>"I am going to pause the argument here because the family is entering the same cycle we are trying to change."</li></ul><div class="tc-motto">De-escalation is not avoidance. It creates the conditions for meaningful conversation.</div>`),
          t("Increasing Emotional Safety",`<p>Emotional safety means family members can speak honestly without humiliation, retaliation, dismissal, or emotional abandonment. Emotional safety requires: no threats; no name-calling; no mocking; no weaponizing vulnerability; no forced disclosure; permission to pause; predictable limits; repair after harm; and protection from coercion.</p><p>The therapist may establish session rules:</p><ol><li>Speak from your own experience</li><li>No insults or character attacks</li><li>One person speaks at a time</li><li>Anyone can ask for a pause</li><li>Vulnerability cannot be used later as a weapon</li><li>Safety overrides the agenda</li></ol><div class="tc-motto">Emotional safety is especially important for children, trauma survivors, and members with less power.</div>`),
          t("Helping Families Express Vulnerability",`<p>Many families are fluent in anger but inexperienced in vulnerability. The therapist helps translate defensive statements into softer truths.</p><table class="tc-table"><thead><tr><th>Defensive statement</th><th>Vulnerable translation</th></tr></thead><tbody><tr><td>"You never care about me."</td><td>"I feel alone and I need to know I matter."</td></tr><tr><td>"You are always controlling."</td><td>"I feel trusted less than I want to be."</td></tr><tr><td>"You only criticize."</td><td>"I want encouragement, not only correction."</td></tr><tr><td>"I don't care."</td><td>"It hurts too much to show that I care."</td></tr></tbody></table><div class="tc-quote">The therapist may coach: "Can you say that again, but this time begin with 'I feel' rather than 'You always'?" Vulnerability should never be forced — it must be invited and protected.</div>`),
          t("Emotional Validation",`<p>Validation means communicating that a person's emotional experience makes sense from their perspective. It does not mean agreeing with every interpretation or behavior.</p><p>Validation sounds like: "Given how alone you felt, I can understand why you withdrew." "It makes sense that you felt scared when the argument got loud." "Your anger tells us something important, even if the way it came out caused harm."</p><p>Invalidation sounds like: "You are overreacting." "That is not a big deal." "You should not feel that way." "You are too sensitive."</p><div class="tc-quote">Validation reduces defensiveness and helps the nervous system settle. Once people feel understood, they are more able to reflect on their own behavior.</div>`),
          t("Repair Conversations",`<p>Repair conversations help families address harm, misunderstanding, disconnection, or conflict after it occurs. Healthy families are not families without conflict — they are families that can return to connection after rupture.</p><p>A repair conversation may include:</p><ol><li>What happened? What did each person feel?</li><li>What was the impact?</li><li>What responsibility can each person take?</li><li>What apology or acknowledgment is needed?</li><li>What boundary or change is needed?</li><li>What will we do differently next time?</li></ol><div class="tc-example"><strong>Simple repair script</strong>"When I did/said ______, I imagine it affected you by ______. I feel ______ about that. What I wish I had done instead is ______. Next time I will try to ______. Is there anything you need me to understand?"</div><div class="tc-motto">Repair must include accountability. A forced apology without changed behavior is not repair.</div>`),
          t("Shame, Anger, Fear, and Grief",`<p>Four emotions often dominate family therapy.</p><div class="tc-subhead">Shame</div><p>Shame says: "I am bad." "I am not enough." "If they really knew me, they would reject me." Shame often hides behind defensiveness, perfectionism, withdrawal, or blame.</p><div class="tc-subhead">Anger</div><p>Anger may protect boundaries, protest injustice, or hide hurt. But anger can become destructive when expressed through intimidation, contempt, or aggression.</p><div class="tc-subhead">Fear</div><p>Fear often drives control, avoidance, secrecy, overprotection, or rigidity. Parents may look angry when they are terrified. Children may look defiant when they are afraid.</p><div class="tc-subhead">Grief</div><p>Grief may underlie irritability, silence, depression, addiction, or family conflict. Families grieve deaths, divorces, lost dreams, migration losses, infertility, illness, estrangement, and changes in identity.</p><div class="tc-motto">A mature family therapy process helps families name these emotions without becoming ruled by them.</div>`)
        ]
      },
      { title:"Working with Communication",
        intro:"Communication is not only the exchange of words. It includes tone, timing, silence, facial expression, posture, digital messages, family rules, emotional safety, and power. Communication problems are often symptoms of deeper emotional and structural patterns. Skills training helps, but communication exercises alone may fail if fear, power imbalance, trauma, or attachment injury remains unaddressed.",
        topics:[
          t("Common Communication Problems",`<p>Common family communication problems include: criticism; contempt; defensiveness; stonewalling; interrupting; mind-reading; overgeneralizing; blaming; lecturing; emotional flooding; sarcasm; mixed messages; indirect communication; triangulation; silence used as punishment; and digital escalation.</p><div class="tc-example"><strong>Criticism vs. clearer complaint</strong>"You are irresponsible." becomes "I felt stressed when the bill was not paid on time."</div><div class="tc-example"><strong>Mind-reading vs. clearer expression</strong>"You do not care." becomes "When you did not respond, I told myself I did not matter."</div><p>The therapist helps families move from character attacks to specific observations, feelings, needs, and requests.</p>`),
          t("Listening Skills",`<p>Listening is an active clinical skill. Many family members listen only long enough to prepare a defense. Good listening includes: attention; not interrupting; reflecting content and emotion; checking accuracy; asking before responding; tolerating discomfort; and listening for longing beneath criticism.</p><div class="tc-quote">A therapist may coach: "Before you respond, tell her what you heard her say. You do not have to agree yet. First show that you understood."</div><p>Listening does not mean surrendering one's own perspective — it means making space for another person's reality.</p>`),
          t("Reflective Listening",`<p>Reflective listening means repeating or summarizing what another person said in a way that captures both meaning and emotion.</p><div class="tc-quote">Basic structure: "What I hear you saying is ______, and the feeling underneath may be ______. Did I get that right?"</div><div class="tc-example"><strong>Example</strong>"What I hear is that when your father corrects you in front of others, you feel embarrassed and small, not just annoyed. Did I understand?"</div><p>Reflective listening slows escalation and reveals misunderstandings. Families often discover they have been reacting to what they assumed, not what was actually meant.</p>`),
          t("I-Statements",`<p>I-statements help family members speak from experience rather than accusation.</p><div class="tc-quote">Formula: "I feel ______ when ______ because ______. I need/request ______."</div><div class="tc-example"><strong>Transformation</strong>"You never help me." becomes "I feel overwhelmed when I clean alone after dinner because I tell myself the family does not notice my effort. I need us to divide cleanup."</div><div class="tc-subhead">Avoiding fake I-statements</div><p>"I feel like you are selfish" is still an accusation. Better: "I feel unimportant when plans change without asking me." The therapist should teach the difference between feeling words and disguised blame.</p>`),
          t("Requests vs. Complaints",`<p>Complaints describe dissatisfaction. Requests identify a desired behavior. Families often repeat complaints because they have not learned to make clear, realistic requests.</p><div class="tc-example"><strong>Complaint to request</strong>"You never spend time with us." becomes "Can we have dinner together without phones three nights this week?"</div><div class="tc-example"><strong>Complaint to request</strong>"You are too harsh." becomes "When you correct him, can you lower your voice and say one specific thing instead of listing everything?"</div><p>Good requests are specific, observable, realistic, time-limited, respectful, and connected to need.</p>`),
          t("Interruptions and Escalation",`<p>Interruptions often signal anxiety, urgency, fear of being misrepresented, or lack of trust that one will get a turn.</p><div class="tc-quote">"I am going to slow this down. I promise you will get a turn, but right now interruption is making understanding impossible."</div><div class="tc-example"><strong>Naming the cycle</strong>"When you interrupt, she stops explaining. Then you feel she never tells you anything. So the interruption may be creating the silence you fear."</div><p>Escalation can be mapped as a sequence: Trigger → interpretation → emotion → reaction → counter-reaction → escalation → rupture. Once the family sees the escalation sequence, they can intervene earlier.</p>`),
          t("Nonverbal Communication",`<p>Nonverbal communication includes facial expression, posture, distance, sighs, eye contact, silence, gestures, tone, and body orientation.</p><div class="tc-example"><strong>Therapist might notice</strong>"When your daughter began speaking, you looked away and sighed. I wonder what she understood from that."</div><div class="tc-example"><strong>Or</strong>"Your words said you were fine, but your body moved away. What was happening inside?"</div><div class="tc-motto">Nonverbal communication must be interpreted carefully. Cultural norms differ — eye contact, silence, emotional restraint, and physical distance can mean different things across families.</div>`),
          t("Communication Exercises",`<div class="tc-subhead">Speaker-Listener Exercise</div><ol><li>Speaker uses short statements</li><li>Listener reflects before responding</li><li>Speaker confirms or corrects</li><li>Listener asks one curious question</li><li>Roles switch</li></ol><div class="tc-subhead">One-Minute Feeling Share</div><p>Each person completes: "This week I felt ______. I needed ______. One thing I appreciated was ______."</p><div class="tc-subhead">Request Practice</div><p>Each person turns one complaint into one specific request.</p><div class="tc-subhead">Repair Practice</div><p>Each person practices acknowledging impact without defending.</p><div class="tc-motto">Exercises should be brief and repeated. Skills become real only through practice.</div>`),
          t("Digital Communication and Family Conflict",`<p>Modern family conflict often happens through texts, group chats, social media, location tracking, or screenshots. Digital communication can intensify conflict because tone is missing, responses are immediate, and messages can be reread or shared.</p><p>Assessment questions: Do arguments continue by text after in-person conflict? Are family members monitoring one another digitally? Are screenshots used as weapons? Are children pulled into adult conflict through messages? Do co-parents use texting to coordinate or attack?</p><p>Digital boundaries may include: no conflict texting after a certain hour; use text only for logistics during high-conflict co-parenting; no screenshots shared to recruit allies; no major emotional conversations by text; phone-free meals or rituals; and agreed response windows.</p><div class="tc-motto">Digital communication is now part of the family system.</div>`)
        ]
      },
      { title:"Working with Conflict",
        intro:"Conflict is not automatically unhealthy. Families need conflict to negotiate needs, boundaries, autonomy, values, and change. The problem is not conflict itself, but destructive conflict patterns. Healthy conflict includes respect, honesty, emotional regulation, repair, and behavioral change. Destructive conflict includes contempt, intimidation, humiliation, avoidance, retaliation, and no repair. The therapist helps families distinguish disagreement from danger, anger from abuse, and repairable conflict from coercive control.",
        topics:[
          t("Understanding Conflict Cycles",`<p>Conflict cycles are repetitive sequences that trap family members.</p><div class="tc-example"><strong>Example cycle</strong>Parent demands → adolescent resists → parent threatens → adolescent explodes → parent punishes → adolescent withdraws → parent feels disrespected → parent demands again.</div><p>The therapist maps: trigger; meaning each person gives the trigger; emotion; behavior; other person's interpretation; escalation point; aftermath; and attempted repair or lack of repair.</p><div class="tc-quote">"Let us stop debating the topic for a moment and map the cycle. The topic changes, but the dance seems similar." The cycle becomes the clinical target.</div>`),
          t("Differentiating Content from Process",`<p>Content is what the family argues about. Process is how they argue.</p><div class="tc-example"><strong>Content examples</strong>Money, chores, grades, parenting, in-laws, phones, religion, sex, time.</div><div class="tc-example"><strong>Process examples</strong>Criticism, withdrawal, escalation, triangulation, sarcasm, blame, silence, repair.</div><p>Families usually focus on content: "We are fighting about homework." The therapist focuses on process: "The homework issue matters, but the pattern is that one person pressures, one avoids, and then both feel disrespected."</p><div class="tc-motto">Changing process often helps with multiple content areas simultaneously.</div>`),
          t("De-escalation Techniques",`<p>De-escalation helps prevent conflict from becoming emotionally or physically unsafe. Techniques include: slow the pace; lower volume; identify flooding; pause the conversation; use grounding; separate people if needed; name the cycle; reflect each person's fear; set limits on contempt or threats; shift from accusation to need; use a structured turn-taking format.</p><ul><li>"This conversation is moving faster than the family can metabolize. We are going to slow down."</li><li>"I will not allow name-calling in here. You can be angry, but you cannot degrade."</li><li>"Let us pause for thirty seconds. Notice your feet, your breathing, and the chair supporting you."</li></ul><div class="tc-motto">De-escalation is a leadership function. The therapist temporarily provides the regulation the family has not yet developed.</div>`),
          t("Fair Fighting Rules",`<p>Fair fighting rules help families disagree without destruction.</p><ol><li>No physical intimidation</li><li>No threats of abandonment, divorce, or harm unless real decisions being discussed responsibly</li><li>No name-calling or contempt</li><li>No bringing in unrelated past issues</li><li>One topic at a time; one person speaks at a time</li><li>Use timeouts when flooded</li><li>Return to the conversation after cooling down</li><li>Make requests, not only complaints</li><li>End with one concrete next step</li></ol><div class="tc-motto">Rules should not be used to silence legitimate pain. They are meant to protect the conversation so truth can be spoken safely.</div>`),
          t("Conflict Mapping",`<p>Conflict mapping is a structured way to understand recurring arguments. A conflict map traces: what the argument was about; what triggered it; what each person interpreted it to mean; what each person felt; what each person did; when the conflict intensified; what vulnerable need each person had but did not state clearly; whether anyone tried to repair; and what each person will do differently next time.</p><div class="tc-quote">Conflict mapping helps families move from chaos to pattern recognition.</div>`),
          t("Repair and Apology",`<p>Apology is not only saying "sorry." A meaningful apology includes recognition of impact, responsibility, remorse, and change.</p><div class="tc-example"><strong>Weak apology</strong>"I am sorry if you felt hurt."</div><div class="tc-example"><strong>Stronger apology</strong>"I raised my voice and embarrassed you. I can see that it made you feel small. I am sorry. Next time I will pause before correcting you."</div><p>Repair may require: apology; changed behavior; restitution; boundary change; emotional reassurance; accountability plan; time; and repeated consistency.</p><div class="tc-motto">Forgiveness cannot be demanded. Trust is rebuilt through reliable behavior.</div>`),
          t("Forgiveness and Reconciliation",`<div class="tc-quote">Forgiveness may be an internal release of revenge or bitterness. Reconciliation requires relational repair and restored trust. A person may forgive without reconciling if the relationship remains unsafe.</div><p>Useful distinctions: forgiveness is not denial; forgiveness is not permission; forgiveness is not forgetting; forgiveness is not removing consequences.</p><div class="tc-motto">In spiritually oriented families, forgiveness may be a sacred value. The therapist can honor this while still protecting justice and safety.</div>`),
          t("When Conflict Becomes Unsafe",`<p>Conflict becomes unsafe when it includes intimidation, threats, physical violence, coercive control, stalking, sexual coercion, weapon use, child exposure to violence, or fear-based compliance. Signs: one person is afraid to speak honestly; one person monitors or controls the other; threats are made; violence has occurred; children intervene or hide; therapy disclosures lead to retaliation at home; one person dominates through fear.</p><div class="tc-motto">In such cases, conjoint therapy may be inappropriate. The therapist must prioritize safety assessment, mandated reporting where required, specialized referral, and safety planning. Family therapy should never become a stage where harm is repeated under clinical supervision.</div>`)
        ]
      },
      { title:"Working with Boundaries and Roles",
        intro:"Boundaries define who participates in what, who holds responsibility, who has privacy, who makes decisions, and how close or separate family members are. Roles define what each person is expected to do emotionally, practically, and relationally. Healthy families have boundaries that are clear but flexible — they allow connection without intrusion and autonomy without abandonment.",
        topics:[
          t("Boundary Problems",`<p>Boundary problems occur when separateness and connection are poorly regulated. Common problems: diffuse boundaries; rigid boundaries; inconsistent boundaries; privacy violations; emotional overinvolvement; lack of parental unity; children involved in adult issues; unclear household rules; overdependence; emotional cutoff.</p><p>Boundary assessment questions: Who is allowed to know what? Who makes decisions? Who comforts whom? Who carries responsibility? Who has privacy? Who is pulled into conflict? Where is closeness helpful? Where is closeness intrusive?</p><div class="tc-motto">The therapist helps the family create boundaries that fit developmental stage, culture, and safety.</div>`),
          t("Enmeshment",`<p>Enmeshment refers to overly diffuse boundaries, where emotional separateness is limited and family members feel responsible for one another's feelings, choices, or identity. Signs: difficulty making independent decisions; guilt when separating; parents overinvolved in children's emotions; children managing adult distress; privacy seen as betrayal; intense loyalty demands; emotional reactivity to difference.</p><div class="tc-example"><strong>Example</strong>A mother becomes anxious whenever her adult daughter makes an independent decision. The daughter feels guilty and hides choices. The hiding increases the mother's anxiety, creating more control.</div><div class="tc-quote">Therapeutic goal: increase differentiation without destroying connection. "The goal is not less love. The goal is love with enough space for each person to breathe."</div>`),
          t("Disengagement",`<p>Disengagement refers to overly rigid boundaries, where family members are emotionally distant, isolated, or uninvolved. Signs: little emotional sharing; minimal support; avoidance of conflict; children left to manage alone; lack of affection; difficulty asking for help; independence used as emotional protection.</p><div class="tc-example"><strong>Example</strong>A teenager appears independent, but no adult knows she is depressed. The family values self-sufficiency so strongly that distress remains invisible.</div><div class="tc-quote">Therapeutic goal: increase connection without creating intrusion. "This family has protected independence very well. Now we may need to build a little more safe dependence."</div>`),
          t("Parentification",`<p>Parentification occurs when a child takes on adult responsibilities that exceed their developmental capacity — practical caretaking, emotional support, mediating conflict, protecting siblings, or managing a parent's feelings. Parentification can be adaptive in crisis but harmful when chronic and unacknowledged. Signs: child comforts parent regularly; child mediates adult conflict; child manages siblings like a parent; child worries about finances; child suppresses own needs; resentment or burnout appears later.</p><div class="tc-quote">Therapist language: "You have been very strong for this family. Part of our work is making sure you no longer have to be strong in ways that belong to adults."</div>`),
          t("Role Reversal",`<p>Role reversal occurs when a child becomes emotionally or functionally responsible for the parent, or when parent and child roles become confused: a child becomes the parent's therapist; a teenager becomes the household decision-maker; a parent seeks emotional reassurance from a child after marital conflict; a child protects a parent from loneliness.</p><p>Role reversal can create loyalty, guilt, anxiety, and difficulty separating later in life. The therapist may help by strengthening adult support, coaching parents to seek adult peers or professional help, protecting the child from adult disclosures, and restoring parental leadership.</p>`),
          t("Scapegoating",`<p>Scapegoating occurs when one family member becomes the identified source of family distress. The scapegoated person may indeed have symptoms or problematic behaviors, but the family organizes around blaming them in a way that hides broader systemic issues. Signs: one person is described as the whole problem; other conflicts disappear when focus stays on that person; the person's strengths are ignored; family members bond through criticism of the person; attempts to change are not recognized.</p><div class="tc-quote">Therapeutic intervention: "I understand that your son's behavior is a serious concern. I also want to look at what happens around him, because no one person can carry the entire family pattern alone." The goal is to widen the lens without excusing harmful behavior.</div>`),
          t("Boundary-Making Interventions",`<p>Boundary-making interventions help reorganize who speaks to whom, who makes decisions, who is included, and who steps back.</p><ul><li>Asking parents to speak directly to each other rather than through a child</li><li>Asking a child not to answer for a parent</li><li>Seating family members differently</li><li>Holding parent-only sessions</li><li>Coaching grandparents to support but not override parents</li><li>Creating privacy rules; setting limits around adult disclosures to children</li></ul><ul><li>"I am going to ask your daughter to pause. This is a parent decision, and I want the two adults to practice carrying it together."</li><li>"I want you to speak directly to your son, not about him to me."</li></ul><div class="tc-motto">Boundary-making is active and concrete.</div>`),
          t("Restoring Appropriate Roles",`<p>Restoring roles means helping family members return to responsibilities appropriate to their age, position, and capacity: parents lead; children are protected; adolescents gain structured autonomy; couples address couple issues directly; siblings are not used as messengers; grandparents support without taking over; adult children relate to parents as adults.</p><div class="tc-motto">Restoring roles often requires compassion. Families usually developed role distortions to survive stress. The therapist honors adaptation while guiding change.</div>`)
        ]
      },
      { title:"Working with Power, Hierarchy, and Authority",
        intro:"Power exists in every family — from age, gender, money, physical strength, legal status, religious authority, emotional intensity, education, caregiving, or control of information. Family therapy must address power directly. A purely neutral stance can unintentionally protect the most powerful person. At the same time, the therapist should not assume that all authority is oppressive — families need leadership, structure, and responsibility. Healthy authority protects. Unhealthy authority dominates.",
        topics:[
          t("Power in Families",`<p>Power determines whose needs matter, whose voice counts, who makes decisions, who apologizes, who is believed, and who must adapt. Power can be explicit, implicit, economic, emotional, cultural, physical, spiritual, or informational.</p><p>Assessment questions: Who has the final say? Who is afraid of disappointing whom? Who changes behavior to keep peace? Who controls money, transportation, technology, or documents? Who is believed when stories differ? Who apologizes first? Who is allowed to be angry?</p><div class="tc-motto">Power analysis is necessary for ethical family therapy.</div>`),
          t("Parental Authority",`<p>Children need caregivers who can provide safety, structure, warmth, limits, and guidance. Healthy parental authority includes: clear expectations; emotional warmth; consistent limits; age-appropriate autonomy; predictable consequences; parental unity; openness to repair; and protection from adult burdens.</p><div class="tc-quote">Therapist language: "Your child does not need you to be perfect. He needs you to be clear, steady, and repair when needed."</div><div class="tc-motto">Authority should not depend on fear. Fear may produce compliance, but it damages trust and emotional development.</div>`),
          t("Child and Adolescent Autonomy",`<p>Children and adolescents need increasing autonomy as they develop. Autonomy includes: privacy; friendships; clothing; study habits; hobbies; emotional opinions; digital life; future plans; and identity development.</p><p>The therapist helps families distinguish: autonomy from rebellion; guidance from control; protection from overprotection; respect from obedience without voice.</p><div class="tc-quote">A useful frame: "Adolescence requires a new contract: parents remain responsible for safety and values, while the teenager gradually practices decision-making."</div>`),
          t("Gender and Power",`<p>Gender shapes family expectations around labor, emotion, authority, caregiving, sexuality, money, and sacrifice. Assessment questions: Who does emotional labor? Who manages children's schedules? Who controls finances? Who is expected to sacrifice career or rest? Who is allowed to be angry? Who is expected to forgive quickly? How are sons and daughters treated differently?</p><div class="tc-motto">The therapist should not impose one model of gender roles, but should address inequity, coercion, resentment, and lack of consent.</div>`),
          t("Economic Power",`<p>Money affects family power. Economic stress can intensify conflict. Economic control can also become abusive when one person restricts another's access to money, work, transportation, or basic needs.</p><p>Assessment questions: Who earns income? Who manages money? Who has access to accounts? Are financial decisions shared? Is debt hidden? Is money used as punishment? Does anyone feel trapped because of finances?</p>`),
          t("Spiritual and Moral Authority",`<p>Spiritual and moral authority can be a source of wisdom, identity, discipline, hope, and repair. It can also be misused to silence, shame, control, or avoid accountability. Assessment: Who interprets religious or moral rules? Are spiritual values used to support compassion or to silence dissent? Are forgiveness or obedience demanded without repair? Is there conflict between personal conscience and family expectations?</p><div class="tc-quote">Therapist language: "I want to honor the importance of faith in this family. I also want to make sure spiritual language is not used in a way that prevents honest accountability or safety."</div>`),
          t("Coercive Control",`<p>Coercive control is a pattern of domination that may include intimidation, isolation, monitoring, threats, financial restriction, humiliation, sexual coercion, legal manipulation, or control over daily life. It is different from ordinary couple conflict.</p><p>Signs: one person fears the other; one person monitors phone, location, money, clothing, or relationships; one person isolates the other from support; threats are used; apologies are followed by repeated control; therapy disclosures lead to punishment; children are used as leverage.</p><div class="tc-motto">Conjoint therapy can be unsafe when coercive control is present. The therapist must use careful screening, separate assessment when appropriate, documentation, safety planning, and specialized referral. Neutrality in coercive control can become complicity. Safety comes first.</div>`),
          t("Empowerment Without Chaos",`<p>Empowerment means helping less powerful family members gain voice, dignity, safety, and appropriate influence — but not removing all structure or authority.</p><ul><li>A child gains voice but not adult responsibility</li><li>An adolescent gains autonomy but not unlimited freedom</li><li>A spouse gains financial transparency without creating revenge</li><li>A parent gains leadership without harsh control</li></ul><div class="tc-motto">Voice + structure; autonomy + responsibility; authority + accountability; compassion + boundaries. The therapist helps families build power that is protective, shared where appropriate, and accountable.</div>`)
        ]
      },
      { title:"Working with Family Narratives",
        intro:"Families live inside stories. These stories explain who they are, what happened to them, what is possible, who is good, who is bad, who belongs, who failed, what must never be spoken, and what the future can become. Family narratives can heal or imprison. The therapist listens not only for facts but for organizing stories — and helps the family develop narratives that are more truthful, compassionate, and life-giving.",
        topics:[
          t("Family Stories",`<p>Family stories transmit identity, values, warnings, pride, shame, and belonging. Some stories are repeated often; others are hidden. Assessment questions: What stories does this family tell about itself? Which stories are told at gatherings? Which stories are avoided? Who is the hero? Who is the problem? Who is forgotten? What story explains the family's suffering? What story explains its resilience?</p><div class="tc-quote">Family stories can be resources. A story of migration, sacrifice, faith, survival, or love may become a foundation for change.</div>`),
          t("Identity Narratives",`<p>Identity narratives define who each person is inside the family: "the responsible one," "the troublemaker," "the smart one," "the lazy one," "the peacemaker," "the selfish one." These labels shape behavior — a child called "the difficult one" may begin to occupy that role.</p><div class="tc-example"><strong>Therapeutic task</strong>"I wonder if we can make room for a fuller story of your son — not only the angry part, but also the part that feels deeply and wants respect."</div><p>The therapist helps: separate the person from the role; expand the story; find exceptions; and invite new identity claims.</p>`),
          t("Trauma Narratives",`<p>Trauma narratives are the stories families develop around overwhelming events. Some families speak of trauma constantly; others never speak of it. Both patterns can cause problems. Trauma narratives may include: "It was our fault." "No one can be trusted." "We survived because we stayed silent." Trauma-informed narrative work requires safety, pacing, and consent.</p><div class="tc-example"><strong>A healthier trauma narrative</strong>"What happened harmed us, but it does not define all of who we are. We survived, we are learning, and we can protect the next generation differently."</div>`),
          t("Shame Narratives",`<p>Shame narratives tell family members that they are defective, unworthy, dishonorable, or beyond repair: "We are a broken family." "You embarrassed us." "I am not lovable." Shame thrives in secrecy and accusation.</p><div class="tc-quote">Therapist language: "Shame tells the family to hide. Healing usually asks the family to tell the truth safely."</div><p>Guilt says "I did something wrong" — and can support repair. Shame says "I am wrong" — and often blocks it. The therapist reduces shame through compassion, normalization, accountability without humiliation, and careful reframing.</p>`),
          t("Resilience Narratives",`<p>Resilience narratives highlight how families endure, adapt, love, protect, and rebuild. They should not be used to deny pain but to restore agency. Questions: How has this family survived hard times? Who showed courage? What values helped you endure? When has the family repaired after conflict?</p><div class="tc-example"><strong>A resilience narrative</strong>"This family has known loss and conflict, but it also has a pattern of showing up when things become serious."</div><div class="tc-quote">Resilience becomes clinically useful when connected to action: "How can that same strength be used this week in a new way?"</div>`),
          t("Re-authoring Family Meaning",`<p>Re-authoring means helping the family develop a more truthful, compassionate, and hopeful story. It does not erase suffering — it reorganizes meaning.</p><table class="tc-table"><thead><tr><th>Old story</th><th>Re-authored story</th></tr></thead><tbody><tr><td>"We are a family that always fails."</td><td>"We are a family that inherited painful patterns, but we are learning to interrupt them."</td></tr><tr><td>"Our daughter is the problem."</td><td>"Our daughter's distress helped us see a family pattern that needed attention."</td></tr><tr><td>"Conflict means we do not love each other."</td><td>"Conflict means there are needs we have not yet learned to express safely."</td></tr></tbody></table><div class="tc-motto">Re-authoring requires evidence. The therapist helps the family notice exceptions, strengths, repairs, and choices that support the new story.</div>`),
          t("Rituals, Symbols, and Shared Memory",`<p>Rituals and symbols help families embody meaning. They can mark grief, apology, transition, belonging, reconciliation, or new beginnings.</p><ul><li>Weekly family meeting; shared meal without phones</li><li>Apology letter; memory box after a death</li><li>Blessing or prayer before a transition</li><li>Family walk after conflict; lighting a candle for a lost family member</li><li>Graduation or coming-of-age ritual; gratitude practice</li><li>Storytelling night with elders</li></ul><div class="tc-quote">Rituals are especially helpful when words are not enough. A therapist might ask: "What small ritual could remind the family that you are practicing a new pattern?"</div>`)
        ]
      }
    ]
  },

// Sidebar nav
const partNav = document.querySelector('.part-nav');
DATA.forEach(part => {
  const a = document.createElement('div');
  a.className = 'part-nav-item';
  a.textContent = `Part ${part.part}: ${part.title}`;
  a.addEventListener('click', () => {
    const el = document.getElementById('part-' + part.part);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  partNav.appendChild(a);
});

function highlight(text, query) {
  if (!query || !text) return text || '';
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function render(filterPart, query) {
  const content = document.getElementById('content');
  const noResults = document.getElementById('no-results');
  content.querySelectorAll('.part-section').forEach(el => el.remove());
  let totalTopics = 0, anyVisible = false;
  const q = query ? query.toLowerCase() : '';

  DATA.forEach(part => {
    if (filterPart !== 'all' && part.part !== filterPart) return;

    const filteredChapters = part.chapters.map(ch => {
      const filteredTopics = ch.topics.filter(topic => {
        if (!q) return true;
        return topic.title.toLowerCase().includes(q)
          || (topic.content && topic.content.replace(/<[^>]+>/g,'').toLowerCase().includes(q))
          || ch.title.toLowerCase().includes(q)
          || (ch.intro && ch.intro.toLowerCase().includes(q))
          || (part.partIntro && part.partIntro.toLowerCase().includes(q));
      });
      if (q && filteredTopics.length === 0) return null;
      return { ...ch, filteredTopics: q ? filteredTopics : ch.topics };
    }).filter(Boolean);

    if (!filteredChapters.length) return;
    anyVisible = true;

    const section = document.createElement('div');
    section.className = `part-section ${part.partClass}`;
    section.id = 'part-' + part.part;

    const hdr = document.createElement('div');
    hdr.className = 'part-header';
    hdr.innerHTML = `<span>${highlight(part.title, query)}</span><span class="part-badge">Part ${part.part}</span>`;
    section.appendChild(hdr);

    if (part.partIntro) {
      const pi = document.createElement('div');
      pi.style.cssText = 'font-size:0.92rem;color:var(--ink-soft);line-height:1.7;padding:0 0 1.25rem;font-style:italic;border-bottom:1px solid var(--border);margin-bottom:1.25rem;';
      pi.innerHTML = highlight(part.partIntro, query);
      section.appendChild(pi);
    }

    filteredChapters.forEach(ch => {
      totalTopics += ch.filteredTopics.length;
      const card = document.createElement('div');
      card.className = 'chapter-card' + (q ? ' open' : '');

      const cardHdr = document.createElement('div');
      cardHdr.className = 'chapter-header';
      cardHdr.innerHTML = `<div class="chapter-title">${highlight(ch.title, query)}</div><span class="chapter-count">${ch.filteredTopics.length} topic${ch.filteredTopics.length !== 1 ? 's' : ''}</span><svg class="chapter-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;
      cardHdr.addEventListener('click', () => card.classList.toggle('open'));
      card.appendChild(cardHdr);

      const list = document.createElement('div');
      list.className = 'topics-list';

      if (ch.intro) {
        const introEl = document.createElement('div');
        introEl.className = 'chapter-intro';
        introEl.innerHTML = highlight(ch.intro, query);
        list.appendChild(introEl);
      }

      ch.filteredTopics.forEach(topic => {
        const hasContent = !!topic.content;
        const item = document.createElement('div');
        item.className = 'topic-item' + (hasContent ? ' has-content' : '');

        const th = document.createElement('div');
        th.className = 'topic-header';
        th.innerHTML = `<span class="topic-dot"></span><span class="topic-title-text">${highlight(topic.title, query)}</span>${hasContent ? '<span class="topic-toggle">▾</span>' : ''}`;
        item.appendChild(th);

        if (hasContent) {
          const cd = document.createElement('div');
          cd.className = 'topic-content';
          // Don't run highlight() on HTML content — it would corrupt tags
          cd.innerHTML = topic.content;
          item.appendChild(cd);
          th.addEventListener('click', () => item.classList.toggle('open'));
          if (q && topic.content.replace(/<[^>]+>/g,'').toLowerCase().includes(q)) item.classList.add('open');
        } else {
          const ph = document.createElement('div');
          ph.className = 'topic-placeholder';
          ph.textContent = 'Content coming soon.';
          item.appendChild(ph);
          th.addEventListener('click', () => item.classList.toggle('open'));
        }
        list.appendChild(item);
      });

      card.appendChild(list);
      section.appendChild(card);
    });

    content.insertBefore(section, noResults);
  });

  document.getElementById('result-count').textContent = totalTopics.toLocaleString();
  noResults.classList.toggle('show', !anyVisible);
}

let currentFilter = 'all', currentQuery = '';
function update() { render(currentFilter, currentQuery); }

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentFilter = pill.dataset.filter;
    update();
  });
});

let searchTimeout;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { currentQuery = e.target.value.trim(); update(); }, 160);
});

document.getElementById('expand-all-btn').addEventListener('click', () => document.querySelectorAll('.chapter-card').forEach(c => c.classList.add('open')));
document.getElementById('collapse-all-btn').addEventListener('click', () => document.querySelectorAll('.chapter-card').forEach(c => c.classList.remove('open')));

render('all', '');
</script>
