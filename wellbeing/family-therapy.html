<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Therapy — Comprehensive Guide | Yasir Bilgin</title>

<!-- Global nav — MUST be first script -->
<script src="https://yasirbilgin.com/nav.js"></script>

<!-- Favicons -->
<link rel="icon" type="image/x-icon"   href="/favicon/favicon.ico">
<link rel="icon" type="image/svg+xml"  href="/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180"    href="/favicon/apple-touch-icon.png">
<link rel="manifest" href="/favicon/site.webmanifest">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --ink-soft: #3d3d5c;
    --cream: #f8f5f0;
    --warm-white: #fefcf9;
    --accent: #7c4d8a;
    --accent-light: #b07fc4;
    --accent-pale: #f0e8f5;
    --gold: #c9933c;
    --gold-pale: #fdf3e3;
    --teal: #2a7d8c;
    --teal-pale: #e3f2f5;
    --rose: #9c3d5a;
    --rose-pale: #fce8ee;
    --sage: #4a7c59;
    --sage-pale: #e8f4ec;
    --rust: #8c4a2a;
    --rust-pale: #f5ece8;
    --border: #e0d8cc;
    --shadow: rgba(26, 26, 46, 0.08);
    --nav-height: 62px;
    --toolbar-height: 120px; /* approx height of sticky toolbar on desktop */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Sticky toolbar (sits below nav.js bar) ── */
  .page-toolbar {
    position: sticky;
    top: var(--nav-height); /* flush below the 62px global nav */
    z-index: 50;            /* well below nav.js z-index */
    background: var(--ink);
    color: var(--cream);
    padding: 1rem 1.5rem 0.9rem;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .toolbar-inner { max-width: 1200px; margin: 0 auto; }

  .toolbar-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 3vw, 1.6rem);
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 0.75rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toolbar-title span { color: var(--accent-light); }

  .search-wrap { position: relative; margin-bottom: 0.75rem; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #888; pointer-events: none; }
  #search {
    width: 100%;
    padding: 0.65rem 1rem 0.65rem 2.75rem;
    border-radius: 8px;
    border: 1.5px solid #3a3a5a;
    background: #252540;
    color: var(--cream);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1rem;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
    min-height: 44px; /* touch target */
  }
  #search::placeholder { color: #888; }
  #search:focus { border-color: var(--accent-light); background: #2d2d50; }

  .filters {
    display: flex;
    flex-wrap: nowrap;
    gap: 0.4rem;
    align-items: center;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filters::-webkit-scrollbar { display: none; }

  .pill {
    padding: 0.35rem 0.85rem;
    border-radius: 50px;
    border: 1.5px solid #3a3a5a;
    background: transparent;
    color: #bbb;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    flex-shrink: 0;
    min-height: 36px; /* reasonable touch target on filter pills */
  }
  .pill:hover { border-color: var(--accent-light); color: var(--accent-light); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pill-all.active { background: var(--gold); border-color: var(--gold); }

  /* ── Stats bar ── */
  .stats-bar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0.65rem 1.5rem;
    font-size: 0.85rem;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  #result-count { font-weight: 600; color: var(--accent); }

  /* ── Main two-column layout ── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem;
    display: grid;
    grid-template-columns: 210px 1fr;
    gap: 1.75rem;
    align-items: start;
  }

  /* ── Clinical Case Navigator (left sidebar) ── */
  .part-nav {
    position: sticky;
    /* sits below nav (62px) + toolbar (approx 120px) */
    top: calc(var(--nav-height) + var(--toolbar-height) + 8px);
    max-height: calc(100vh - var(--nav-height) - var(--toolbar-height) - 24px);
    overflow-y: auto;
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    font-size: 0.82rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; gap: 0.5rem; }
  .nav-title { font-family: 'Playfair Display', serif; font-size: 0.88rem; font-weight: 600; color: var(--ink); line-height: 1.2; }
  .nav-clear {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.25rem 0.5rem;
    font-size: 0.72rem;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
    min-height: 28px;
  }
  .nav-clear:hover { border-color: var(--accent); color: var(--accent); }
  .nav-clear.active { background: var(--rose-pale); border-color: var(--rose); color: var(--rose); }

  /* ── Tag category accordion dropdowns ── */
  .tag-category { margin-bottom: 0.4rem; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

  .tag-cat-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0.5rem 0.65rem;
    background: var(--cream);
    border: none;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--ink-soft);
    text-align: left;
    transition: background 0.15s;
    min-height: 36px;
  }
  .tag-cat-toggle:hover { background: var(--accent-pale); color: var(--accent); }
  .tag-cat-toggle.has-active { color: var(--accent); background: var(--accent-pale); }
  .tag-cat-toggle .cat-badge {
    font-size: 0.65rem;
    background: var(--accent);
    color: #fff;
    border-radius: 50px;
    padding: 0.05rem 0.4rem;
    margin-left: 0.3rem;
    font-weight: 700;
  }
  .tag-cat-toggle .cat-chevron {
    color: #bbb;
    font-size: 0.6rem;
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-left: auto;
    padding-left: 0.3rem;
  }
  .tag-category.open .tag-cat-toggle .cat-chevron { transform: rotate(180deg); }
  .tag-category.open .tag-cat-toggle { border-bottom: 1px solid var(--border); }

  .tag-checkbox-list {
    display: none;
    flex-direction: column;
    padding: 0.3rem 0;
    background: var(--warm-white);
    max-height: 220px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .tag-category.open .tag-checkbox-list { display: flex; }

  .tag-checkbox-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.28rem 0.65rem;
    cursor: pointer;
    transition: background 0.12s;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.75rem;
    color: var(--ink-soft);
    user-select: none;
  }
  .tag-checkbox-item:hover { background: var(--accent-pale); color: var(--ink); }
  .tag-checkbox-item.checked { color: var(--accent); font-weight: 500; background: var(--accent-pale); }

  .tag-checkbox-box {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: transparent;
  }
  .tag-checkbox-item.checked .tag-checkbox-box {
    background: var(--accent);
    border-color: var(--accent);
  }
  .tag-checkbox-item.checked .tag-checkbox-box::after {
    content: '';
    display: block;
    width: 8px;
    height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translate(1px, -1px);
  }
  /* Per-category accent colours for checked items */
  .tag-cat-problem .tag-checkbox-item.checked .tag-checkbox-box { background: var(--rose); border-color: var(--rose); }
  .tag-cat-problem .tag-checkbox-item.checked { color: var(--rose); }
  .tag-cat-structure .tag-checkbox-item.checked .tag-checkbox-box { background: var(--teal); border-color: var(--teal); }
  .tag-cat-structure .tag-checkbox-item.checked { color: var(--teal); }
  .tag-cat-context .tag-checkbox-item.checked .tag-checkbox-box { background: var(--sage); border-color: var(--sage); }
  .tag-cat-context .tag-checkbox-item.checked { color: var(--sage); }
  .tag-cat-goal .tag-checkbox-item.checked .tag-checkbox-box { background: var(--gold); border-color: var(--gold); }
  .tag-cat-goal .tag-checkbox-item.checked { color: var(--gold); }

  .nav-match-info { font-size: 0.75rem; color: var(--ink-soft); text-align: center; padding: 0.5rem 0 0; border-top: 1px solid var(--border); margin-top: 0.5rem; }
  .nav-match-info strong { color: var(--accent); }

  /* ── Content column ── */
  .content { min-width: 0; }

  .part-section { margin-bottom: 2rem; }
  .part-header {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 3vw, 1.5rem);
    font-weight: 700;
    color: var(--ink);
    padding: 1rem 0 0.5rem;
    border-bottom: 2px solid var(--border);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .part-badge { font-family: 'Source Sans 3', sans-serif; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.2rem 0.6rem; border-radius: 50px; background: var(--accent-pale); color: var(--accent); }

  .chapter-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1rem; overflow: hidden; transition: box-shadow 0.2s, border-color 0.2s; }
  .chapter-card:hover { box-shadow: 0 4px 20px var(--shadow); border-color: #c8c0b8; }
  .chapter-header { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.25rem; cursor: pointer; user-select: none; min-height: 44px; }
  .chapter-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 600; color: var(--ink); flex: 1; }
  .chapter-count { font-size: 0.75rem; color: #999; background: var(--cream); border: 1px solid var(--border); padding: 0.15rem 0.5rem; border-radius: 50px; white-space: nowrap; }
  .chapter-chevron { color: #bbb; transition: transform 0.2s; flex-shrink: 0; }
  .chapter-card.open .chapter-chevron { transform: rotate(180deg); }
  .topics-list { display: none; padding: 0 1.25rem 1.25rem; }
  .chapter-card.open .topics-list { display: block; }
  .chapter-intro { font-size: 0.9rem; color: var(--ink-soft); line-height: 1.7; padding: 0.9rem 0.75rem 0.75rem; border-top: 1px solid var(--border); font-style: italic; margin-bottom: 0.5rem; }

  .topic-item { margin: 0.25rem 0; border-radius: 8px; border: 1px solid transparent; overflow: hidden; }
  .topic-item.has-content { cursor: pointer; }
  .topic-item.has-content:hover { border-color: #d4b8e0; }
  .topic-item.open { border-color: #d4b8e0; }
  .topic-header { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.55rem 0.75rem; transition: background 0.15s; min-height: 44px; }
  .topic-item.has-content .topic-header:hover { background: var(--accent-pale); }
  .topic-item.open .topic-header { background: var(--accent-pale); }
  .topic-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-light); margin-top: 0.48rem; flex-shrink: 0; }
  .topic-item.open .topic-dot { background: var(--accent); }
  .topic-title-text { font-size: 0.92rem; color: var(--ink-soft); flex: 1; line-height: 1.4; }
  .topic-item.open .topic-title-text { color: var(--accent); font-weight: 500; }
  .topic-toggle { font-size: 0.68rem; color: #bbb; margin-top: 0.35rem; flex-shrink: 0; transition: transform 0.2s; }
  .topic-item.open .topic-toggle { transform: rotate(180deg); color: var(--accent); }
  .topic-content { display: none; padding: 0.75rem 1.25rem 1.1rem 1.75rem; font-size: 0.9rem; color: var(--ink-soft); line-height: 1.75; border-top: 1px solid #e0d0ed; background: var(--accent-pale); }
  .topic-item.open .topic-content { display: block; }
  .topic-placeholder { display: none; padding: 0.5rem 0.75rem 0.65rem 1.75rem; font-size: 0.83rem; color: #c0b8b0; font-style: italic; border-top: 1px solid var(--border); background: #fafaf8; }
  .topic-item.open .topic-placeholder { display: block; }

  /* Rich content inside topic panels */
  .topic-content p { margin-bottom: 0.75rem; }
  .topic-content p:last-child { margin-bottom: 0; }
  .topic-content ul { list-style: none; margin: 0.5rem 0 0.75rem 0; padding: 0; }
  .topic-content ul li { padding: 0.2rem 0 0.2rem 1.1rem; position: relative; }
  .topic-content ul li::before { content: "–"; position: absolute; left: 0; color: var(--accent-light); }
  .topic-content ol { margin: 0.5rem 0 0.75rem 1.2rem; }
  .topic-content ol li { padding: 0.2rem 0; }
  .topic-content .tc-subhead { font-family: 'Playfair Display', serif; font-size: 0.88rem; font-weight: 600; color: var(--accent); margin: 1rem 0 0.3rem; }
  .topic-content .tc-subhead:first-child { margin-top: 0; }
  .topic-content .tc-example { background: var(--warm-white); border-left: 3px solid var(--accent-light); border-radius: 0 6px 6px 0; padding: 0.6rem 0.9rem; margin: 0.6rem 0; font-style: italic; font-size: 0.87rem; line-height: 1.65; }
  .topic-content .tc-example strong { font-style: normal; font-weight: 600; color: var(--accent); display: block; margin-bottom: 0.15rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .topic-content .tc-quote { background: var(--warm-white); border: 1px solid #d4b8e0; border-radius: 8px; padding: 0.75rem 1rem; margin: 0.6rem 0; font-family: 'Playfair Display', serif; font-size: 0.9rem; color: var(--ink); font-style: italic; line-height: 1.6; }
  .topic-content .tc-table { width: 100%; border-collapse: collapse; margin: 0.6rem 0; font-size: 0.85rem; }
  .topic-content .tc-table th { background: var(--accent); color: #fff; padding: 0.4rem 0.7rem; text-align: left; font-weight: 600; }
  .topic-content .tc-table td { padding: 0.35rem 0.7rem; border-bottom: 1px solid #e0d0ed; vertical-align: top; }
  .topic-content .tc-table tr:last-child td { border-bottom: none; }
  .topic-content .tc-table tr:nth-child(even) td { background: rgba(255,255,255,0.5); }
  .topic-content .tc-motto { background: var(--teal-pale); border-radius: 8px; padding: 0.6rem 1rem; margin: 0.6rem 0; font-size: 0.88rem; color: var(--teal); font-weight: 500; line-height: 1.5; }
  .topic-content .tc-list-group { margin: 0.4rem 0 0.75rem; }
  .topic-content .tc-list-group-title { font-size: 0.82rem; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
  mark { background: #ffe066; color: var(--ink); padding: 0 2px; border-radius: 2px; }

  /* Scrollable table wrapper */
  .tc-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  .no-results { text-align: center; padding: 4rem 2rem; color: var(--ink-soft); display: none; }
  .no-results.show { display: block; }
  .no-results h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--ink); }

  /* Part badge colours */
  .part-I .part-badge { background: var(--teal-pale); color: var(--teal); }
  .part-II .part-badge { background: var(--accent-pale); color: var(--accent); }
  .part-III .part-badge { background: var(--gold-pale); color: #a07020; }
  .part-IV .part-badge { background: var(--sage-pale); color: var(--sage); }
  .part-V .part-badge { background: var(--rose-pale); color: var(--rose); }
  .part-VI .part-badge { background: var(--rust-pale); color: var(--rust); }
  .part-VII .part-badge { background: var(--teal-pale); color: var(--teal); }
  .part-VIII .part-badge { background: var(--accent-pale); color: var(--accent); }
  .part-IX .part-badge { background: var(--gold-pale); color: #a07020; }
  .part-X .part-badge { background: var(--sage-pale); color: var(--sage); }
  .part-XI .part-badge { background: var(--rose-pale); color: var(--rose); }
  .part-XII .part-badge { background: var(--rust-pale); color: var(--rust); }
  .part-App .part-badge { background: var(--teal-pale); color: var(--teal); }

  .expand-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.8rem;
    font-size: 0.8rem;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    transition: all 0.15s;
    min-height: 36px;
  }
  .expand-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Mobile: collapse to single column ── */
  @media (max-width: 860px) {
    .main { grid-template-columns: 1fr; padding: 1rem; gap: 1rem; }
    .part-nav { display: none; } /* hide sidebar nav on mobile */
    .toolbar-title { font-size: 1rem; }
  }

  @media (max-width: 600px) {
    .page-toolbar { padding: 0.75rem 1rem 0.65rem; }
    .chapter-title { font-size: 0.95rem; }
    .stats-bar { padding: 0.5rem 1rem; font-size: 0.8rem; }
    .main { padding: 0.75rem; }
  }

  /* footer */
  footer {
    max-width: 1200px;
    margin: 2rem auto 0;
    padding: 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.82rem;
    color: var(--ink-soft);
    flex-wrap: wrap;
  }
  .footer-logo { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--ink); font-size: 0.95rem; }
</style>
</head>
<body>

<!-- ── Sticky toolbar (sits below nav.js global bar) ── -->
<div class="page-toolbar" id="pageToolbar">
  <div class="toolbar-inner">
    <div class="toolbar-title">Family Therapy — <span>Comprehensive Guide</span></div>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search chapters, topics, concepts…" autocomplete="off" spellcheck="false">
    </div>
    <div class="filters">
      <button class="pill pill-all active" data-filter="all">All</button>
      <button class="pill" data-filter="I">Foundations</button>
      <button class="pill" data-filter="II">Theories</button>
      <button class="pill" data-filter="III">Assessment</button>
      <button class="pill" data-filter="IV">Clinical Skills</button>
      <button class="pill" data-filter="V">Populations</button>
      <button class="pill" data-filter="VI">Culture</button>
      <button class="pill" data-filter="VII">Ethics</button>
      <button class="pill" data-filter="VIII">Practice</button>
      <button class="pill" data-filter="IX">Research</button>
      <button class="pill" data-filter="X">Advanced</button>
      <button class="pill" data-filter="XI">Cases</button>
      <button class="pill" data-filter="XII">Training</button>
      <button class="pill" data-filter="App">Appendices</button>
    </div>
  </div>
</div>

<!-- ── Stats bar ── -->
<div class="stats-bar">
  <span>Showing <span id="result-count">0</span> topics</span>
  <button class="expand-btn" id="expand-all-btn">Expand all</button>
  <button class="expand-btn" id="collapse-all-btn">Collapse all</button>
</div>

<!-- ── Main layout ── -->
<div class="main">
  <!-- Left: Clinical Case Navigator -->
  <nav class="part-nav" id="case-nav">
    <div class="nav-header">
      <span class="nav-title">Clinical Case<br>Navigator</span>
      <button class="nav-clear" id="nav-clear-btn">Clear all</button>
    </div>
    <div id="tag-panel"></div>
    <div class="nav-match-info" id="nav-match-info">Select tags to filter content</div>
  </nav>

  <!-- Right: Content -->
  <div class="content" id="content">
    <div class="no-results" id="no-results"><h3>No results found</h3><p>Try a different search term or clear filters.</p></div>
  </div>
</div>

<footer>
  <span class="footer-logo">Yasir Bilgin</span>
  <span>© 2026 Yasir Bilgin Editorial.</span>
</footer>

<script>
// ── Tag helper ───────────────────────────────────────────────────────────────

const DATA = [
  {
    part:"I", partClass:"part-I", title:"Foundations of Family Therapy",
    partIntro:"Family therapy begins with a shift in vision. Instead of seeing human problems only as internal defects within individuals, family therapy asks how suffering, symptoms, strengths, identities, roles, and coping patterns develop inside relationships. A person is never only an isolated psychological unit — a person is also a child, parent, spouse, sibling, grandchild, caregiver, cultural member, spiritual being, and historical carrier of family patterns. The foundational insight is simple but powerful: people shape relationships, and relationships shape people.",
    chapters:[
      { title:"What Is Family Therapy?",
        intro:"Family therapy is a form of psychotherapy that works with families, couples, and relational systems to reduce distress and improve patterns of interaction. It can involve all family members, selected members, parents only, couples, siblings, caregivers, extended family, or even chosen family members depending on the clinical goal. The central assumption is that psychological and relational problems are often maintained, intensified, softened, or transformed through patterns of communication, attachment, boundaries, roles, power, culture, and meaning.",
        topics:[
          t("Definition of Family Therapy",`<p>Family therapy is a relational approach to psychotherapy that seeks to understand and change patterns within family systems. It treats the family not as a collection of separate individuals but as an interconnected emotional and relational unit.</p>
<div class="tc-quote">Family therapy is a clinical approach that helps family members understand and change relational patterns that contribute to distress, while strengthening communication, connection, boundaries, safety, and resilience.</div>
<p>Family therapy may focus on: how family members communicate; how conflict escalates; how roles are assigned; how boundaries are maintained or violated; how emotions are expressed or suppressed; how symptoms affect the family; how family history shapes present behavior; how culture, spirituality, and social pressures shape family life; and how new patterns can be practiced.</p>
<div class="tc-example"><strong>Example</strong>A child is described as "defiant." An individual lens may ask: What diagnosis explains the child's behavior? A family therapy lens also asks: When does the defiance occur? Who gives instructions? How are limits set? Do parents agree? What happens after the child refuses? Does the child's behavior distract from another family conflict? What emotional need is the child communicating? What developmental stage is involved?</div>
<p>Family therapy does not replace individual assessment — it expands it.</p>`),
          t("Family Therapy vs. Individual Therapy",`<p>Individual therapy usually focuses on the inner world of one person: thoughts, emotions, trauma, beliefs, coping strategies, identity, symptoms, and behavior. Family therapy focuses on relationships: interaction patterns, communication, roles, boundaries, shared meanings, and systemic context.</p>
<div class="tc-table-wrap"><table class="tc-table"><thead><tr><th>Individual Therapy</th><th>Family Therapy</th></tr></thead><tbody>
<tr><td>Primary unit is the individual</td><td>Primary unit is the relational system</td></tr>
<tr><td>Focuses on inner experience</td><td>Focuses on interaction patterns and relational meaning</td></tr>
<tr><td>Asks "What is happening inside this person?"</td><td>Asks "What is happening between people?"</td></tr>
<tr><td>Symptoms treated as individual distress</td><td>Symptoms understood in relational context</td></tr>
<tr><td>Change through personal insight and skill</td><td>Change through new relational patterns</td></tr>
<tr><td>Therapist works mainly with one client</td><td>Therapist manages multiple perspectives and alliances</td></tr>
</tbody></table></div>
<div class="tc-example"><strong>Example</strong>Individual formulation: The adolescent has anxiety and avoids school. Family formulation: The adolescent's anxiety increases when parental conflict rises. School refusal brings the parents into temporary cooperation, which reduces marital tension but reinforces avoidance. Both formulations may be true. Family therapy adds a larger map.</div>
<p>Family therapy is especially useful when the problem affects multiple family members, family members disagree about the problem, one person's symptoms create relational stress, or treatment requires support from caregivers.</p>`),
          t("The Family as a System",`<p>A system is a set of interconnected parts that influence one another. In a family system, each member's behavior affects the others, and the family as a whole develops patterns that shape each member.</p>
<p>A family system includes people, roles, rules, boundaries, communication patterns, emotional climate, rituals, hierarchies, alliances, conflicts, stories, values, loyalties, secrets, and histories.</p>
<div class="tc-example"><strong>Example</strong>A parent loses a job → financial stress increases → marital tension rises → child becomes anxious → school problems appear → parents focus on child → marital conflict becomes hidden but unresolved.</div>
<p>Systems thinking helps the therapist move from linear blame to circular understanding. The therapist asks not only "Why is this person doing this?" but also: What happens before and after this behavior? How do others respond? What pattern does this behavior belong to? What does this behavior do for the system?</p>`),
          t("Why Symptoms Are Often Relational",`<p>A symptom may appear in one person, but it often affects the whole family and may be shaped by family responses.</p>
<ul><li>A child's anxiety may lead parents to over-accommodate, reducing distress short-term but increasing avoidance long-term.</li><li>A spouse's depression may lead the other spouse to overfunction, creating resentment and helplessness.</li><li>A teenager's rebellion may intensify when parents respond with inconsistent discipline.</li><li>Addiction may reorganize the family around secrecy, rescuing, mistrust, and crisis.</li></ul>
<div class="tc-quote">Cause is not the same as maintenance.</div>
<p>A panic disorder may not be caused by family interaction, but family responses may maintain or reduce it. A child's ADHD may be neurodevelopmental, but household structure can either support or overwhelm the child.</p>
<p>A symptom may function as: a signal of distress; an attempt to regulate emotion; a response to trauma; a way to communicate what cannot be said; a stabilizer of family attention; a distraction from another conflict; a developmental protest; a loyalty expression; or a survival adaptation. The therapist must hold compassion and accountability together.</p>`),
          t("The Family Therapist's Core Assumptions",`<p>Family therapists may come from different schools but most share several core assumptions.</p>
<div class="tc-subhead">People are relational beings</div><p>Human beings develop through relationships. Attachment, identity, language, emotion regulation, values, and meaning are all formed in relational contexts.</p>
<div class="tc-subhead">Problems are often maintained by patterns</div><p>A family may not be stuck because people lack love. They may be stuck because their attempts to protect, control, withdraw, rescue, or persuade create repeating cycles.</p>
<div class="tc-subhead">Behavior has context</div><p>A behavior that looks irrational may make sense when seen in family history, trauma, culture, development, or survival context.</p>
<div class="tc-subhead">Change in one part affects the whole</div><p>When one family member changes their response, the entire pattern may shift.</p>
<div class="tc-subhead">Families have strengths</div><p>Even distressed families often contain loyalty, sacrifice, humor, faith, memory, survival, care, and desire for connection.</p>
<div class="tc-subhead">Safety comes first</div><p>Systemic understanding must never excuse abuse, coercion, neglect, or violence. The therapist is not neutral about harm.</p>
<div class="tc-motto">Understand everyone. Blame no one simplistically. Protect the vulnerable. Challenge the pattern. Strengthen the system.</div>`),
          t("Goals of Family Therapy",`<p>The goals of family therapy depend on the presenting problem, family structure, culture, developmental stage, and safety concerns. Common goals include:</p>
<ul><li>Reduce destructive conflict and improve communication</li><li>Increase emotional safety and strengthen parental leadership</li><li>Support child and adolescent development</li><li>Clarify boundaries and roles; reduce triangulation</li><li>Repair attachment injuries and rebuild trust</li><li>Support recovery from trauma, grief, illness, or addiction</li><li>Improve co-parenting and create rituals of connection</li><li>Help family members understand each other more accurately</li></ul>
<div class="tc-example"><strong>Weak goal vs. stronger goal</strong>Weak: "Make everyone stop fighting." Stronger: "Reduce evening conflicts from daily to twice weekly by helping parents give clear instructions, helping children express frustration without aggression, and creating a repair ritual after escalation."</div>
<p>Family therapy goals should be collaborative, specific, relational, developmentally appropriate, culturally respectful, measurable when possible, connected to safety, and flexible over time.</p>`),
          t("Common Problems Addressed in Family Therapy",`<div class="tc-subhead">Couple and Marriage Problems</div><ul><li>Repeated conflict and emotional distance</li><li>Betrayal and sexual problems</li><li>Financial conflict and in-law issues</li><li>Divorce discernment</li></ul>
<div class="tc-subhead">Parenting and Child Problems</div><ul><li>Discipline conflict and child behavior problems</li><li>School refusal, anxiety, and sibling conflict</li><li>Parent-child disconnection</li></ul>
<div class="tc-subhead">Adolescent Problems</div><ul><li>Autonomy conflict and risk-taking</li><li>Substance use, depression, and technology conflict</li><li>Identity conflict and school problems</li></ul>
<div class="tc-subhead">Family Transition Problems</div><ul><li>Remarriage and blended family adjustment</li><li>Migration, launching young adults, and aging parents</li><li>Caregiving and retirement transitions</li></ul>
<div class="tc-subhead">Crisis and Clinical Problems</div><ul><li>Trauma, grief, and addiction</li><li>Mental illness, chronic illness, and disability</li><li>Domestic violence, suicidality, and abuse or neglect</li></ul>
<p>The therapist must determine whether family therapy is the primary treatment, a supportive treatment, or inappropriate until safety is established.</p>`),
          t("Family Therapy Across Cultures and Contexts",`<p>Family therapy must be culturally responsive. Families differ in how they define respect, autonomy, duty, privacy, marriage, gender roles, parenting, elder authority, emotional expression, religion, sexuality, and healing.</p>
<p>A behavior that looks "enmeshed" in one cultural lens may represent loyalty and interdependence in another. A therapist must not impose one cultural model of healthy family life.</p>
<p>Cultural assessment includes: ethnicity and cultural identity; language; migration history; family structure; religion and spirituality; gender expectations; parenting values; elder authority; collectivist or individualist values; experiences of discrimination; social class and economic stress; community support; historical trauma; and acculturation differences between generations.</p>
<div class="tc-subhead">Useful cultural questions</div><ul><li>What does respect mean in your family?</li><li>How are decisions made? What role do elders play?</li><li>What does your faith or moral tradition teach about this problem?</li><li>Are there generational differences in values?</li><li>What would a culturally respectful solution look like?</li></ul>
<div class="tc-motto">Honor culture. Ask, do not assume. Protect safety. Respect difference. Support dignity.</div>`)
        ]
      },
      { title:"The Historical Development of Family Therapy",
        intro:"Family therapy emerged from a major shift in the mental health field. Earlier models often located problems inside the individual: unconscious conflict, personality, diagnosis, pathology, or behavior. Family therapy expanded the frame by showing that symptoms often make sense within relational systems.",
        topics:[
          t("Early Roots: Psychoanalysis, Social Work, and Child Guidance",`<div class="tc-subhead">Psychoanalysis</div><p>Psychoanalysis focused on unconscious conflict, childhood experience, transference, and intrapsychic dynamics. Family therapy inherited from psychoanalysis an interest in early relationships, unconscious patterns, family-of-origin influence, defenses, attachment, and emotional development.</p>
<div class="tc-subhead">Social Work</div><p>Social work contributed attention to the person-in-environment. Family therapy inherited ecological thinking, attention to social stressors, and advocacy.</p>
<div class="tc-subhead">Child Guidance</div><p>Child guidance clinics often worked with children by also involving parents. Clinicians began to realize that children's symptoms could not be fully understood apart from family interaction, parenting patterns, school, and community context.</p>`),
          t("The Shift from Individual Pathology to Relational Patterns",`<p>A major historical shift occurred when clinicians began observing entire families rather than only interviewing individuals. They noticed that symptoms often appeared within repeated interactional sequences.</p>
<div class="tc-example"><strong>Example pattern</strong>A child becomes symptomatic → parents focus on the child → parental conflict decreases temporarily → the child's symptom becomes central to family stability.</div>
<div class="tc-quote">From "the patient has the problem" to "the family system participates in the problem pattern."</div>
<p>This is where the idea of the "identified patient" became important — the family member who carries the visible symptom, but whose symptom may reflect broader family distress.</p>`),
          t("Systems Theory and Cybernetics",`<p>Systems theory gave family therapy its basic intellectual structure. It emphasized that living systems are organized wholes, not merely collections of parts.</p>
<div class="tc-subhead">Core systems ideas</div>
<ul><li><strong>Wholeness:</strong> the family is more than the sum of its members</li><li><strong>Interdependence:</strong> each member affects and is affected by others</li><li><strong>Feedback:</strong> families respond to change in ways that amplify or reduce it</li><li><strong>Homeostasis:</strong> families often try to maintain familiar patterns, even painful ones</li><li><strong>Circular causality:</strong> A causes B, but B also affects A</li><li><strong>Boundaries:</strong> systems regulate closeness, distance, and information flow</li></ul>
<div class="tc-example"><strong>Circular causality example</strong>Parent criticizes → child withdraws → parent feels ignored → parent criticizes more → child withdraws more. A linear model asks "Who started it?" A circular model asks "How does the sequence keep repeating?"</div>`),
          t("The First Family Therapy Pioneers",`<p>Early family therapy pioneers challenged the individual-only model and developed new ways of working with families.</p>
<div class="tc-table-wrap"><table class="tc-table"><thead><tr><th>Pioneer</th><th>Key Emphasis</th></tr></thead><tbody>
<tr><td>Murray Bowen</td><td>Differentiation, anxiety, triangles, multigenerational patterns</td></tr>
<tr><td>Salvador Minuchin</td><td>Structure, boundaries, hierarchy, subsystems</td></tr>
<tr><td>Virginia Satir</td><td>Communication, self-esteem, congruence, emotional expression</td></tr>
<tr><td>Carl Whitaker</td><td>Authenticity, symbolic experience, therapist use of self</td></tr>
<tr><td>Jay Haley &amp; Cloe Madanes</td><td>Strategic intervention, power, hierarchy, directives</td></tr>
<tr><td>Milan Team</td><td>Circular questioning, hypothesizing, neutrality, family games</td></tr>
<tr><td>Ivan Boszormenyi-Nagy</td><td>Relational ethics, loyalty, fairness, entitlement</td></tr>
<tr><td>Michael White &amp; David Epston</td><td>Narrative, externalizing problems, re-authoring stories</td></tr>
<tr><td>de Shazer &amp; Berg</td><td>Solution-focused brief therapy, exceptions, goals, scaling</td></tr>
<tr><td>Susan Johnson</td><td>Attachment, emotion, bonding, emotionally focused therapy</td></tr>
</tbody></table></div>
<p>The field became pluralistic: different schools developed different maps of family change.</p>`),
          t("Development of Major Schools of Family Therapy",`<p>Family therapy developed into multiple schools, each with its own view of problems, change, therapist role, and techniques.</p>
<ul><li><strong>Bowen Family Systems Therapy:</strong> differentiation, triangles, family-of-origin patterns</li><li><strong>Structural Family Therapy:</strong> family organization, boundaries, hierarchy, subsystems</li><li><strong>Strategic Family Therapy:</strong> problem-maintaining sequences, hierarchy, communication</li><li><strong>Milan Systemic Therapy:</strong> circular questioning, neutrality, hypothesizing</li><li><strong>Experiential Family Therapy:</strong> emotional expression, authenticity, self-esteem</li><li><strong>Contextual Family Therapy:</strong> loyalty, fairness, justice, relational ethics</li><li><strong>Narrative Family Therapy:</strong> stories, identity, externalization, re-authoring</li><li><strong>Solution-Focused Family Therapy:</strong> goals, exceptions, strengths, scaling</li><li><strong>Emotionally Focused Therapy:</strong> attachment bonds, emotional cycles, vulnerability</li><li><strong>Cognitive-Behavioral Family Therapy:</strong> behavior, reinforcement, cognition, skills</li></ul>`)
        ]
      },
      { title:"Core Concepts in Family Systems Thinking",
        intro:"Family systems thinking provides the conceptual vocabulary of family therapy. These concepts help therapists understand how families organize closeness, distance, emotion, responsibility, meaning, and change.",
        topics:[
          t("Systems and Subsystems",`<p>A family system is the whole family unit. Subsystems are smaller units within the family: couple, parental, sibling, parent-child, grandparent, extended family, co-parenting, and stepfamily subsystems. Healthy families have functioning subsystems with appropriate boundaries.</p>
<div class="tc-example"><strong>Example</strong>The couple subsystem needs privacy and intimacy. The parental subsystem needs authority and coordination. The sibling subsystem needs space for peer-like bonding. Children should not be placed inside the couple subsystem as mediators or confidants.</div>`),
          t("Boundaries",`<p>Boundaries regulate closeness, distance, responsibility, privacy, and participation.</p>
<ul><li><strong>Clear boundaries:</strong> allow connection and individuality</li><li><strong>Diffuse boundaries:</strong> too much involvement, little privacy, emotional overresponsibility</li><li><strong>Rigid boundaries:</strong> too much distance, limited support, emotional isolation</li></ul>
<div class="tc-quote">Close enough for support. Separate enough for individuality.</div>`,["Boundaries / roles","Parent-child conflict","Blended / stepfamily"]),
          t("Roles",`<p>Roles are repeated positions family members occupy. Common family roles: caretaker, peacemaker, rebel, hero, scapegoat, lost child, responsible one, clown, mediator, parentified child, decision-maker, dependent one.</p>
<div class="tc-example"><strong>Example</strong>The oldest child becomes "the responsible one." Parents rely on her to manage siblings and emotional crises. She is praised for maturity but loses her childhood. Later, she struggles to rest or ask for help.</div>`,["Boundaries / roles","Intergenerational patterns"]),
          t("Rules",`<p>Family rules are expectations about behavior, emotion, communication, loyalty, privacy, gender, authority, and conflict. Some rules are spoken; others are unspoken.</p>
<ul><li>Do not talk about family problems outside the home</li><li>Children should not question parents</li><li>Anger is dangerous / Success is required</li><li>We do not discuss grief / Asking for help is weakness</li></ul>`,["Hierarchy / authority","Communication skills"]),
          t("Feedback Loops",`<p>Feedback loops are patterns through which the family system responds to behavior and change.</p>
<ul><li><strong>Negative feedback:</strong> reduces change and maintains stability</li><li><strong>Positive feedback:</strong> amplifies change and increases movement</li></ul>
<div class="tc-example"><strong>Positive feedback (escalation) example</strong>One parent begins yelling → child yells back → parent escalates → child escalates → conflict intensifies.</div>`),
          t("Homeostasis",`<p>Homeostasis is the family system's tendency to maintain familiar patterns. Even painful patterns may feel safer than unknown change.</p>
<div class="tc-quote">"Part of the family wants change, and another part may be afraid of what change will require."</div>`,["Conflict cycles","Build insight / awareness"]),
          t("Circular Causality",`<p>Circular causality means family behavior is understood as mutual influence rather than one-way cause.</p>
<div class="tc-example"><strong>Circular causality</strong>Father worries → father criticizes → son feels disrespected → son talks back → father feels authority threatened → father yells → son becomes more defiant. Circular thinking reduces blame and reveals intervention points.</div>`),
          t("Triangulation",`<p>Triangulation occurs when tension between two people is managed through a third person.</p>
<div class="tc-quote">Therapeutic goal: help the original two-person relationship address the tension directly while releasing the third person from the middle.</div>`,["Conflict cycles","Boundaries / roles","Divorce / co-parenting"]),
          t("Differentiation",`<p>Differentiation is the ability to remain emotionally connected while maintaining a clear sense of self.</p>
<div class="tc-quote">I can belong without losing myself. I can disagree without disconnecting. I can stay connected without becoming emotionally fused.</div>`,["Boundaries / roles","Estrangement / cutoff","Intergenerational patterns"]),
          t("Enmeshment and Disengagement",`<div class="tc-subhead">Enmeshment</div><p>Excessive emotional involvement and weak boundaries. Autonomy creates guilt; disagreement feels like disloyalty.</p>
<div class="tc-subhead">Disengagement</div><p>Emotional distance and rigid boundaries. Little emotional support; independence masks isolation.</p>
<div class="tc-motto">Enmeshed families need more separateness. Disengaged families need more connection. Healthy families need both belonging and individuality.</div>`),
          t("Family Life Cycle",`<p>The family life cycle describes predictable developmental stages families move through over time. Symptoms often intensify when families struggle to adapt to a new stage.</p>
<div class="tc-example"><strong>Example</strong>A child becomes an adolescent and seeks more autonomy. Parents continue using rules appropriate for a younger child. Conflict escalates. The problem is not simply "rebellion" — it is a family life-cycle transition requiring new boundaries.</div>`),
          t("Intergenerational Transmission",`<p>Intergenerational transmission refers to patterns passed across generations: trauma, anxiety, parenting styles, religious values, gender expectations, addiction, emotional cutoff, resilience, and family stories.</p>
<div class="tc-quote">Therapeutic frame: "This pattern may have been inherited, but it can be interrupted."</div>`),
          t("Identified Patient",`<p>The identified patient is the family member presented as "the problem." Family therapy asks how the whole system relates to those symptoms.</p>
<div class="tc-quote">Expand the lens: "How is everyone affected by this problem, and how does everyone respond to it?"</div>`),
          t("Symptom Function",`<p>Symptom function refers to what a symptom does within the family system. A symptom may function to: express distress; stabilize a family pattern; distract from conflict; bring people together; protect someone from separation; communicate hidden pain; preserve loyalty; protest injustice; or signal developmental strain.</p>`),
          t("Family Narratives and Meaning-Making",`<p>Families live inside stories. These stories explain identity, suffering, loyalty, shame, resilience, and possibility. Therapy helps families examine: Which stories dominate? Who is trapped by the story? What exceptions exist? What new story would support healing?</p>
<div class="tc-example"><strong>Narrative reframe</strong>Old story: "We are a broken family." New story: "We are a family that inherited painful patterns and is learning how to interrupt them."</div>`)
        ]
      },
      { title:"The Family Life Cycle",
        intro:"The family life cycle is the developmental map of family change over time. Family distress often appears when the family cannot adapt to a new developmental stage.",
        topics:[
          t("Concept of the Family Life Cycle",`<p>The family life cycle describes the stages and transitions families experience over time. The life cycle includes: formation of adult identity; couple formation; childbirth; school-age parenting; adolescence; launching young adults; midlife reorganization; aging; illness; death; remarriage; migration; and family disruption.</p>
<div class="tc-motto">Clinical principle: symptoms often appear at transition points — because transitions require renegotiation of roles, boundaries, authority, attachment, and identity.</div>`),
          t("Leaving Home and Becoming an Adult",`<p>Leaving home involves becoming an adult emotionally, practically, financially, relationally, and morally. The deeper task is differentiation, not simply physical departure.</p>
<div class="tc-quote">The goal is not separation without love. The goal is adult connection without emotional captivity.</div>`),
          t("Couple Formation",`<p>Couple formation involves creating a new relational unit. Partners bring family-of-origin patterns, attachment styles, cultural expectations, gender roles, money beliefs, spiritual values, and conflict habits.</p>
<div class="tc-quote">Therapist question: "What kind of family are you trying to build together, and what inherited patterns do you want to keep, revise, or leave behind?"</div>`),
          t("Families with Young Children",`<p>The arrival of young children reorganizes the family system. Common problems: parental burnout; unequal labor; decline in couple intimacy; postpartum depression; in-law boundary conflicts; disagreement about discipline; financial stress.</p>`),
          t("Families with School-Age Children",`<p>School-age children bring new systems into family life: teachers, peers, homework, extracurricular activities, and discipline outside the home. Common problems: homework battles; school refusal; bullying; learning differences; ADHD challenges; parental overinvolvement; sibling rivalry.</p>`),
          t("Families with Adolescents",`<p>Adolescence requires renegotiation of authority, privacy, autonomy, identity, sexuality, peer relationships, technology, and responsibility.</p>
<div class="tc-quote">The family contract must change. Parents still lead, but leadership must now include more respect, negotiation, and preparation for adulthood.</div>`),
          t("Launching Children and Midlife Transitions",`<p>Launching children creates major family change. Parents may feel pride, grief, emptiness, relief, anxiety, or loss of purpose.</p>
<div class="tc-quote">The family must move from management to mentorship.</div>`),
          t("Later-Life Families",`<p>Later life brings retirement, aging, illness, grandparenthood, caregiving, widowhood, legacy, and mortality.</p>
<div class="tc-quote">Later life is not only decline. It is also a stage of legacy, meaning, repair, and generativity.</div>`),
          t("Divorce, Remarriage, and Blended Families",`<p>Divorce, remarriage, and blended families interrupt and reorganize the family life cycle. Family members may be at different emotional stages simultaneously.</p>
<div class="tc-quote">A blended family needs time to become real. It cannot simply skip the grief and loyalty work.</div>`),
          t("Migration, Loss, and Disrupted Life Cycles",`<p>Not all families follow a predictable life cycle. Migration, war, displacement, incarceration, deportation, death, infertility, chronic illness, disability, poverty, discrimination, and community violence can disrupt expected family development.</p>
<div class="tc-quote">This family may not be delayed or dysfunctional. It may be adapting to disruptions that required extraordinary survival.</div>`)
        ]
      }
    ]
  },
  {
    part:"II", partClass:"part-II", title:"Major Theories and Schools of Family Therapy",
    partIntro:"Family therapy is not a single theory. It is a field made of several major schools, each with its own assumptions about human nature, family problems, therapeutic change, and the therapist's role. A family therapist does not need to treat these models as competing religions. Each model provides a different clinical lens. The goal of studying these theories is to develop clinical vision: to see what kind of pattern is operating in a family and what kind of intervention may help.",
    chapters:[
      { title:"Bowen Family Systems Therapy",
        intro:"Bowen Family Systems Therapy views the family as an emotional unit shaped by anxiety, differentiation, triangles, and multigenerational patterns. Bowenian therapy helps individuals think clearly about emotional processes, reduce reactivity, increase differentiation, and understand how family patterns repeat across generations.",
        topics:[
          t("Differentiation of Self",`<p>Differentiation of self is the central concept in Bowen theory. A differentiated person can say: "I care about you, but I do not have to become you." Low differentiation may appear as emotional fusion, reactivity, emotional cutoff, and chronic people-pleasing.</p>`),
          t("Emotional Triangles",`<p>A triangle forms when tension between two people is managed by involving a third. Therapeutic task: help family members recognize triangles and relate more directly to the person with whom they have tension.</p>`),
          t("Nuclear Family Emotional Process",`<p>Describes how anxiety operates within the immediate family through: marital conflict; dysfunction in one spouse; impairment in a child; and emotional distance. The deeper anxiety often remains unresolved when attention shifts to a symptomatic child.</p>`),
          t("Multigenerational Transmission Process",`<p>Families pass down not only genes, names, and traditions, but also anxiety patterns, emotional styles, conflict strategies, cutoff patterns, and levels of differentiation.</p>
<div class="tc-quote">"This pattern did not begin with you, but you can become more aware of how it moves through the family."</div>`),
          t("Emotional Cutoff",`<p>Emotional cutoff occurs when a person manages unresolved family anxiety by distancing, avoiding, or refusing contact. Cutoff may look like independence but often indicates unresolved attachment.</p>
<div class="tc-motto">In cases of abuse, coercion, or danger, distance may be protective rather than pathological.</div>`),
          t("Genograms in Bowenian Therapy",`<p>The genogram maps family structure, relationships, symptoms, cutoffs, marriages, divorces, illnesses, deaths, migration, addiction, trauma, and patterns across generations. The genogram helps clients move from emotional blaming to thoughtful observation.</p>`),
          t("Therapist Role and Clinical Stance",`<p>The Bowenian therapist is calm, thoughtful, nonreactive, and coaching-oriented. The therapist models: calm presence; curiosity; neutrality; clear thinking; emotional regulation; and responsibility for self.</p>`),
          t("Strengths and Limitations",`<div class="tc-subhead">Strengths</div><ul><li>Powerful for intergenerational patterns; reduces blame</li><li>Helps clients think under emotional pressure</li><li>Useful for anxiety, cutoff, and triangles</li></ul><div class="tc-subhead">Limitations</div><ul><li>May feel too intellectual for highly emotional families</li><li>May underemphasize immediate symptom relief</li><li>Insufficient when safety or severe trauma require direct intervention</li></ul>`)

      { title:"Structural Family Therapy",
        intro:"Structural Family Therapy focuses on how the family is organized — examining boundaries, subsystems, hierarchy, coalitions, roles, and interactional patterns. Structural therapy is active, concrete, and often uses live family interaction in session.",
        topics:[
          t("Family Structure",`<p>Family structure refers to the invisible organization of the family: who has authority, who is close, who is distant, who makes decisions, who is responsible, and how members interact. Structural therapists observe seating patterns, interruptions, who answers for whom, who controls the conversation.</p>`),
          t("Subsystems",`<p>Healthy subsystems have appropriate boundaries. The parental subsystem should make parenting decisions. Children should not be emotional partners of one parent against the other.</p>`,["Boundaries / roles","Hierarchy / authority","Parenting skills"]),
          t("Boundaries: Clear, Rigid, and Diffuse",`<ul><li><strong>Clear:</strong> healthy balance of connection and autonomy</li><li><strong>Rigid:</strong> too much distance, emotional isolation</li><li><strong>Diffuse:</strong> too much involvement, overdependence, lack of privacy</li></ul>`),
          t("Hierarchies and Coalitions",`<p>Problems occur when: children have more power than caregivers; one parent undermines the other; grandparents override parents; a child becomes a parent's emotional partner; or a coalition forms against another member.</p>`),
          t("Enactments",`<p>Enactments ask family members to interact directly in session. The therapist observes the pattern and intervenes in real time, revealing: tone; hierarchy; resistance; alliances; escalation; boundary problems; and repair ability.</p>`,["Communication skills","Conflict cycles"]),

<div class="tc-example"><strong>Example: school refusal</strong>Child refuses school → parent pleads and reassures → child becomes more anxious → parent allows staying home → anxiety decreases short-term → school refusal becomes stronger.</div>`),
          t("Directives",`<p>Directives are tasks given to the family. Examples: schedule a daily 10-minute parent meeting; change the order of bedtime routines; practice one specific communication rule.</p>`,["Establish structure","Reduce conflict"]),

      { title:"Narrative Family Therapy",

          t("Externalizing Conversations",`<p>Externalizing separates the person from the problem.</p>
<ul><li>Instead of "She is anxious" → "Anxiety has been pressuring her."</li><li>Instead of "Our son is defiant" → "The rebellion cycle has been taking over conversations."</li></ul>
<div class="tc-quote">"When Anger takes over the room, what does it get each person to do?"</div>`),
          t("Unique Outcomes",`<p>Unique outcomes are exceptions to the dominant problem story: When was the problem weaker? What did each person do differently? What does that exception say about your values? Unique outcomes provide evidence for a new story.</p>`),

<div class="tc-example"><strong>Old story</strong>"Our family only hurts each other."</div>

      { title:"Solution-Focused Family Therapy",
        intro:"Solution-Focused Family Therapy focuses on goals, exceptions, strengths, resources, and small steps toward a preferred future. This model is brief, practical, hopeful, and collaborative.",

          t("Exceptions",`<p>Exceptions are times when the problem could have happened but did not, or happened less intensely. They reveal existing competence.</p>`,["Build insight / awareness","Reduce conflict"]),

          t("Scaling Questions",`<p>On a scale of 0 to 10: How close is the family to the goal? What makes it a 4 and not a 2? What would move it from 4 to 5?</p>`),
          t("Strengths and Limitations",`<div class="tc-subhead">Strengths</div><ul><li>Hopeful and efficient; respects client resources</li><li>Good for families ready for action</li></ul><div class="tc-subhead">Limitations</div><ul><li>May feel too light for trauma or severe conflict</li><li>Safety concerns require direct assessment</li></ul>`)

      { title:"Emotionally Focused Family Therapy",
        intro:"Emotionally Focused Therapy is rooted in attachment theory and focuses on emotional bonds, negative interaction cycles, vulnerability, and secure connection.",

          t("Negative Interaction Cycles",`<p>A negative cycle is a repeated pattern of emotional protection.</p>
<div class="tc-example"><strong>Example</strong>Parent criticizes → teen withdraws → parent feels rejected → parent criticizes more → teen withdraws more.</div>
<div class="tc-quote">EFT externalizes the cycle: "The cycle is the enemy, not either of you."</div>`),
          t("Primary and Secondary Emotions",`<p>Secondary emotions are protective reactions (anger, defensiveness, withdrawal). Primary emotions are deeper vulnerable feelings (fear, sadness, shame, longing).</p>
<div class="tc-example"><strong>Secondary</strong>"You never listen!" → <strong>Primary</strong>"I am scared I do not matter to you."</div>`),
          t("Restructuring Attachment Interactions",`<p>Instead of "You are disrespectful," the parent says: "When you shut your door, I feel scared that I am losing you." The other can then respond to vulnerability rather than attack.</p>`),

      },
      { title:"Cognitive-Behavioral Family Therapy",
        intro:"Cognitive-Behavioral Family Therapy applies principles of learning, reinforcement, cognition, communication, and problem-solving to family systems.",
        topics:[

          t("Communication Skills Training",`<p>CBFT often teaches: active listening; I-statements; clear requests; praise; calm correction; timeout; respectful disagreement. Skills are practiced, not only discussed.</p>`,["Improve communication"]),
          t("Parent Management Training",`<p>Core tools: labeled praise; clear commands; reward systems; planned ignoring; consistent consequences; routines; behavior charts; parent emotion regulation. Especially useful for oppositional behavior and ADHD-related challenges.</p>`),
          t("Strengths and Limitations",`<div class="tc-subhead">Strengths</div><ul><li>Structured, practical, and measurable</li><li>Strong for child behavior and parenting</li></ul><div class="tc-subhead">Limitations</div><ul><li>May feel too mechanical if emotion is ignored</li><li>Behavior plans fail if power, safety, or attachment issues are not addressed</li></ul>`)

<tr><td>Boundary or hierarchy problem</td><td>Structural therapy</td></tr>
<tr><td>Intergenerational anxiety</td><td>Bowenian therapy</td></tr>
<tr><td>Repetitive failed solution</td><td>Strategic therapy</td></tr>
<tr><td>Shame-based identity story</td><td>Narrative therapy</td></tr>
<tr><td>Brief, goal-focused problem</td><td>Solution-focused therapy</td></tr>
<tr><td>Attachment rupture</td><td>Emotionally focused therapy</td></tr>
<tr><td>Child behavior problem</td><td>CBFT / parent training</td></tr>
<tr><td>Serious mental illness</td><td>Psychoeducation + relapse prevention</td></tr>
<tr><td>Trauma or safety concerns</td><td>Trauma-informed, phased treatment</td></tr>
</tbody></table></div>`),
          t("Risks of Unstructured Eclecticism",`<div class="tc-quote">A therapist should always be able to explain: "Why am I using this intervention with this family at this time?"</div>`),

  {
    part:"III", partClass:"part-III", title:"Assessment and Case Conceptualization",
    partIntro:"Family therapy assessment is not simply collecting background information. It is a disciplined way of understanding how symptoms, conflicts, strengths, roles, histories, meanings, and larger social contexts organize the family system.",
    chapters:[
      { title:"Family Assessment",
        intro:"Family assessment is the foundation of effective treatment. A strong family assessment is systemic, developmental, culturally responsive, trauma-informed, and safety-conscious.",
        topics:[
          t("Purpose of Assessment",`<p>Assessment answers: Who is involved in the problem? How does each person define it? What interactional cycles keep the problem alive? What stressors exist outside the family? What strengths and resources can support change? Are there safety concerns?</p>
<div class="tc-motto">A family therapist should avoid treating assessment as a one-time intake task. Assessment continues throughout therapy as trust develops and patterns become visible.</div>`),
          t("Presenting Problem",`<p>Family therapy distinguishes between: the family's stated problem; the interactional problem; the developmental problem; the emotional problem; and the systemic function of the symptom. This does not mean the symptom is not real — it means the symptom is understood in context.</p>`),
          t("Relational Patterns",`<p>Relational patterns are repeated sequences of interaction. The therapist assesses: who pursues and who withdraws; who escalates and who de-escalates; who mediates conflict; who becomes the scapegoat; what topics trigger conflict; how repair happens or fails.</p>
<div class="tc-motto">Family assessment should observe live interaction whenever possible.</div>`),
          t("Risk Assessment",`<p>The therapist must assess: suicidal ideation; self-harm; homicidal threats; domestic violence; coercive control; child abuse or neglect; elder abuse; substance-related danger; and unsafe living conditions.</p>
<div class="tc-motto">Conjoint family therapy may be contraindicated when there is coercive control, intimidation, or severe violence.</div>`),
          t("Cultural and Spiritual Assessment",`<p>A culturally responsive assessment asks: What cultural communities shape this family? What languages are spoken? What values guide parenting and marriage? How does the family understand mental health? What spiritual or religious beliefs guide the family?</p>`,["Cultural integration"]),
          t("Trauma and Adverse Experiences",`<p>Trauma assessment explores how overwhelming experiences have affected individuals and relationships. A trauma-informed therapist does not force disclosure. Safety, pacing, stabilization, and consent matter.</p>`,["Trauma history"])
        ]
      },
      { title:"Genograms and Family Mapping",
        intro:"A genogram is a visual map of family structure, relationships, patterns, losses, illnesses, conflicts, alliances, and intergenerational themes. It is more than a family tree.",
        topics:[
          t("Purpose of Genograms",`<p>Genograms help identify: repeated marital patterns; estrangement and emotional cutoff; addiction across generations; trauma and abuse patterns; premature deaths or unresolved grief; parentification; migration and displacement; and family strengths.</p>
<div class="tc-quote">The genogram helps families externalize the problem: "This did not start with us; we inherited part of it, and now we can respond differently."</div>`),
          t("Mapping Patterns Across Generations",`<p>The therapist may ask: What patterns seem to repeat across generations? Who carried responsibility too early? Who was excluded or forgotten? Who broke a family pattern? What strengths were passed down? What wounds were passed down?</p>
<div class="tc-motto">The goal is not fatalism. Intergenerational patterns are not destiny. They are material for awareness and choice.</div>`),
          t("Genogram Interview Questions",`<ul><li>Who should be included in this family map?</li><li>Who is closest to whom? Where is there tension or cutoff?</li><li>What major losses shaped the family?</li><li>What patterns repeat across generations?</li><li>What would you like future generations not to repeat?</li></ul>
<div class="tc-quote">The final question converts assessment into motivation for change.</div>`)
        ]
      },
      { title:"Case Conceptualization",
        intro:"Case conceptualization is the therapist's working explanation of the family's problem, its maintaining patterns, its historical roots, its protective factors, and the pathway toward change.",
        topics:[
          t("Identifying Interactional Cycles",`<div class="tc-quote">The cycle becomes the target of therapy. "The enemy is not mother or daughter. The enemy is the worry-control-secrecy cycle." This reduces blame and creates a shared object of change.</div>`),
          t("Creating a Treatment Hypothesis",`<div class="tc-example"><strong>Example hypothesis</strong>The adolescent's defiance is maintained by a pursue-withdraw cycle between father and son, intensified by mother's rescue role and unresolved parental disagreement about authority. Treatment should reduce blame, strengthen the parental coalition, create clearer boundaries, and help father and son develop less reactive communication.</div>`),
          t("Revising the Hypothesis Over Time",`<div class="tc-motto">Good conceptualization is flexible, not rigid.</div>`)
        ]
      },
      { title:"Treatment Planning",
        intro:"Treatment planning translates assessment and conceptualization into action. A treatment plan identifies goals, priorities, interventions, session structure, safety procedures, progress measures, and termination criteria.",
        topics:[
          t("Setting Collaborative Goals",`<div class="tc-example"><strong>Stronger goal</strong>"Reduce daily parent-child conflict from five escalations per week to one or fewer, while helping the child express frustration without aggression and helping parents respond with consistent limits."</div>`),
          t("Prioritizing Problems",`<div class="tc-motto">Safety comes before insight. Stabilization comes before deep exploration. A family in active danger needs protection, not abstract systems theory.</div>`),
          t("Safety Planning",`<p>A family safety plan may include: warning signs of escalation; de-escalation steps; where each person can go; emergency contacts and crisis hotlines; removal or securing of lethal means; child safety steps; substance relapse plan; and follow-up plan.</p>
<div class="tc-motto">In cases of domestic violence or coercive control, safety planning should not be conducted in a way that increases danger for the survivor.</div>`),
          t("Tracking Progress",`<div class="tc-quote">Progress in family therapy is not always linear. Sometimes conflict temporarily increases because avoided issues are finally being discussed.</div>`)
        ]
      }
    ]

  {
    part:"IV", partClass:"part-IV", title:"Core Clinical Skills",
    partIntro:"Core clinical skills are the practical bridge between theory and change. The family therapist works with interaction, emotion, meaning, power, roles, communication, conflict, and safety.",
    chapters:[
      { title:"Joining and Building the Therapeutic Alliance", intro:"Joining is the therapist's process of entering the family system in a way that creates trust, respect, safety, and permission to influence the system.",
        topics:[
          t("Joining with the Whole Family",`<div class="tc-quote">"I want to understand how this problem affects each of you, and how each of you has been trying to deal with it. My goal is not to choose a side, but to help us understand the pattern that keeps pulling everyone into pain."</div>`),
          t("Managing Split Alliances",`<p>Split alliances occur when some family members experience the therapist as "on their side" while others experience the therapist as against them.</p>

          t("Avoiding Blame",`<div class="tc-example"><strong>Systemic reframe</strong>"Rather than deciding whose fault this is, let us look at what happens step by step. When criticism starts, withdrawal follows; when withdrawal happens, fear increases; when fear increases, criticism becomes stronger. The pattern is hurting everyone."</div>`),
          t("Repairing Alliance Ruptures",`<ul><li>"I may have moved too quickly there. Let me slow down and understand what that felt like for you."</li><li>"Before we continue, I want to check whether everyone still feels I am holding the family fairly."</li></ul>

        ]
      },
      { title:"Therapeutic Questioning", intro:"Questions are one of the family therapist's most powerful tools — not only to gather information but to shift attention, reveal patterns, soften blame, and create new possibilities.",
        topics:[
          t("Circular Questions",`<ul><li>When your father becomes quiet, what does your mother usually do?</li><li>Who notices first when tension is rising?</li><li>If your son were watching this argument, what would he say each person is feeling?</li></ul>`),
          t("Reflexive Questions",`<ul><li>If this pattern continued for five years, what would worry you most?</li><li>What would your family notice if you responded with curiosity instead of criticism?</li><li>What kind of family story would you like your children to inherit?</li></ul>`),
          t("Emotion-Focused Questions",`<ul><li>When you sound angry, what are you most afraid they will not understand?</li><li>What do you need from your father in that moment?</li><li>What is the softer feeling underneath the criticism?</li></ul>
<div class="tc-motto">Emotion-focused questions must be paced carefully. If asked with warmth and safety, they can transform conflict into vulnerability.</div>`),
          t("Questions That Reduce Defensiveness",`<div class="tc-table-wrap"><table class="tc-table"><thead><tr><th>High-defensiveness question</th><th>Low-defensiveness alternative</th></tr></thead><tbody>
<tr><td>"Why do you control everyone?"</td><td>"When you step in strongly, what are you trying to protect?"</td></tr>
<tr><td>"Why do you ignore your wife?"</td><td>"When you go quiet, are you trying to avoid making things worse?"</td></tr>
<tr><td>"Why are you disrespectful?"</td><td>"What happens inside you right before your tone changes?"</td></tr>
</tbody></table></div>`)
        ]
      },
      { title:"Reframing and Meaning-Making", intro:"Reframing is the skill of offering a new meaning for a behavior, symptom, conflict, or relational pattern.",
        topics:[
          t("Positive Intent Reframes",`<ul><li>"Your criticism may be a desperate attempt to reach him, even though it pushes him away."</li><li>"Your daughter's anger may be her way of saying, 'I need you to see me as older now.'"</li></ul>
<div class="tc-motto">Caution: positive intent should not be used to minimize abuse.</div>`),
          t("Risks of Invalidating Pain",`<div class="tc-example"><strong>Better reframe</strong>"His fear may be underneath the yelling, but the yelling is still harmful and needs to change."</div>
<div class="tc-quote">Good reframing holds complexity: intent and impact both matter; history and accountability both matter; compassion and boundaries both matter.</div>`)
        ]
      },
      { title:"Working with Emotion", intro:"Emotion organizes perception, memory, attachment, conflict, and behavior. Families often fight about content while reacting to emotion.",

<tr><td>Hurt</td><td>Anger</td></tr><tr><td>Fear</td><td>Control</td></tr><tr><td>Shame</td><td>Defensiveness</td></tr><tr><td>Loneliness</td><td>Criticism</td></tr><tr><td>Grief</td><td>Numbness</td></tr></tbody></table></div>
<div class="tc-example"><strong>Therapist language</strong>"When you say 'I don't care,' I wonder if that protects a more painful feeling — maybe that caring has not felt safe."</div>`),
          t("Emotional Validation",`<p>Validation: "Given how alone you felt, I can understand why you withdrew." Invalidation: "You are overreacting." "You should not feel that way."</p>
<div class="tc-quote">Validation reduces defensiveness and helps the nervous system settle.</div>`),
          t("Repair Conversations",`<p>A repair conversation: What happened? What did each person feel? What was the impact? What responsibility can each person take? What apology is needed? What will we do differently?</p>
<div class="tc-motto">Repair must include accountability. A forced apology without changed behavior is not repair.</div>`)

      },

<div class="tc-quote">"Let us stop debating the topic for a moment and map the cycle. The topic changes, but the dance seems similar."</div>`),
          t("When Conflict Becomes Unsafe",`<p>Conflict becomes unsafe when it includes intimidation, threats, physical violence, coercive control, or fear-based compliance. In such cases, conjoint therapy may be inappropriate.</p>
<div class="tc-motto">Family therapy should never become a stage where harm is repeated under clinical supervision.</div>`)

<div class="tc-motto">Conjoint therapy can be unsafe when coercive control is present. The therapist must prioritize safety assessment, separate assessment when appropriate, documentation, and specialized referral. Safety comes first.</div>`,["Domestic violence / safety","Power dynamics","Safety planning","Safety / risk"])

      }

        t("Identity Formation",`<p>Adolescents explore identity: personality, gender, sexuality, religion, politics, culture, vocation, friendships, body image, and values. Family conflict often intensifies when identity exploration threatens family expectations.</p>`,["Identity work","Adolescent behavior","Adolescents"])

<div class="tc-motto">Authority without relationship often creates resistance. Relationship without role clarity creates confusion.</div>`,["Blended / stepfamily","Hierarchy / authority","Parenting skills"])
